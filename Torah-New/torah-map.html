          "col": 0,
          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>24:10</b></span> And the\n  servant took ten camels, of the camels of his master, and departed; <span class=\"internalparallel\"><b>having all goodly things of his master's in his\n  hand</b></span>; and he arose, and went to Aram-naharaim, unto the city of\n  Nahor. <span class=\"VerseNumber\"><b>24:11</b></span> And he made the camels to\n  kneel down without the city by the well of water at the time of evening, the\n  time that women go out to draw water. <span class=\"VerseNumber\"><b>24:12</b></span>\n<span class=\"horizontal1\"><b>And he said: 'O LORD, the God of my master\n  Abraham, send me, I pray Thee, good speed this day, and show kindness unto my\n  master Abraham</b></span>. <span class=\"VerseNumber\"><b>24:13</b></span> <span class=\"horizontal1\"><b>Behold, I stand by the fountain of water; and the\n  daughters of the men of the city come out to draw water</b></span>. <span class=\"VerseNumber\"><b>24:14</b></span> <span class=\"horizontal1\"><b>So let it\n  come to pass, that the damsel to whom I shall say: Let down thy pitcher, I\n  pray thee, that I may drink; and she shall say: Drink, and I will give thy\n  camels drink also; let the same be she that Thou hast appointed for Thy\n  servant, even for Isaac; and thereby shall I know that Thou hast shown\n  kindness unto my master.</b></span>' <span class=\"VerseNumber\"><b>24:15</b></span>\n<span class=\"horizontal1\"><b>And it came to pass, before he had done speaking,\n  that, behold</b></span>, <span class=\"vertical1\"><b>Rebekah came out, who was\n  born to Bethuel the son of Milcah, the wife of Nahor, Abraham's brother</b></span>,\n  with her pitcher upon her shoulder. <span class=\"VerseNumber\"><b>24:16</b></span>\n  And the damsel was very fair to look upon, a virgin, neither had any man known\n  her; and she went down to the fountain, and filled her pitcher, and came up. <span class=\"VerseNumber\"><b>24:17</b></span> <span class=\"horizontal1\"><b>And the\n  servant ran to meet her, and said: 'Give me to drink, I pray thee, a little\n  water of thy pitcher</b></span>.' <span class=\"VerseNumber\"><b>24:18</b></span>\n<span class=\"horizontal1\"><b>And she said: 'Drink, my lord'; and she hastened,\n  and let down her pitcher upon her hand, and gave him drink</b></span>. <span class=\"VerseNumber\"><b>24:19</b></span> And when she had done giving him drink,\n  she said: 'I will draw for thy camels also, until they have done drinking.' <span class=\"VerseNumber\"><b>24:20</b></span> And she hastened, and emptied her\n  pitcher into the trough, and ran again unto the well to draw, and drew for\n  all his camels. <span class=\"VerseNumber\"><b>24:21</b></span> And the man\n  looked stedfastly on her; holding his peace, to know whether the LORD had\n  made his journey prosperous or not. <span class=\"VerseNumber\"><b>24:22</b></span>\n  And it came to pass, as the camels had done drinking, that <span class=\"vertical1\"><b>the man took a golden ring of half a shekel weight, and\n  two bracelets for her hands of ten shekels weight of gold</b></span>; <span class=\"VerseNumber\"><b>24:23</b></span> <span class=\"horizontal1\"><b>and said:\n  'Whose daughter art thou? tell me, I pray thee. Is there room in thy father's\n  house for us to lodge in</b></span>?' <span class=\"VerseNumber\"><b>24:24</b></span>\n<span class=\"horizontal1\"><b>And she said unto him: 'I am the daughter of\n  Bethuel the son of Milcah, whom she bore unto Nahor</b></span>.' <span class=\"VerseNumber\"><b>24:25</b></span> <span class=\"horizontal1\"><b>She said\n  moreover unto him: 'We have both straw and provender enough, and room to\n  lodge in</b></span>.' <span class=\"VerseNumber\"><b>24:26</b></span> <span class=\"horizontal1\"><b>And the man bowed his head, and prostrated himself\n  before the LORD</b></span>. <span class=\"VerseNumber\"><b>24:27</b></span> <span class=\"horizontal1\"><b>And he said: 'Blessed be the LORD, the God of my master\n  Abraham, who hath not forsaken His mercy and His truth toward my master; as\n  for me, the LORD hath led me in the way to the house of my master's brethren</b></span>.'",
          "text": "b 24:10 And the\n  servant took ten camels, of the camels of his master, and departed; having all goodly things of his master's in his\n  hand ; and he arose, and went to Aram-naharaim, unto the city of\n  Nahor. 24:11 And he made the camels to\n  kneel down without the city by the well of water at the time of evening, the\n  time that women go out to draw water. 24:12 And he said: 'O LORD, the God of my master\n  Abraham, send me, I pray Thee, good speed this day, and show kindness unto my\n  master Abraham . 24:13 Behold, I stand by the fountain of water; and the\n  daughters of the men of the city come out to draw water . 24:14 So let it\n  come to pass, that the damsel to whom I shall say: Let down thy pitcher, I\n  pray thee, that I may drink; and she shall say: Drink, and I will give thy\n  camels drink also; let the same be she that Thou hast appointed for Thy\n  servant, even for Isaac; and thereby shall I know that Thou hast shown\n  kindness unto my master. ' 24:15 And it came to pass, before he had done speaking,\n  that, behold , Rebekah came out, who was\n  born to Bethuel the son of Milcah, the wife of Nahor, Abraham's brother ,\n  with her pitcher upon her shoulder. 24:16 And the damsel was very fair to look upon, a virgin, neither had any man known\n  her; and she went down to the fountain, and filled her pitcher, and came up. 24:17 And the\n  servant ran to meet her, and said: 'Give me to drink, I pray thee, a little\n  water of thy pitcher .' 24:18 And she said: 'Drink, my lord'; and she hastened,\n  and let down her pitcher upon her hand, and gave him drink . 24:19 And when she had done giving him drink,\n  she said: 'I will draw for thy camels also, until they have done drinking.' 24:20 And she hastened, and emptied her\n  pitcher into the trough, and ran again unto the well to draw, and drew for\n  all his camels. 24:21 And the man\n  looked stedfastly on her; holding his peace, to know whether the LORD had\n  made his journey prosperous or not. 24:22 And it came to pass, as the camels had done drinking, that the man took a golden ring of half a shekel weight, and\n  two bracelets for her hands of ten shekels weight of gold ; 24:23 and said:\n  'Whose daughter art thou? tell me, I pray thee. Is there room in thy father's\n  house for us to lodge in ?' 24:24 And she said unto him: 'I am the daughter of\n  Bethuel the son of Milcah, whom she bore unto Nahor .' 24:25 She said\n  moreover unto him: 'We have both straw and provender enough, and room to\n  lodge in .' 24:26 And the man bowed his head, and prostrated himself\n  before the LORD . 24:27 And he said: 'Blessed be the LORD, the God of my master\n  Abraham, who hath not forsaken His mercy and His truth toward my master; as\n  for me, the LORD hath led me in the way to the house of my master's brethren .'",

          "html": "<span class=\"VerseNumber\"><b>25:20</b></span> And Isaac was\n  forty years old when he took Rebekah, the daughter of Bethuel the Aramean, of\n  Paddan-aram, the sister of Laban the Aramean, to be his wife. <span class=\"VerseNumber\"><b>25:21</b></span> And Isaac entreated the LORD for his wife,\n  because she was barren; and the LORD let Himself be entreated of him, and\n  Rebekah his wife conceived. <span class=\"VerseNumber\"><b>25:22</b></span> And\n  the children struggled together within her; and she said: 'If it be so,\n  wherefore do I live?' And she went to inquire of the LORD. <span class=\"VerseNumber\"><b>25:23</b></span> And the LORD said unto her: Two nations\n  are in thy womb, and two peoples shall be separated from thy bowels; and the\n  one people shall be stronger than the other people; <span class=\"horizontal1\"><b>and\n  the elder shall serve the younger</b></span>. <span class=\"VerseNumber\"><b>25:24</b></span>\n  And when her days to be delivered were fulfilled, behold, there were twins in\n  her womb. <span class=\"VerseNumber\"><b>25:25</b></span> <span class=\"horizontal1\"><b>And the first came forth ruddy, all over like a hairy\n  mantle; and they called his name Esau</b></span>. <span class=\"VerseNumber\"><b>25:26</b></span>\n  And after that came forth his brother, and his hand had hold on Esau's heel;\n  and his name was called Jacob. <span class=\"vertical1\"><b>And Isaac was\n  threescore years old when she bore them</b></span>.",
          "text": "25:20 And Isaac was\n  forty years old when he took Rebekah, the daughter of Bethuel the Aramean, of\n  Paddan-aram, the sister of Laban the Aramean, to be his wife. 25:21 And Isaac entreated the LORD for his wife,\n  because she was barren; and the LORD let Himself be entreated of him, and\n  Rebekah his wife conceived. 25:22 And\n  the children struggled together within her; and she said: 'If it be so,\n  wherefore do I live?' And she went to inquire of the LORD. 25:23 And the LORD said unto her: Two nations\n  are in thy womb, and two peoples shall be separated from thy bowels; and the\n  one people shall be stronger than the other people; and\n  the elder shall serve the younger . 25:24 And when her days to be delivered were fulfilled, behold, there were twins in\n  her womb. 25:25 And the first came forth ruddy, all over like a hairy\n  mantle; and they called his name Esau . 25:26 And after that came forth his brother, and his hand had hold on Esau's heel;\n  and his name was called Jacob. And Isaac was\n  threescore years old when she bore them .",

          "text": "27:5 And Rebekah heard when Isaac spoke to Esau his son . And Esau went to the field to hunt for venison, and to bring it. 27:6 And Rebekah spoke unto Jacob her son, saying: 'Behold, I heard thy father speak unto Esau thy brother, saying : 27:7 Bring me venison, and make me savoury food, that I may eat, and bless thee before the LORD before my death . 27:8 Now therefore, my son, hearken to my voice according to that which I command thee. 27:9 Go now to the flock, and fetch me from thence two good kids of the goats; and I will make them savoury food for thy father, such as he loveth; 27:10 and thou shalt bring it to thy father, that he may eat, so that he may bless thee before his death.' 27:11 And Jacob said to Rebekah his mother: 'Behold, Esau my brother is a hairy man, and I am a smooth man. 27:12 My father peradventure will feel me, and I shall seem to him as a mocker; and I shall bring a curse upon me, and not a blessing.' 27:13 And his mother said unto him: 'Upon me be thy curse, my son; only hearken to my voice, and go fetch me them.' 27:14 And he went, and fetched, and brought them to his mother; and his mother made savoury food, such as his father loved. 27:15 And Rebekah took the choicest garments of Esau her elder son, which were with her in the house, and put them upon Jacob her younger son. 27:16 And she put the skins of the kids of the goats upon his hands, and upon the smooth of his neck. 27:17 And she gave the savoury food and the bread, which she had prepared, into the hand of her son Jacob.",

          "html": "<span class=\"VerseNumber\"><b>27:18</b></span> And he came unto his father, and said: 'My father'; and he said: 'Here am I; who art thou, my son?' <span class=\"VerseNumber\"><b>27:19</b></span> <span class=\"horizontal1\"><b>And Jacob said unto his father: 'I am Esau thy first-born</b></span>; I have done according as thou badest me. Arise, I pray thee, sit and eat of my venison, that thy soul may bless me.' <span class=\"VerseNumber\"><b>27:20</b></span> And Isaac said unto his son: 'How is it that thou hast found it so quickly, my son?' And he said: 'Because the LORD thy God sent me good speed.' <span class=\"VerseNumber\"><b>27:21</b></span> And Isaac said unto Jacob: 'Come near, I pray thee, that I may feel thee, my son, whether thou be my very son Esau or not.' <span class=\"VerseNumber\"><b>27:22</b></span> And Jacob went near unto Isaac his father; and he felt him, and said: 'The voice is the voice of Jacob, but the hands are the hands of Esau.' <span class=\"VerseNumber\"><b>27:23</b></span> And he discerned him not, because his hands were hairy, as his brother Esau's hands; so he blessed him. <span class=\"VerseNumber\"><b>27:24</b></span> And he said: 'Art thou my very son Esau?' And he said: 'I am.' <span class=\"VerseNumber\"><b>27:25</b></span> And he said: 'Bring it near to me, and I will eat of my son's venison, that my soul may bless thee.' And he brought it near to him, and he did eat; and he brought him wine, and he drank. <span class=\"VerseNumber\"><b>27:26</b></span> And his father Isaac said unto him: 'Come near now, and kiss me, my son.' <span class=\"VerseNumber\"><b>27:27</b></span> And he came near, and kissed him. And he smelled the smell of his raiment, and blessed him, and said: See, the smell of my son is as the smell of a field which the LORD hath blessed. <span class=\"VerseNumber\"><b>27:28</b></span> So God give thee of the dew of heaven, and of the fat places of the earth, and plenty of corn and wine. <span class=\"VerseNumber\"><b>27:29</b></span> Let peoples serve thee, and nations bow down to thee. Be lord over thy brethren, and let thy mother's sons bow down to thee. Cursed be every one that curseth thee, and blessed be every one that blesseth thee.",
          "text": "27:18 And he came unto his father, and said: 'My father'; and he said: 'Here am I; who art thou, my son?' 27:19 And Jacob said unto his father: 'I am Esau thy first-born ; I have done according as thou badest me. Arise, I pray thee, sit and eat of my venison, that thy soul may bless me.' 27:20 And Isaac said unto his son: 'How is it that thou hast found it so quickly, my son?' And he said: 'Because the LORD thy God sent me good speed.' 27:21 And Isaac said unto Jacob: 'Come near, I pray thee, that I may feel thee, my son, whether thou be my very son Esau or not.' 27:22 And Jacob went near unto Isaac his father; and he felt him, and said: 'The voice is the voice of Jacob, but the hands are the hands of Esau.' 27:23 And he discerned him not, because his hands were hairy, as his brother Esau's hands; so he blessed him. 27:24 And he said: 'Art thou my very son Esau?' And he said: 'I am.' 27:25 And he said: 'Bring it near to me, and I will eat of my son's venison, that my soul may bless thee.' And he brought it near to him, and he did eat; and he brought him wine, and he drank. 27:26 And his father Isaac said unto him: 'Come near now, and kiss me, my son.' 27:27 And he came near, and kissed him. And he smelled the smell of his raiment, and blessed him, and said: See, the smell of my son is as the smell of a field which the LORD hath blessed. 27:28 So God give thee of the dew of heaven, and of the fat places of the earth, and plenty of corn and wine. 27:29 Let peoples serve thee, and nations bow down to thee. Be lord over thy brethren, and let thy mother's sons bow down to thee. Cursed be every one that curseth thee, and blessed be every one that blesseth thee.",

          "html": "<span class=\"VerseNumber\"><b>27:30</b></span> And it came to pass, as soon as Isaac had made an end of blessing Jacob, and Jacob was yet scarce gone out from the presence of Isaac his father, that Esau his brother came in from his hunting. <span class=\"VerseNumber\"><b>27:31</b></span> And he also made savoury food, and brought it unto his father; and he said unto his father: 'Let my father arise, and eat of his son's venison, that thy soul may bless me.' <span class=\"VerseNumber\"><b>27:32</b></span> And Isaac his father said unto him: 'Who art thou?' And he said: <span class=\"horizontal1\"><b>'I am thy son, thy first-born, Esau</b></span>.' <span class=\"VerseNumber\"><b>27:33</b></span> And Isaac trembled very exceedingly, and said: 'Who then is he that hath taken venison, and brought it me, and I have eaten of all before thou camest, and have blessed him? yea, and he shall be blessed.' <span class=\"VerseNumber\"><b>27:34</b></span> When Esau heard the words of his father, he cried with an exceeding great and bitter cry, and said unto his father: 'Bless me, even me also, O my father.' <span class=\"VerseNumber\"><b>27:35</b></span> And he said: 'Thy brother came with guile, and hath taken away thy blessing.' <span class=\"VerseNumber\"><b>27:36</b></span> And he said: 'Is not he rightly named Jacob? for he hath supplanted me these two times: he took away my birthright; and, behold, now he hath taken away my blessing.' And he said: 'Hast thou not reserved a blessing for me?' <span class=\"VerseNumber\"><b>27:37</b></span> And Isaac answered and said unto Esau: 'Behold, I have made him thy lord, and all his brethren have I given to him for servants; and with corn and wine have I sustained him; and what then shall I do for thee, my son?' <span class=\"VerseNumber\"><b>27:38</b></span> And Esau said unto his father: 'Hast thou but one blessing, my father? bless me, even me also, O my father.' And Esau lifted up his voice, and wept. <span clas id in his heart: 'Let the days of mourning for my father be at hand; then will I slay my brother Jacob.'",

          "html": "<span class=\"VerseNumber\"><b>28:10</b></span> And Jacob went out from Beer-sheba, and went toward Haran. <span class=\"VerseNumber\"><b>28:11</b></span> <span class=\"closure\"><b>And he lighted upon the place</b></span>, and tarried there all night, because the sun was set; and he took one of the stones of the place, and put it under his head, and lay down in that place to sleep. <span class=\"VerseNumber\"><b>28:12</b></span> And he dreamed, and behold a ladder set up on the earth, and the top of it reached to heaven; and behold <span class=\"closure\"><b>the angels of God</b></span> ascending and descending on it. <span class=\"VerseNumber\"><b>28:13</b></span> And, behold, the LORD stood beside him, and said: 'I am the LORD, the God of Abraham thy father, and the God of Isaac. The land whereon thou liest, to thee will I give it, and to thy seed. <span class=\"VerseNumber\"><b>28:14</b></span> And thy seed shall be as the dust of the earth, and thou shalt spread abroad to the west, and to the east, and to the north, and to the south. And in thee and in thy seed shall all the families of the earth be blessed. <span class=\"VerseNumber\"><b>28:15</b></span> And, behold, I am with thee, and will keep thee whithersoever thou goest, and will bring thee back into this land; for I will not leave thee, until I have done that which I have spoken to thee of.' <span class=\"VerseNumber\"><b>28:16</b></span> And Jacob awaked out of his sleep, and he said: 'Surely the LORD is in this place; and I knew it not.' <span class=\"VerseNumber\"><b>28:17</b></span> And he was afraid, and said: 'How full of awe is this place! this is none other than the house of God, and this is the gate of heaven.' <span class=\"VerseNumber\"><b>28:18</b></span> And Jacob rose up early in the morning, and took the stone that he had put under his head, and set it up for a pillar, and poured oil upon the top of it. <span class=\"VerseNumber\"><b>28:19</b></span> <span class=\"closure\"><b>And he called the name of that place</b></span> Beth-el, but the name of the city was Luz at the first. <span class=\"VerseNumber\"><b>28:20</b></span> And Jacob vowed a vow, saying: 'If God will be with me, and will keep me in this way that I go, and will give me bread to eat, and raiment to put on, <span class=\"VerseNumber\"><b>28:21</b></span> so that I come back to my father's house in peace, then shall the LORD be my God, <span class=\"VerseNumber\"><b>28:22</b></span> and this stone, which I have set up for a pillar, shall be God's house; and of all that Thou shalt give me I will surely give the tenth unto Thee.'",
          "text": "28:10 And Jacob went out from Beer-sheba, and went toward Haran. 28:11 And he lighted upon the place , and tarried there all night, because the sun was set; and he took one of the stones of the place, and put it under his head, and lay down in that place to sleep. 28:12 And he dreamed, and behold a ladder set up on the earth, and the top of it reached to heaven; and behold the angels of God ascending and descending on it. 28:13 And, behold, the LORD stood beside him, and said: 'I am the LORD, the God of Abraham thy father, and the God of Isaac. The land whereon thou liest, to thee will I give it, and to thy seed. 28:14 And thy seed shall be as the dust of the earth, and thou shalt spread abroad to the west, and to the east, and to the north, and to the south. And in thee and in thy seed shall all the families of the earth be blessed. 28:15 And, behold, I am with thee, and will keep thee whithersoever thou goest, and will bring thee back into this land; for I will not leave thee, until I have done that which I have spoken to thee of.' 28:16 And Jacob awaked out of his sleep, and he said: 'Surely the LORD is in this place; and I knew it not.' 28:17 And he was afraid, and said: 'How full of awe is this place! this is none other than the house of God, and this is the gate of heaven.' 28:18 And Jacob rose up early in the morning, and took the stone that he had put under his head, and set it up for a pillar, and poured oil upon the top of it. 28:19 And he called the name of that place Beth-el, but the name of the city was Luz at the first. 28:20 And Jacob vowed a vow, saying: 'If God will be with me, and will keep me in this way that I go, and will give me bread to eat, and raiment to put on, 28:21 so that I come back to my father's house in peace, then shall the LORD be my God, 28:22 and this stone, which I have set up for a pillar, shall be God's house; and of all that Thou shalt give me I will surely give the tenth unto Thee.'",

        {
          "label": "2A",
          "row": 1,
          "col": 0,
          "html": "<span class=\"VerseNumber\"><b>29:1</b></span> Then Jacob went on his journey, and came to the land of the children of the east. <span class=\"VerseNumber\"><b>29:2</b></span> <span class=\"horizontal1\"><b>And he looked</b></span>, and behold a well in the field, and, lo, three flocks of sheep lying there by it.--For out of that well they watered the flocks. And the stone upon the well's mouth was great. <span class=\"VerseNumber\"><b>29:3</b></span> And thither were all the flocks gathered; and they rolled the stone from the well's mouth, and watered the sheep, and put the stone back upon the well's mouth in its place.-- <span class=\"VerseNumber\"><b>29:4</b></span> And Jacob said unto them: 'My brethren, whence are ye?' And they said: 'Of Haran are we.' <span class=\"VerseNumber\"><b>29:5</b></span> And he said unto them: 'Know ye Laban the son of Nahor?' And they said: 'We know him.' <span class=\"VerseNumber\"><b>29:6</b></span> And he said unto them: 'Is it well with him?' And they said: 'It is well; and, behold, Rachel his daughter cometh with the sheep.' <span class=\"VerseNumber\"><b>29:7</b></span> And he said: 'Lo, it is yet high day, neither is it time that the cattle should be gathered together; water ye the sheep, and go and feed them.' <span class=\"VerseNumber\"><b>29:8</b></span> And they said: 'We cannot, until all the flocks be gathered together, and they roll the stone from the well's mouth; then we water the sheep.' <span class=\"VerseNumber\"><b>29:9</b></span> While he was yet speaking with them, Rachel came with her father's sheep; for she tended them. <span class=\"VerseNumber\"><b>29:10</b></span> And it came to pass, when Jacob saw Rachel the daughter of Laban his mother's brother, and the sheep of Laban his mother's brother, that Jacob went near, and rolled the stone from the well's mouth, and watered the flock of Laban his mother's brother. <span class=\"VerseNumber\"><b>29:11</b></span> And Jacob kissed Rachel, and lifted up his voice, and wept. <span class=\"VerseNumber\"><b>29:12</b></span> And Jacob told Rachel that he was her father's brother, and that he was Rebekah's son; and she ran and told her father. <span class=\"VerseNumber\"><b>29:13</b></span> And it came to pass, when Laban heard the tidings of Jacob his sister's son, that he ran to meet him, and embraced him, and kissed him, and brought him to his house. And he told Laban all these things. <span class=\"VerseNumber\"><b>29:14</b></span> And Laban said to him: 'Surely thou art my bone and my flesh.' And he abode with him the space of a month. <span class=\"VerseNumber\"><b>29:15</b></span> And Laban said unto Jacob: 'Because thou art my brother, shouldest thou therefore serve me for nought? tell me, what shall thy wages be?' <span class=\"VerseNumber\"><b>29:16</b></span> Now Laban had two daughters: the name of the elder was Leah, and the name of the younger was Rachel. <span class=\"VerseNumber\"><b>29:17</b></span> And Leah's eyes were weak; but Rachel was of beautiful form and fair to look upon. <span class=\"VerseNumber\"><b>29:18</b></span> And Jacob loved Rachel; and he said: 'I will serve thee seven years for Rachel thy younger daughter.' <span class=\"VerseNumber\"><b>29:19</b></span> And Laban said: 'It is better that I give her to thee, than that I should give her to another man; abide with me.' <span class=\"VerseNumber\"><b>29:20</b></span> And Jacob served seven years for Rachel; and they seemed unto him but a few days, for the love he had to her. <span class=\"VerseNumber\"><b>29:21</b></span> And Jacob said unto Laban: 'Give me my wife, for my days are filled, that I may go in unto her.' <span class=\"VerseNumber\"><b>29:22</b></span> And Laban gathered together all the men of the place, and made a feast. <span class=\"VerseNumber\"><b>29:23</b></span> And it came to pass in the evening, that he took Leah his daughter, and brought her to him; and he went in unto her. <span class=\"VerseNumber\"><b>29:24</b></span> And Laban gave Zilpah his handmaid unto his daughter Leah for a handmaid. <span class=\"VerseNumber\"><b>29:25</b></span> And it came to pass in the morning that, behold, it was Leah; and he said to Laban: 'What is this thou hast done unto me? did not I serve with thee for Rachel? wherefore then hast thou beguiled me?' <span class=\"VerseNumber\"><b>29:26</b></span> And Laban said: 'It is not so done in our place, to give the younger before the first-born. <span class=\"VerseNumber\"><b>29:27</b></span> Fulfil the week of this one, and we will give thee the other also for the service which thou shalt serve with me yet seven other years.' <span class=\"VerseNumber\"><b>29:28</b></span> And Jacob did so, and fulfilled her week; and he gave him Rachel his daughter to wife. <span class=\"VerseNumber\"><b>29:29</b></span> And Laban gave to Rachel his daughter Bilhah his handmaid to be her handmaid. <span class=\"VerseNumber\"><b>29:30</b></span> And he went in also unto Rachel, and he loved also Rachel more than Leah, and served with him yet seven other years.",
          "text": "29:1 Then Jacob went on his journey, and came to the land of the children of the east. 29:2 And he looked , and behold a well in the field, and, lo, three flocks of sheep lying there by it.--For out of that well they watered the flocks. And the stone upon the well's mouth was great. 29:3 And thither were all the flocks gathered; and they rolled the stone from the well's mouth, and watered the sheep, and put the stone back upon the well's mouth in its place.-- 29:4 And Jacob said unto them: 'My brethren, whence are ye?' And they said: 'Of Haran are we.' 29:5 And he said unto them: 'Know ye Laban the son of Nahor?' And they said: 'We know him.' 29:6 And he said unto them: 'Is it well with him?' And they said: 'It is well; and, behold, Rachel his daughter cometh with the sheep.' 29:7 And he said: 'Lo, it is yet high day, neither is it time that the cattle should be gathered together; water ye the sheep, and go and feed them.' 29:8 And they said: 'We cannot, until all the flocks be gathered together, and they roll the stone from the well's mouth; then we water the sheep.' 29:9 While he was yet speaking with them, Rachel came with her father's sheep; for she tended them. 29:10 And it came to pass, when Jacob saw Rachel the daughter of Laban his mother's brother, and the sheep of Laban his mother's brother, that Jacob went near, and rolled the stone from the well's mouth, and watered the flock of Laban his mother's brother. 29:11 And Jacob kissed Rachel, and lifted up his voice, and wept. 29:12 And Jacob told Rachel that he was her father's brother, and that he was Rebekah's son; and she ran and told her father. 29:13 And it came to pass, when Laban heard the tidings of Jacob his sister's son, that he ran to meet him, and embraced him, and kissed him, and brought him to his house. And he told Laban all these things. 29:14 And Laban said to him: 'Surely thou art my bone and my flesh.' And he abode with him the space of a month. 29:15 And Laban said unto Jacob: 'Because thou art my brother, shouldest thou therefore serve me for nought? tell me, what shall thy wages be?' 29:16 Now Laban had two daughters: the name of the elder was Leah, and the name of the younger was Rachel. 29:17 And Leah's eyes were weak; but Rachel was of beautiful form and fair to look upon. 29:18 And Jacob loved Rachel; and he said: 'I will serve thee seven years for Rachel thy younger daughter.' 29:19 And Laban said: 'It is better that I give her to thee, than that I should give her to another man; abide with me.' 29:20 And Jacob served seven years for Rachel; and they seemed unto him but a few days, for the love he had to her. 29:21 And Jacob said unto Laban: 'Give me my wife, for my days are filled, that I may go in unto her.' 29:22 And Laban gathered together all the men of the place, and made a feast. 29:23 And it came to pass in the evening, that he took Leah his daughter, and brought her to him; and he went in unto her. 29:24 And Laban gave Zilpah his handmaid unto his daughter Leah for a handmaid. 29:25 And it came to pass in the morning that, behold, it was Leah; and he said to Laban: 'What is this thou hast done unto me? did not I serve with thee for Rachel? wherefore then hast thou beguiled me?' 29:26 And Laban said: 'It is not so done in our place, to give the younger before the first-born. 29:27 Fulfil the week of this one, and we will give thee the other also for the service which thou shalt serve with me yet seven other years.' 29:28 And Jacob did so, and fulfilled her week; and he gave him Rachel his daughter to wife. 29:29 And Laban gave to Rachel his daughter Bilhah his handmaid to be her handmaid. 29:30 And he went in also unto Rachel, and he loved also Rachel more than Leah, and served with him yet seven other years.",

          "html": "<span class=\"VerseNumber\"><b>29:31</b></span> And the LORD saw that Leah was hated, and he opened her womb; but Rachel was barren. <span class=\"VerseNumber\"><b>29:32</b></span> And Leah conceived, and bore a son, <span class=\"horizontal1\"><b>and she called his name Reuben</b></span>; for she said: 'Because the LORD hath looked upon my affliction; for now my husband will love me.' <span class=\"VerseNumber\"><b>29:33</b></span> And she conceived again, and bore a son; and said: 'Because the LORD hath heard that I am hated, He hath therefore given me this son also.' <span class=\"horizontal1\"><b>And she called his name Simeon</b></span>. <span class=\"VerseNumber\"><b>29:34</b></span> And she conceived again, and bore a son; and said: 'Now this time will my husband be joined unto me, because I have borne him three sons.' Therefore <span class=\"horizontal1\"><b>was his name called Levi</b></span>. <span class=\"VerseNumber\"><b>29:35</b></span> And she conceived again, and bore a son; and she said: 'This time will I praise the LORD.' Therefore <span class=\"horizontal1\"><b>she called his name Judah</b></span>; and she left off bearing. <span class=\"VerseNumber\"><b>30:1</b></span> And when Rachel saw that she bore Jacob no children, Rachel envied her sister; and she said unto Jacob: 'Give me children, or else I die.' <span class=\"VerseNumber\"><b>30:2</b></span> And Jacob's anger was kindled against Rachel; and he said: 'Am I in God's stead, who hath withheld from thee the fruit of the womb?' <span class=\"VerseNumber\"><b>30:3</b></span> And she said: 'Behold my maid Bilhah, go in unto her; that she may bear upon my knees, and I also may be builded up through her.' <span class=\"VerseNumber\"><b>30:4</b></span> And she gave him Bilhah her handmaid to wife; and Jacob went in unto her. <span class=\"VerseNumber\"><b>30:5</b></span> And Bilhah conceived, and bore Jacob a son. <span class=\"VerseNumber\"><b>30:6</b></span> And Rachel said: 'God hath judged me, and hath also heard my voice, and hath given me a son.' Therefore <span class=\"horizontal1\"><b>called she his name Dan</b></span>. <span class=\"VerseNumber\"><b>30:7</b></span> And Bilhah Rachel's handmaid conceived again, and bore Jacob a second son. <span class=\"VerseNumber\"><b>30:8</b></span> And Rachel said: 'With mighty wrestlings have I wrestled with my sister, and have prevailed.' <span class=\"horizontal1\"><b>And she called his name Naphtali</b></span>. <span class=\"VerseNumber\"><b>30:9</b></span> When Leah saw that she had left off bearing, she took Zilpah her handmaid, and gave her to Jacob to wife. <span class=\"VerseNumber\"><b>30:10</b></span> And Zilpah Leah's handmaid bore Jacob a son. <span class=\"VerseNumber\"><b>30:11</b></span> And Leah said: 'Fortune is come!' <span class=\"horizontal1\"><b>And she called his name Gad</b></span>. <span class=\"VerseNumber\"><b>30:12</b></span> And Zilpah Leah's handmaid bore Jacob a second son. <span class=\"VerseNumber\"><b>30:13</b></span> And Leah said: 'Happy am I! for the daughters will call me happy.' <span class=\"horizontal1\"><b>And she called his name Asher</b></span>. <span class=\"VerseNumber\"><b>30:14</b></span> And Reuben went in the days of wheat harvest, and found mandrakes in the field, and brought them unto his mother Leah. Then Rachel said to Leah: 'Give me, I pray thee, of thy son's mandrakes.' <span class=\"VerseNumber\"><b>30:15</b></span> And she said unto her: 'Is it a small matter that thou hast taken away my husband? and wouldest thou take away my son's mandrakes also?' And Rachel said: 'Therefore he shall lie with thee to-night for thy son's mandrakes.' <span class=\"VerseNumber\"><b>30:16</b></span> And Jacob came from the field in the evening, and Leah went out to meet him, and said: 'Thou must come in unto me; for I have surely hired thee with my son's mandrakes.' And he lay with her that night. <span class=\"VerseNumber\"><b>30:17</b></span> And God hearkened unto Leah, and she conceived, and bore Jacob a fifth son. <span class=\"VerseNumber\"><b>30:18</b></span> And Leah said: 'God hath given me my hire, because I gave my handmaid to my husband. <span class=\"horizontal1\"><b>And she called his name Issachar</b></span>. <span class=\"VerseNumber\"><b>30:19</b></span> And Leah conceived again, and bore a sixth son to Jacob. <span class=\"VerseNumber\"><b>30:20</b></span> And Leah said: 'God hath endowed me with a good dowry; now will my husband dwell with me, because I have borne him six sons.' <span class=\"horizontal1\"><b>And she called his name Zebulun</b></span>. <span class=\"VerseNumber\"><b>30:21</b></span> <span class=\"horizontal1\"><b>And afterwards she bore a daughter, and called her name Dinah</b></span>. <span class=\"VerseNumber\"><b>30:22</b></span> And God remembered Rachel, and God hearkened to her, and opened her womb. <span class=\"VerseNumber\"><b>30:23</b></span> And she conceived, and bore a son, and said: 'God hath taken away my reproach.' <span class=\"VerseNumber\"><b>30:24</b></span> <span class=\"horizontal1\"><b>And she called his name Joseph</b></span>, saying: 'The LORD add to me another son.'",
          "text": "29:31 And the LORD saw that Leah was hated, and he opened her womb; but Rachel was barren. 29:32 And Leah conceived, and bore a son, and she called his name Reuben ; for she said: 'Because the LORD hath looked upon my affliction; for now my husband will love me.' 29:33 And she conceived again, and bore a son; and said: 'Because the LORD hath heard that I am hated, He hath therefore given me this son also.' And she called his name Simeon . 29:34 And she conceived again, and bore a son; and said: 'Now this time will my husband be joined unto me, because I have borne him three sons.' Therefore was his name called Levi . 29:35 And she conceived again, and bore a son; and she said: 'This time will I praise the LORD.' Therefore she called his name Judah ; and she left off bearing. 30:1 And when Rachel saw that she bore Jacob no children, Rachel envied her sister; and she said unto Jacob: 'Give me children, or else I die.' 30:2 And Jacob's anger was kindled against Rachel; and he said: 'Am I in God's stead, who hath withheld from thee the fruit of the womb?' 30:3 And she said: 'Behold my maid Bilhah, go in unto her; that she may bear upon my knees, and I also may be builded up through her.' 30:4 And she gave him Bilhah her handmaid to wife; and Jacob went in unto her. 30:5 And Bilhah conceived, and bore Jacob a son. 30:6 And Rachel said: 'God hath judged me, and hath also heard my voice, and hath given me a son.' Therefore called she his name Dan . 30:7 And Bilhah Rachel's handmaid conceived again, and bore Jacob a second son. 30:8 And Rachel said: 'With mighty wrestlings have I wrestled with my sister, and have prevailed.' And she called his name Naphtali . 30:9 When Leah saw that she had left off bearing, she took Zilpah her handmaid, and gave her to Jacob to wife. 30:10 And Zilpah Leah's handmaid bore Jacob a son. 30:11 And Leah said: 'Fortune is come!' And she called his name Gad . 30:12 And Zilpah Leah's handmaid bore Jacob a second son. 30:13 And Leah said: 'Happy am I! for the daughters will call me happy.' And she called his name Asher . 30:14 And Reuben went in the days of wheat harvest, and found mandrakes in the field, and brought them unto his mother Leah. Then Rachel said to Leah: 'Give me, I pray thee, of thy son's mandrakes.' 30:15 And she said unto her: 'Is it a small matter that thou hast taken away my husband? and wouldest thou take away my son's mandrakes also?' And Rachel said: 'Therefore he shall lie with thee to-night for thy son's mandrakes.' 30:16 And Jacob came from the field in the evening, and Leah went out to meet him, and said: 'Thou must come in unto me; for I have surely hired thee with my son's mandrakes.' And he lay with her that night. 30:17 And God hearkened unto Leah, and she conceived, and bore Jacob a fifth son. 30:18 And Leah said: 'God hath given me my hire, because I gave my handmaid to my husband. And she called his name Issachar . 30:19 And Leah conceived again, and bore a sixth son to Jacob. 30:20 And Leah said: 'God hath endowed me with a good dowry; now will my husband dwell with me, because I have borne him six sons.' And she called his name Zebulun . 30:21 And afterwards she bore a daughter, and called her name Dinah . 30:22 And God remembered Rachel, and God hearkened to her, and opened her womb. 30:23 And she conceived, and bore a son, and said: 'God hath taken away my reproach.' 30:24 And she called his name Joseph , saying: 'The LORD add to me another son.'",

          "html": "<span class=\"VerseNumber\"><b>30:25</b></span> And it came to pass, when Rachel had borne Joseph, that Jacob said unto Laban: 'Send me away, that I may go unto mine own place, and to my country. <span class=\"VerseNumber\"><b>30:26</b></span> Give me my wives and my children for whom I have served thee, and let me go; for thou knowest my service wherewith I have served thee.' <span class=\"VerseNumber\"><b>30:27</b></span> And Laban said unto him: 'If now I have found favour in thine eyes--I have observed the signs, and the LORD hath blessed me for thy sake.' <span class=\"VerseNumber\"><b>30:28</b></span> And he said: 'Appoint me thy wages, and I will give it.' <span class=\"VerseNumber\"><b>30:29</b></span> And he said unto him: 'Thou knowest how I have served thee, and how thy cattle have fared with me. <span class=\"VerseNumber\"><b>30:30</b></span> For it was little which thou hadst before I came, and it hath increased abundantly; and the LORD hath blessed thee whithersoever I turned. And now when shall I provide for mine own house also?' <span class=\"VerseNumber\"><b>30:31</b></span> And he said: 'What shall I give thee?' And Jacob said: 'Thou shalt not give me aught; if thou wilt do this thing for me, I will again feed thy flock and keep it. <span class=\"VerseNumber\"><b>30:32</b></span> I will pass through all thy flock to-day, removing from thence every speckled and spotted one, and every dark one among the sheep, and the spotted and speckled among the goats; and of such shall be my hire. <span class=\"VerseNumber\"><b>30:33</b></span> So shall my righteousness witness against me hereafter, when thou shalt come to look over my hire that is before thee: every one that is not speckled and spotted among the goats, and dark among the sheep, that if found with me shall be counted stolen.' <span class=\"VerseNumber\"><b>30:34</b></span> And Laban said: 'Behold, would it might be according to thy word.' <span class=\"VerseNumber\"><b>30:35</b></span> And he removed that day the he-goats that were streaked and spotted, and all the she-goats that were speckled and spotted, every one that had white in it, and all the dark ones among the sheep, and gave them into the hand of his sons. <span class=\"VerseNumber\"><b>30:36</b></span> And he set three days' journey betwixt himself and Jacob. And Jacob fed the rest of Laban's flocks. <span class=\"VerseNumber\"><b>30:37</b></span> And Jacob took him rods of fresh poplar, and of the almond and of the plane-tree; and peeled white streaks in them, making the white appear which was in the rods. <span class=\"VerseNumber\"><b>30:38</b></span> And he set the rods which he had peeled over against the flocks in the gutters in the watering-troughs where the flocks came to drink; and they conceived when they came to drink. <span class=\"VerseNumber\"><b>30:39</b></span> And the flocks conceived at the sight of the rods, and the flocks brought forth streaked, speckled, and spotted. <span class=\"VerseNumber\"><b>30:40</b></span> And Jacob separated the lambs--he also set the faces of the flocks toward the streaked and all the dark in the flock of Laban--and put his own droves apart, and put them not unto Laban's flock. <span class=\"VerseNumber\"><b>30:41</b></span> And it came to pass, whensoever the stronger of the flock did conceive, that Jacob laid the rods before the eyes of the flock in the gutters, that they might conceive among the rods; <span class=\"VerseNumber\"><b>30:42</b></span> but when the flock were feeble, he put them not in; so the feebler were Laban's, and the stronger Jacob's. <span class=\"VerseNumber\"><b>30:43</b></span> And the man increased exceedingly, and had large flocks, and maid-servants and men-servants, and camels and asses.",
          "text": "30:25 And it came to pass, when Rachel had borne Joseph, that Jacob said unto Laban: 'Send me away, that I may go unto mine own place, and to my country. 30:26 Give me my wives and my children for whom I have served thee, and let me go; for thou knowest my service wherewith I have served thee.' 30:27 And Laban said unto him: 'If now I have found favour in thine eyes--I have observed the signs, and the LORD hath blessed me for thy sake.' 30:28 And he said: 'Appoint me thy wages, and I will give it.' 30:29 And he said unto him: 'Thou knowest how I have served thee, and how thy cattle have fared with me. 30:30 For it was little which thou hadst before I came, and it hath increased abundantly; and the LORD hath blessed thee whithersoever I turned. And now when shall I provide for mine own house also?' 30:31 And he said: 'What shall I give thee?' And Jacob said: 'Thou shalt not give me aught; if thou wilt do this thing for me, I will again feed thy flock and keep it. 30:32 I will pass through all thy flock to-day, removing from thence every speckled and spotted one, and every dark one among the sheep, and the spotted and speckled among the goats; and of such shall be my hire. 30:33 So shall my righteousness witness against me hereafter, when thou shalt come to look over my hire that is before thee: every one that is not speckled and spotted among the goats, and dark among the sheep, that if found with me shall be counted stolen.' 30:34 And Laban said: 'Behold, would it might be according to thy word.' 30:35 And he removed that day the he-goats that were streaked and spotted, and all the she-goats that were speckled and spotted, every one that had white in it, and all the dark ones among the sheep, and gave them into the hand of his sons. 30:36 And he set three days' journey betwixt himself and Jacob. And Jacob fed the rest of Laban's flocks. 30:37 And Jacob took him rods of fresh poplar, and of the almond and of the plane-tree; and peeled white streaks in them, making the white appear which was in the rods. 30:38 And he set the rods which he had peeled over against the flocks in the gutters in the watering-troughs where the flocks came to drink; and they conceived when they came to drink. 30:39 And the flocks conceived at the sight of the rods, and the flocks brought forth streaked, speckled, and spotted. 30:40 And Jacob separated the lambs--he also set the faces of the flocks toward the streaked and all the dark in the flock of Laban--and put his own droves apart, and put them not unto Laban's flock. 30:41 And it came to pass, whensoever the stronger of the flock did conceive, that Jacob laid the rods before the eyes of the flock in the gutters, that they might conceive among the rods; 30:42 but when the flock were feeble, he put them not in; so the feebler were Laban's, and the stronger Jacob's. 30:43 And the man increased exceedingly, and had large flocks, and maid-servants and men-servants, and camels and asses.",

          "html": "<span class=\"VerseNumber\"><b>31:1</b></span> And he heard the words of Laban's sons, saying: 'Jacob hath taken away all that was our father's; and of that which was our father's hath he gotten all this wealth.' <span class=\"VerseNumber\"><b>31:2</b></span> <span class=\"horizontal1\"><b>And Jacob beheld</b></span> the countenance of Laban, and, behold, it was not toward him as beforetime. <span class=\"VerseNumber\"><b>31:3</b></span> And the LORD said unto Jacob: 'Return unto the land of thy fathers, and to thy kindred; and I will be with thee.' <span class=\"VerseNumber\"><b>31:4</b></span> And Jacob sent and called Rachel and Leah to the field unto his flock, <span class=\"VerseNumber\"><b>31:5</b></span> and said unto them: 'I see your father's countenance, that it is not toward me as beforetime; but the God of my father hath been with me. <span class=\"VerseNumber\"><b>31:6</b></span> And ye know that with all my power I have served your father. <span class=\"VerseNumber\"><b>31:7</b></span> And your father hath mocked me, and changed my wages ten times; but God suffered him not to hurt me. <span class=\"VerseNumber\"><b>31:8</b></span> If he said thus: The speckled shall be thy wages; then all the flock bore speckled; and if he said thus: The streaked shall be thy wages; then bore all the flock streaked. <span class=\"VerseNumber\"><b>31:9</b></span> Thus God hath taken away the cattle of your father, and given them to me. <span class=\"VerseNumber\"><b>31:10</b></span> And it came to pass at the time that the flock conceived, that I lifted up mine eyes, and saw in a dream, and, behold, the he-goats which leaped upon the flock were streaked, speckled, and grizzled. <span class=\"VerseNumber\"><b>31:11</b></span> And the angel of God said unto me in the dream: Jacob; and I said: Here am I. <span class=\"VerseNumber\"><b>31:12</b></span> And he said: Lift up now thine eyes, and see, all the he-goats which leap upon the flock are streaked, speckled, and grizzled; for I have seen all that Laban doeth unto thee. <span class=\"VerseNumber\"><b>31:13</b></span> I am the God of Beth-el, where thou didst anoint a pillar, where thou didst vow a vow unto Me. Now arise, get thee out from this land, and return unto the land of thy nativity.' <span class=\"VerseNumber\"><b>31:14</b></span> And Rachel and Leah answered and said unto him: 'Is there yet any portion or inheritance for us in our father's house? <span class=\"VerseNumber\"><b>31:15</b></span> Are we not accounted by him strangers? for he hath sold us, and hath also quite devoured our price. <span class=\"VerseNumber\"><b>31:16</b></span> For all the riches which God hath taken away from our father, that is ours and our children's. Now then, whatsoever God hath said unto thee, do.' <span class=\"VerseNumber\"><b>31:17</b></span> Then Jacob rose up, and set his sons and his wives upon the camels; <span class=\"VerseNumber\"><b>31:18</b></span> and he carried away all his cattle, and all his substance which he had gathered, the cattle of his getting, which he had gathered in Paddan-aram, to go to Isaac his father unto the land of Canaan.",
          "text": "31:1 And he heard the words of Laban's sons, saying: 'Jacob hath taken away all that was our father's; and of that which was our father's hath he gotten all this wealth.' 31:2 And Jacob beheld the countenance of Laban, and, behold, it was not toward him as beforetime. 31:3 And the LORD said unto Jacob: 'Return unto the land of thy fathers, and to thy kindred; and I will be with thee.' 31:4 And Jacob sent and called Rachel and Leah to the field unto his flock, 31:5 and said unto them: 'I see your father's countenance, that it is not toward me as beforetime; but the God of my father hath been with me. 31:6 And ye know that with all my power I have served your father. 31:7 And your father hath mocked me, and changed my wages ten times; but God suffered him not to hurt me. 31:8 If he said thus: The speckled shall be thy wages; then all the flock bore speckled; and if he said thus: The streaked shall be thy wages; then bore all the flock streaked. 31:9 Thus God hath taken away the cattle of your father, and given them to me. 31:10 And it came to pass at the time that the flock conceived, that I lifted up mine eyes, and saw in a dream, and, behold, the he-goats which leaped upon the flock were streaked, speckled, and grizzled. 31:11 And the angel of God said unto me in the dream: Jacob; and I said: Here am I. 31:12 And he said: Lift up now thine eyes, and see, all the he-goats which leap upon the flock are streaked, speckled, and grizzled; for I have seen all that Laban doeth unto thee. 31:13 I am the God of Beth-el, where thou didst anoint a pillar, where thou didst vow a vow unto Me. Now arise, get thee out from this land, and return unto the land of thy nativity.' 31:14 And Rachel and Leah answered and said unto him: 'Is there yet any portion or inheritance for us in our father's house? 31:15 Are we not accounted by him strangers? for he hath sold us, and hath also quite devoured our price. 31:16 For all the riches which God hath taken away from our           "html": "<span class=\"VerseNumber\"><b>31:19</b></span> Now Laban was gone to shear his sheep. And Rachel stole the teraphim that were her father's. <span class=\"VerseNumber\"><b>31:20</b></span> And Jacob outwitted Laban the Aramean, in that he told him not that he fled. <span class=\"VerseNumber\"><b>31:21</b></span> So he fled with all that he had; and he rose up, and passed over the River, and set his face toward the mountain of Gilead. <span class=\"VerseNumber\"><b>31:22</b></span> And it was told Laban on the third day that Jacob was fled. <span class=\"VerseNumber\"><b>31:23</b></span> And he took his brethren with him, and pursued after him seven days' journey; and he overtook him in the mountain of Gilead. <span class=\"VerseNumber\"><b>31:24</b></span> And God came to Laban the Aramean in a dream of the night, and said unto him: 'Take heed to thyself that thou speak not to Jacob either good or bad.' <span class=\"VerseNumber\"><b>31:25</b></span> And Laban came up with Jacob. Now Jacob had pitched his tent in the mountain; and Laban with his brethren pitched in the mountain of Gilead. <span class=\"VerseNumber\"><b>31:26</b></span> And Laban said to Jacob: 'What hast thou done, that thou hast outwitted me, and carried away my daughters as though captives of the sword? <span class=\"VerseNumber\"><b>31:27</b></span> Wherefore didst thou flee secretly, and outwit me; and didst not tell me, that I might have sent thee away with mirth and with songs, with tabret and with harp; <span class=\"VerseNumber\"><b>31:28</b></span> and didst not suffer me to kiss my sons and my daughters? now hast thou done foolishly. <span class=\"VerseNumber\"><b>31:29</b></span> It is in the power of my hand to do you hurt; but the God of your father spoke unto me yesternight, saying: Take heed to thyself that thou speak not to Jacob either good or bad. <span class=\"VerseNumber\"><b>31:30</b></span> And now that thou art surely gone, because thou sore longest after thy father's house, wherefore hast thou stolen my gods?' <span class=\"VerseNumber\"><b>31:31</b></span> And Jacob answered and said to Laban: 'Because I was afraid; for I said: Lest thou shouldest take thy daughters from me by force. <span class=\"VerseNumber\"><b>31:32</b></span> With whomsoever thou findest thy gods, he shall not live; before our brethren discern thou what is thine with me, and take it to thee.'--For Jacob knew not that Rachel had stolen them.-- <span class=\"VerseNumber\"><b>31:33</b></span> And Laban went into Jacob's tent, and into Leah's tent, and into the tent of the two maid-servants; but he found them not. And he went out of Leah's tent, and entered into Rachel's tent. <span class=\"VerseNumber\"><b>31:34</b></span> Now Rachel had taken the teraphim, and put them in the saddle of the camel, and sat upon them. And Laban felt about all the tent, but found them not. <span class=\"VerseNumber\"><b>31:35</b></span> And she said to her father: 'Let not my lord be angry that I cannot rise up before thee; for the manner of women is upon me.' And he searched, but found not the teraphim.",

          "html": "<span class=\"VerseNumber\"><b>31:36</b></span> And Jacob was wroth, and strove with Laban. And Jacob answered and said to Laban: 'What is my trespass? what is my sin, that thou hast hotly pursued after me? <span class=\"VerseNumber\"><b>31:37</b></span> Whereas thou hast felt about all my stuff, what hast thou found of all thy household stuff? Set it here before my brethren and thy brethren, that they may judge betwixt us two. <span class=\"VerseNumber\"><b>31:38</b></span> These twenty years have I been with thee; thy ewes and thy she-goats have not cast their young, and the rams of thy flocks have I not eaten. <span class=\"VerseNumber\"><b>31:39</b></span> That which was torn of beasts I brought not unto thee; I bore the loss of it; of my hand didst thou require it, whether stolen by day or stolen by night. <span class=\"VerseNumber\"><b>31:40</b></span> Thus I was: in the day the drought consumed me, and the frost by night; and my sleep fled from mine eyes. <span class=\"VerseNumber\"><b>31:41</b></span> These twenty years have I been in thy house: I served thee fourteen years for thy two daughters, and six years for thy flock; and thou hast changed my wages ten times. <span class=\"VerseNumber\"><b>31:42</b></span> Except the God of my father, the God of Abraham, and the Fear of Isaac, had been on my side, surely now hadst thou sent me away empty. God hath seen mine affliction and the labour of my hands, and gave judgment yesternight.' <span class=\"VerseNumber\"><b>31:43</b></span> And Laban answered and said unto Jacob: 'The daughters are my daughters, and the children are my children, and the flocks are my flocks, and all that thou seest is mine; and what can I do this day for these my daughters, or for their children whom they have borne? <span class=\"VerseNumber\"><b>31:44</b></span> And now come, let us make a covenant, I and thou; and let it be for a witness between me and thee.' <span class=\"VerseNumber\"><b>31:45</b></span> And Ja en me and thee, when we are absent one from another. 31:50 If thou shalt afflict my daughters, and if thou shalt take wives beside my daughters, no man being with us; see, God is witness betwixt me and thee.' 31:51 And Laban said to Jacob: 'Behold this heap, and behold the pillar, which I have set up betwixt me and thee. 31:52 This heap be witness, and the pillar be witness, that I will not pass over this heap to thee, and that thou shalt not pass over this heap and this pillar unto me, for harm. 31:53 The God of Abraham, and the God of Nahor, the God of their father, judge betwixt us.' And Jacob swore by the Fear of his father Isaac. 31:54 And Jacob offered a sacrifice in the mountain, and called his brethren to eat bread; and they did eat bread, and tarried all night in the mountain. 32:1 And early in the morning Laban rose up, and kissed his sons and his daughters, and blessed them. And Laban departed, and returned unto his place.",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>32:4</b></span> And Jacob <span class=\"vertical1\"><b>sent </b></span>messengers\n  before him to Esau his brother unto the land of Seir, the field of Edom. <span class=\"VerseNumber\"><b>32:5</b></span> And he commanded them, saying: 'Thus\n  shall ye say unto my lord Esau: Thus saith thy servant Jacob: I have\n  sojourned with Laban, and stayed until now. <span class=\"VerseNumber\"><b>32:6</b></span>\n  And I have oxen, and asses and flocks, and men-servants and maid-servants;\n  and <span class=\"vertical1\"><b>I have sent</b></span> to tell my lord, that I\n  may find favour in thy sight.' <span class=\"VerseNumber\"><b>32:7</b></span> And\n  the messengers returned to Jacob, saying: 'We came to thy brother Esau, and\n  moreover he cometh to meet thee, and four hundred men with him.' <span class=\"VerseNumber\"><b>32:8</b></span> Then Jacob was greatly afraid and was\n  distressed. And he divided the people that was with him, and the flocks, and\n  the herds, and the camels, into two camps. <span class=\"VerseNumber\"><b>32:9</b></span>\n  And he said: 'If Esau come to the one camp, and smite it, then the camp which\n  is left shall escape.'",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>32:14</b></span> And he lodged there that night; and\n  took of that which he had with him a present for Esau his brother: <span class=\"VerseNumber\"><b>32:15</b></span> two hundred she-goats and twenty\n  he-goats, two hundred ewes and twenty rams, <span class=\"VerseNumber\"><b>32:16</b></span>\n  thirty milch camels and their colts, forty kine and ten bulls, twenty\n  she-asses and ten foals. <span class=\"VerseNumber\"><b>32:17</b></span> And he\n  delivered them into the hand of his servants, every drove by itself; and said\n  unto his servants: 'Pass over before me, and put a space betwixt drove and\n  drove.' <span class=\"VerseNumber\"><b>32:18</b></span> And he commanded the\n  foremost, saying: 'When Esau my brother meeteth thee, and asketh thee,\n  saying: Whose art thou? and whither goest thou? and whose are these before\n  thee? <span class=\"VerseNumber\"><b>32:19</b></span> then thou shalt say: They\n  are thy servant Jacob's; it is a present sent unto my lord, even unto Esau;\n  and, behold, he also is behind us.' <span class=\"VerseNumber\"><b>32:20</b></span>\n  And he commanded also the second, and the third, and all that followed the\n  droves, saying: 'In this manner shall ye speak unto Esau, when ye find him; <span class=\"VerseNumber\"><b>32:21</b></span> and ye shall say: Moreover, behold, thy\n  servant Jacob is behind us.' For he said: 'I will appease him with the\n  present that goeth before me, and afterward I will see his face; peradventure\n  he will accept me.'",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>32:10</b></span> And Jacob said: 'O God of my father\n  Abraham, and God of my father Isaac, O LORD, who saidst unto me: Return unto\n  thy country, and to thy kindred, and I will do thee good; <span class=\"VerseNumber\"><b>32:11</b></span> I am not worthy of all the mercies, and\n  of all the truth, which Thou hast shown unto Thy servant; for with my staff I\n  passed over this Jordan; and now I am become two camps. <span class=\"VerseNumber\"><b>32:12</b></span> Deliver me, I pray Thee, from the hand\n  of my brother, from the hand of Esau; for I fear him, lest he come and smite\n  me, <span class=\"horizontal1\"><b>the mother with the children</b></span>. <span class=\"VerseNumber\"><b>32:13</b></span> And Thou saidst: I will surely do thee\n  good, and make thy seed as the sand of the sea, which cannot be numbered for\n  multitude.'",

          "col": 0,
          "html": "<span class=\"VerseNumber\"><b>34:1</b></span> And Dinah the daughter of Leah, whom she had borne unto Jacob, went out to see the daughters of the land. <span class=\"VerseNumber\"><b>34:2</b></span> And Shechem the son of Hamor the Hivite, the prince of the land, saw her; and he took her, and lay with her, and humbled her. <span class=\"VerseNumber\"><b>34:3</b></span> And his soul did cleave unto Dinah the daughter of Jacob, and he loved the damsel, and spoke comfortingly unto the damsel. <span class=\"VerseNumber\"><b>34:4</b></span> And Shechem spoke unto his father Hamor, saying: 'Get me this damsel to wife.' <span class=\"VerseNumber\"><b>34:5</b></span> <span class=\"vertical1\"><b>Now Jacob heard</b></span> that he had defiled Dinah his daughter; and his sons were with <span class=\"vertical1\"><b>his cattle</b></span> in the field; and Jacob held his peace until they came. <span class=\"VerseNumber\"><b>34:6</b></span> And Hamor the father of Shechem went out unto Jacob to speak with him. <span class=\"VerseNumber\"><b>34:7</b></span> And the sons of Jacob came in from the field when they heard it; and the men were grieved, and they were very wroth, because he had wrought a vile deed in Israel in lying with Jacob's daughter; which thing ought not to be done. <span class=\"VerseNumber\"><b>34:8</b></span> And Hamor spoke with them, saying 'The soul of my son Shechem longeth for your daughter. I pray you give her unto him to wife. <span class=\"VerseNumber\"><b>34:9</b></span> And make ye marriages with us; give your daughters unto us, and take our daughters unto you. <span class=\"VerseNumber\"><b>34:10</b></span> And ye shall dwell with us; and the land shall be before you; dwell and trade ye therein, and get you possessions therein.' <span class=\"VerseNumber\"><b>34:11</b></span> And Shechem said unto her father and unto her brethren: 'Let me find favour in your eyes, and what ye shall say unto me I will give. <span class=\"VerseNumber\"><b>34:12</b></span> Ask me never so much dowry and gift, and I will give according as ye shall say unto me; but give me the damsel to wife.' <span class=\"VerseNumber\"><b>34:13</b></span> And the sons of Jacob <span class=\"vertical1\"><b>answered</b></span> Shechem and Hamor his father with guile, and spoke, because he had defiled Dinah their sister, <span class=\"VerseNumber\"><b>34:14</b></span> and said unto them: 'We cannot do this thing, to give our sister to one that is uncircumcised; for that were a reproach unto us. <span class=\"VerseNumber\"><b>34:15</b></span> Only on this condition will we consent unto you: if ye will be as we are, that every male of you be circumcised; <span class=\"VerseNumber\"><b>34:16</b></span> then will we give our daughters unto you, and we will take your daughters to us, and we will dwell with you, and we will become one people. <span class=\"VerseNumber\"><b>34:17</b></span> But if ye will not hearken unto us, to be circumcised; then will we take our daughter, and we will be gone.' <span class=\"VerseNumber\"><b>34:18</b></span> And their words pleased Hamor, and Shechem Hamor's son. <span class=\"VerseNumber\"><b>34:19</b></span> And the young man deferred not to do the thing, because he had delight in Jacob's daughter. And he was honoured above all the house of his father.",
          "text": "34:1 And Dinah the daughter of Leah, whom she had borne unto Jacob, went out to see the daughters of the land. 34:2 And Shechem the son of Hamor the Hivite, the prince of the land, saw her; and he took her, and lay with her, and humbled her. 34:3 And his soul did cleave unto Dinah the daughter of Jacob, and he loved the damsel, and spoke comfortingly unto the damsel. 34:4 And Shechem spoke unto his father Hamor, saying: 'Get me this damsel to wife.' 34:5 Now Jacob heard that he had defiled Dinah his daughter; and his sons were with his cattle in the field; and Jacob held his peace until they came. 34:6 And Hamor the father of Shechem went out unto Jacob to speak with him. 34:7 And the sons of Jacob came in from the field when they heard it; and the men were grieved, and they were very wroth, because he had wrought a vile deed in Israel in lying with Jacob's daughter; which thing ought not to be done. 34:8 And Hamor spoke with them, saying 'The soul of my son Shechem longeth for your daughter. I pray you give her unto him to wife. 34:9 And make ye marriages with us; give your daughters unto us, and take our daughters unto you. 34:10 And ye shall dwell with us; and the land shall be before you; dwell and trade ye therein, and get you possessions therein.' 34:11 And Shechem said unto her father and unto her brethren: 'Let me find favour in your eyes, and what ye shall say unto me I will give. 34:12 Ask me never so much dowry and gift, and I will give according as ye shall say unto me; but give me the damsel to wife.' 34:13 And the sons of Jacob answered Shechem and Hamor his father with guile, and spoke, because he had defiled Dinah their sister, 34:14 and said unto them: 'We cannot do this thing, to give our sister to one that is uncircumcised; for that were a reproach unto us. 34:15 Only on this condition will we consent unto you: if ye will be as we are, that every male of you be circumcised; 34:16 then will we give our daughters unto you, and we will take your daughters to us, and we will dwell with you, and we will become one people. 34:17 But if ye will not hearken unto us, to be circumcised; then will we take our daughter, and we will be gone.' 34:18 And their words pleased Hamor, and Shechem Hamor's son. 34:19 And the young man deferred not to do the thing, because he had delight in Jacob's daughter. And he was honoured above all the house of his father.",

          "html": "<span class=\"VerseNumber\"><b>34:20</b></span> <span class=\"vertical1\"><b>And Hamor and Shechem his son came unto the gate of their city</b></span>, and spoke with the men of their city, saying: <span class=\"VerseNumber\"><b>34:21</b></span> 'These men are peaceable with us; therefore let them dwell in the land, and trade therein; for, behold, the land is large enough for them; let us take their daughters to us for wives, and let us give them our daughters. <span class=\"VerseNumber\"><b>34:22</b></span> Only on this condition will the men consent unto us to dwell with us, to become one people, if every male among us be circumcised, as they are circumcised. <span class=\"VerseNumber\"><b>34:23</b></span> Shall not their cattle and <span class=\"vertical1\"><b>their substance</b></span> and all their beasts be ours? only let us consent unto them, and they will dwell with us.' <span class=\"VerseNumber\"><b>34:24</b></span> And unto Hamor and unto Shechem his son hearkened all that went out of the gate of his city; and every male was circumcised, all that went out of the gate of his city. <span class=\"VerseNumber\"><b>34:25</b></span> And it came to pass on the third day, when they were in pain, that two of the sons of Jacob, Simeon and Levi, Dinah's brethren, took each man his sword, and came upon the city unawares, and slew all the males. <span class=\"VerseNumber\"><b>34:26</b></span> And they slew Hamor and Shechem his son with the edge of the sword, and took Dinah out of Shechem's house, and went forth. <span class=\"VerseNumber\"><b>34:27</b></span> The sons of Jacob came upon the slain, and spoiled the city, because they had defiled their sister. <span class=\"VerseNumber\"><b>34:28</b></span> They took their flocks and their herds and their asses, and that which was in the city and that which was in the field; <span class=\"VerseNumber\"><b>34:29</b></span> and all their wealth, and all their little ones and their wives, took they captive and spoiled, even all that was in the house. <span class=\"VerseNumber\"><b>34:30</b></span> And Jacob said to Simeon and Levi: 'Ye have troubled me, to make me odious unto the inhabitants of the land, even unto the Canaanites and the Perizzites; and, I being few in number, they will gather themselves together against me and smite me; and I shall be destroyed, I and my house.' <span class=\"VerseNumber\"><b>34:31</b></span> And they said: 'Should one deal with our sister as with a harlot?' <span class=\"HebrewParagraph\"><span>{P}</span></span>",
          "text": "34:20 And Hamor and Shechem his son came unto the gate of their city , and spoke with the men of their city, saying: 34:21 'These men are peaceable with us; therefore let them dwell in the land, and trade therein; for, behold, the land is large enough for them; let us take their daughters to us for wives, and let us give them our daughters. 34:22 Only on this condition will the men consent unto us to dwell with us, to become one people, if every male among us be circumcised, as they are circumcised. 34:23 Shall not their cattle and their substance and all their beasts be ours? only let us consent unto them, and they will dwell with us.' 34:24 And unto Hamor and unto Shechem his son hearkened all that went out of the gate of his city; and every male was circumcised, all that went out of the gate of his city. 34:25 And it came to pass on the third day, when they were in pain, that two of the sons of Jacob, Simeon and Levi, Dinah's brethren, took each man his sword, and came upon the city unawares, and slew all the males. 34:26 And they slew Hamor and Shechem his son with the edge of the sword, and took Dinah out of Shechem's house, and went forth. 34:27 The sons of Jacob came upon the slain, and spoiled the city, because they had defiled their sister. 34:28 They took their flocks and their herds and their asses, and that which was in the city and that which was in the field; 34:29 and all their wealth, and all their little ones and their wives, took they captive and spoiled, even all that was in the house. 34:30 And Jacob said to Simeon and Levi: 'Ye have troubled me, to make me odious unto the inhabitants of the land, even unto the Canaanites and the Perizzites; and, I being few in number, they will gather themselves together against me and smite me; and I shall be destroyed, I and my house.' 34:31 And they said: 'Should one deal with our sister as with a harlot?' {P}",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>35:9</b></span> And God appeared unto Jacob again, <span class=\"vertical1\"><b>when he came</b></span> from Paddan-aram, and blessed him. <span class=\"VerseNumber\"><b>35:10</b></span> And God said unto him: 'Thy name is Jacob: <span class=\"internalparallel\"><b>thy name shall not be called</b></span><span class=\"vertical1\"><b> </b></span>any more Jacob, but <span class=\"vertical1\"><b>Israel</b></span> shall be thy name'; <span class=\"internalparallel\"><b>and He called his name</b></span> Israel. <span class=\"VerseNumber\"><b>35:11</b></span> And God said unto him: 'I am God Almighty. Be fruitful and multiply; a nation and a company of nations shall be of thee, and kings shall come out of thy loins; <span class=\"VerseNumber\"><b>35:12</b></span> and the land which I gave <span class=\"vertical1\"><b>unto Abraham and Isaac</b></span>, to thee I will give it, and to thy seed after thee will I give the land.' <span class=\"VerseNumber\"><b>35:13</b></span> And God went up from him in the place where He spoke with him. <span class=\"VerseNumber\"><b>35:14</b></span> And Jacob set up a pillar in the place where He spoke with him, a pillar of stone, and he poured out a drink-offering thereon, and poured oil thereon. <span class=\"VerseNumber\"><b>35:15</b></span> And Jacob <span class=\"internalparallel\"><b>called the name of the place</b></span> where God spoke with him, Beth-el.",

          "html": "<span class=\"CellSubdivision\"><b>e</b></span><span class=\"VerseNumber\"><b>36:20</b></span> These are the sons of Seir the Horite,\n  the inhabitants of the land: Lotan and Shobal and Zibeon and Anah, <span class=\"VerseNumber\"><b>36:21</b></span> and Dishon and Ezer and Dishan. These\n  are the chiefs that came of the Horites, the children of Seir in the land of\n  Edom. <span class=\"VerseNumber\"><b>36:22</b></span> And the children of Lotan\n  were Hori and Hemam; and Lotan's sister was Timna. <span class=\"VerseNumber\"><b>36:23</b></span>\n  And these are the children of Shobal: Alvan and Manahath and Ebal, Shepho and\n  Onam. <span class=\"VerseNumber\"><b>36:24</b></span> And these are the children\n  of Zibeon: Aiah and Anah--<span class=\"horizontal1\"><b>this is Anah who found\n  the hot springs in the wilderness, as he fed the asses of Zibeon his father</b></span>.\n  <span class=\"VerseNumber\"><b>36:25</b></span> And these are the children of\n  Anah: Dishon and Oholibamah the daughter of Anah. <span class=\"VerseNumber\"><b>36:26</b></span>\n  And these are the children of Dishon: Hemdan and Eshban and Ithran and\n  Cheran. <span class=\"VerseNumber\"><b>36:27</b></span> These are the children of\n  Ezer: Bilhan and Zaavan and Akan. <span class=\"VerseNumber\"><b>36:28</b></span>\n  These are the children of Dishan: Uz and Aran. <span class=\"VerseNumber\"><b>36:29</b></span>\n  These are the chiefs that came of the Horites: the chief of Lotan, the chief\n  of Shobal, the chief of Zibeon, the chief of Anah, <span class=\"VerseNumber\"><b>36:30</b></span>\n  the chief of Dishon, the chief of Ezer, the chief of Dishan. These are the\n  chiefs that came of the Horites, according to their chiefs in the land of\n  Seir. <span class=\"HebrewParagraph\"><span>{P}</span></span>",
          "text": "e 36:20 These are the sons of Seir the Horite,\n  the inhabitants of the land: Lotan and Shobal and Zibeon and Anah, 36:21 and Dishon and Ezer and Dishan. These\n  are the chiefs that came of the Horites, the children of Seir in the land of\n  Edom. 36:22 And the children of Lotan\n  were Hori and Hemam; and Lotan's sister was Timna. 36:23 And these are the children of Shobal: Alvan and Manahath and Ebal, Shepho and\n  Onam. 36:24 And these are the children\n  of Zibeon: Aiah and Anah-- this is Anah who found\n  the hot springs in the wilderness, as he fed the asses of Zibeon his father . 36:25 And these are the children of\n  Anah: Dishon and Oholibamah the daughter of Anah. 36:26 And these are the children of Dishon: Hemdan and Eshban and Ithran and\n  Cheran. 36:27 These are the children of\n  Ezer: Bilhan and Zaavan and Akan. 36:28 These are the children of Dishan: Uz and Aran. 36:29 These are the chiefs that came of the Horites: the chief of Lotan, the chief\n  of Shobal, the chief of Zibeon, the chief of Anah, 36:30 the chief of Dishon, the chief of Ezer, the chief of Dishan. These are the\n  chiefs that came of the Horites, according to their chiefs in the land of\n  Seir. {P}",

          "row": 4,

          "html": "<span class=\"CellSubdivision\"><b>e</b></span><span class=\"VerseNumber\"><b>37:15</b></span> <span class=\"horizontal1\"><b>And a\n  certain man found him, and, behold, he was wandering in the field</b></span>.\n  And the man asked him, saying: 'What seekest thou?' <span class=\"VerseNumber\"><b>37:16</b></span>\n  And he said: 'I seek my brethren. Tell me, I pray thee, where they are\n  feeding the flock.' <span class=\"VerseNumber\"><b>37:17</b></span> And the man\n  said: 'They are departed hence; for I heard them say: Let us go to Dothan.'\n  And Joseph went after his brethren, and found them in Dothan. <span class=\"VerseNumber\"><b>37:18</b></span> And they saw him afar off, and before\n  he came near unto them, they conspired against him to slay him. <span class=\"VerseNumber\"><b>37:19</b></span> And they said one to another: 'Behold,\n  this dreamer cometh. <span class=\"VerseNumber\"><b>37:20</b></span> Come now\n  therefore, and let us slay him, and cast him into one of the pits, and we\n  will say: An evil beast hath devoured him; and we shall see what will become\n  of his dreams.' <span class=\"VerseNumber\"><b>37:21</b></span> And Reuben heard\n  it, and delivered him out of their hand; and said: 'Let us not take his\n  life.' <span class=\"VerseNumber\"><b>37:22</b></span> <span class=\"horizontal1\"><b>And\n  Reuben said unto them: 'Shed no blood; cast him into this pit that is in the\n  wilderness, but lay no hand upon him'--that he might deliver him out of their\n  hand, to restore him to his father.</b></span>",
          "text": "e 37:15 And a\n  certain man found him, and, behold, he was wandering in the field .\n  And the man asked him, saying: 'What seekest thou?' 37:16 And he said: 'I seek my brethren. Tell me, I pray thee, where they are\n  feeding the flock.' 37:17 And the man\n  said: 'They are departed hence; for I heard them say: Let us go to Dothan.'\n  And Joseph went after his brethren, and found them in Dothan. 37:18 And they saw him afar off, and before\n  he came near unto them, they conspired against him to slay him. 37:19 And they said one to another: 'Behold,\n  this dreamer cometh. 37:20 Come now\n  therefore, and let us slay him, and cast him into one of the pits, and we\n  will say: An evil beast hath devoured him; and we shall see what will become\n  of his dreams.' 37:21 And Reuben heard\n  it, and delivered him out of their hand; and said: 'Let us not take his\n  life.' 37:22 And\n  Reuben said unto them: 'Shed no blood; cast him into this pit that is in the\n  wilderness, but lay no hand upon him'--that he might deliver him out of their\n  hand, to restore him to his father.",
