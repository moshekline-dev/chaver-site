          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>47:7</b></span> And Joseph brought in Jacob his father,\n  and set him before Pharaoh. And Jacob blessed Pharaoh. <span class=\"VerseNumber\"><b>47:8</b></span> And Pharaoh said unto Jacob: 'How many\n  are the days of the years of thy life?' <span class=\"VerseNumber\"><b>47:9</b></span>\n  And Jacob said unto Pharaoh: 'The days of the years of my sojournings are a\n  hundred and thirty years; few and evil have been the days of the years of my\n  life, and they have not attained unto the days of the years of the life of my\n  fathers in the days of their sojournings.' <span class=\"VerseNumber\"><b>47:10</b></span>\n  And Jacob blessed Pharaoh, and went out from the presence of Pharaoh. <span class=\"VerseNumber\"><b>47:11</b></span> And Joseph placed his father and his\n  brethren, and gave them a possession in the land of Egypt, in the best of the\n  land, in the land of Rameses, as Pharaoh had commanded. <span class=\"VerseNumber\"><b>47:12</b></span> And Joseph sustained his father, and\n  his brethren, and all his father's household, with bread, according to the\n  want of their little ones.",
          "text": "b 47:7 And Joseph brought in Jacob his father,\n  and set him before Pharaoh. And Jacob blessed Pharaoh. 47:8 And Pharaoh said unto Jacob: 'How many\n  are the days of the years of thy life?' 47:9 And Jacob said unto Pharaoh: 'The days of the years of my sojournings are a\n  hundred and thirty years; few and evil have been the days of the years of my\n  life, and they have not attained unto the days of the years of the life of my\n  fathers in the days of their sojournings.' 47:10 And Jacob blessed Pharaoh, and went out from the presence of Pharaoh. 47:11 And Joseph placed his father and his\n  brethren, and gave them a possession in the land of Egypt, in the best of the\n  land, in the land of Rameses, as Pharaoh had commanded. 47:12 And Joseph sustained his father, and\n  his brethren, and all his father's household, with bread, according to the\n  want of their little ones.",

          "html": "<span class=\"VerseNumber\"><b>47:13</b></span> <span class=\"vertical1\"><b>And there was no bread in all the land; for the famine was\n  very sore, so that the land of Egypt and the land of Canaan languished by\n  reason of the famine</b></span>. <span class=\"VerseNumber\"><b>47:14</b></span>\n  And Joseph gathered up all the money that was found in the land of Egypt, and\n  in the land of Canaan, for the corn which they bought; and Joseph brought the\n  money into Pharaoh's house. <span class=\"VerseNumber\"><b>47:15</b></span> <span class=\"horizontal2\">And when the money was all spent</span> in the land of\n  Egypt, and in the land of Canaan, all the Egyptians came unto Joseph, and\n  said: 'Give us bread; for why should we die in thy presence? for our money\n  faileth.' <span class=\"VerseNumber\"><b>47:16</b></span> And Joseph said: <span class=\"horizontal2\">'Give your cattle</span>, and I will give you [bread] for\n  your cattle, if money fail.' <span class=\"VerseNumber\"><b>47:17</b></span> And\n  they brought their cattle unto Joseph. And Joseph gave them bread in exchange\n  for the horses, and for the flocks, and for the herds, and for the asses; and\n  he fed them with bread in exchange for all their cattle for that year.",

          "label": "6B",
          "row": 8,
          "col": 1,
          "html": "<span class=\"VerseNumber\"><b>47:18</b></span> And when that year\n  was ended, they came unto him the second year, and said unto him: 'We will\n  not hide from my lord, how <span class=\"horizontal2\">that our money is all\n  spent; and the herds of cattle are my lord's</span>; there is nought left in\n  the sight of my lord, but our bodies, and our lands. <span class=\"VerseNumber\"><b>47:19</b></span>\n  Wherefore should we die before thine eyes, both we and our land? <span class=\"vertical1\"><b>buy us</b></span> and our land for bread, and we and our\n  land will be bondmen unto Pharaoh; and give us seed, that we may live, and\n  not die, and that the land be not desolate.' <span class=\"VerseNumber\"><b>47:20</b></span>\n<span class=\"horizontal3\">So Joseph bought all the land of Egypt for </span>Pharaoh;\n  for the Egyptians sold every man his field, because the famine was sore upon\n  them; and the land became Pharaoh's. <span class=\"VerseNumber\"><b>47:21</b></span>\n  And as for the people, he removed them city by city, from one end of the\n  border of Egypt even to the other end thereof. <span class=\"VerseNumber\"><b>47:22</b></span>\n<span class=\"horizontal3\">Only the land of </span><span class=\"closure\"><b>the\n  priests</b></span><span class=\"horizontal3\"> bought he not</span>, for the\n  priests had a portion from Pharaoh, and did eat their portion which Pharaoh\n  gave them; wherefore they sold not their land.",
          "text": "47:18 And when that year\n  was ended, they came unto him the second year, and said unto him: 'We will\n  not hide from my lord, how that our money is all\n  spent; and the herds of cattle are my lord's ; there is nought left in\n  the sight of my lord, but our bodies, and our lands. 47:19 Wherefore should we die before thine eyes, both we and our land? buy us and our land for bread, and we and our\n  land will be bondmen unto Pharaoh; and give us seed, that we may live, and\n  not die, and that the land be not desolate.' 47:20 So Joseph bought all the land of Egypt for Pharaoh;\n  for the Egyptians sold every man his field, because the famine was sore upon\n  them; and the land became Pharaoh's. 47:21 And as for the people, he removed them city by city, from one end of the\n  border of Egypt even to the other end thereof. 47:22 Only the land of the\n  priests bought he not , for the\n  priests had a portion from Pharaoh, and did eat their portion which Pharaoh\n  gave them; wherefore they sold not their land.",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>48:1</b></span> And it came to pass after these things,\n  that one said to Joseph: 'Behold, thy father is sick.' And he took with him\n  his two sons, Manasseh and Ephraim. <span class=\"VerseNumber\"><b>48:2</b></span>\n  And one told Jacob, and said: 'Behold, thy son Joseph cometh unto thee.' And\n  Israel strengthened himself, and sat upon the bed. <span class=\"VerseNumber\"><b>48:3</b></span>\n  And Jacob said unto Joseph: 'God Almighty appeared unto me at Luz in the land\n  of Canaan, and blessed me, <span class=\"VerseNumber\"><b>48:4</b></span> and\n  said unto me: <span class=\"horizontal2\">Behold, I will make thee fruitful, and\n  multiply thee</span>, and I will make of thee a company of peoples; and will\n  give this land to thy seed after thee for an everlasting possession. <span class=\"VerseNumber\"><b>48:5</b></span> And now thy two sons, who were born unto\n  thee in the land of Egypt before I came unto thee into Egypt, are mine;\n  Ephraim and Manasseh, even as Reuben and Simeon, shall be mine. <span class=\"VerseNumber\"><b>48:6</b></span> And thy issue, that thou begettest after\n  them, shall be thine; they shall be called after the name of their brethren\n  in their inheritance. <span class=\"VerseNumber\"><b>48:7</b></span> And as for\n  me, when I came from Paddan, Rachel died unto me in the land of Canaan in the\n  way, when there was still some way to come unto Ephrath; and I buried her\n  there in the way to Ephrath--the same is Beth-lehem.'",

// Genesis 3x7 matrix layout
const GENESIS_LAYOUT = [
    // row 0
    { unit: 1, row: 0, col: 0, color: 'd4f2ff' },
    { unit: 5, row: 0, col: 2, color: 'e6ffee' },
    { unit: 6, row: 0, col: 3, color: 'd4d4ff' },
    { unit: 11, row: 0, col: 4, color: 'd4d4ff' },
    { unit: 12, row: 0, col: 5, color: 'e6ffee' },
    { unit: 17, row: 0, col: 6, color: 'd4f2ff' },
    // row 1
    { unit: 2, row: 1, col: 0, color: 'd4f2ff' },
    { unit: 4, row: 1, col: 1, color: 'ffe6e6' },
    { unit: 7, row: 1, col: 2, color: 'e6ffee' },
    { unit: 8, row: 1, col: 3, color: 'd4d4ff' },
    { unit: 13, row: 1, col: 4, color: 'd4d4ff' },
    { unit: 14, row: 1, col: 5, color: 'e6ffee' },
    { unit: 18, row: 1, col: 6, color: 'd4f2ff' },
    // row 2
    { unit: 3, row: 2, col: 0, color: 'd4f2ff' },
    { unit: 9, row: 2, col: 2, color: 'e6ffee' },
    { unit: 10, row: 2, col: 3, color: 'd4d4ff' },
    { unit: 15, row: 2, col: 4, color: 'd4d4ff' },
    { unit: 16, row: 2, col: 5, color: 'e6ffee' },
    { unit: 19, row: 2, col: 6, color: 'd4f2ff' }
];

const COL_HEADERS = ['A\nCosmic', 'B\nTransition', 'C\nCovenants', 'D\nFamily', 'E\nFamily', 'F\nCovenants', 'G\nPolitical'];

let currentView = 'torah';
const svg = d3.select('#map');
let width = window.innerWidth, height = window.innerHeight;
svg.attr('width', width).attr('height', height);
const g = svg.append('g');

const zoom = d3.zoom().scaleExtent([0.3, 5]).on('zoom', e => {
    g.attr('transform', e.transform);
    document.getElementById('zoom-level').textContent = `Zoom: ${e.transform.k.toFixed(1)}×`;
});
svg.call(zoom);

function renderTorah() {
    g.selectAll('*').remove();
    currentView = 'torah';
    document.getElementById('breadcrumb').innerHTML = '<span onclick="zoomTo(\'torah\')">Torah</span>';
    
    const cx = width/2, cy = height/2, bw = 160, bh = 90, gap = 50;
    const books = [
        { id: 'exodus', name: 'Exodus', x: cx, y: cy - bh - gap, color: '#dc2626', units: 19 },
        { id: 'genesis', name: 'Genesis', x: cx - bw - gap, y: cy, color: '#2563eb', units: 19, active: true },
        { id: 'leviticus', name: 'Leviticus', x: cx, y: cy, color: '#7c3aed', units: 22 },
        { id: 'numbers', name: 'Numbers', x: cx, y: cy + bh + gap, color: '#059669', units: 13 },
        { id: 'deuteronomy', name: 'Deuteronomy', x: cx + bw + gap, y: cy, color: '#d97706', units: 13 }
    ];
    
    // Thread lines
    g.append('line').attr('x1', cx - bw - gap + bw/2).attr('y1', cy).attr('x2', cx + bw + gap - bw/2).attr('y2', cy)
        .attr('stroke', '#2563eb').attr('stroke-width', 3).attr('stroke-dasharray', '8,4').attr('opacity', 0.4);
    g.append('line').attr('x1', cx).attr('y1', cy - bh - gap + bh/2).attr('x2', cx).attr('y2', cy + bh + gap - bh/2)
        .attr('stroke', '#d97706').attr('stroke-width', 3).attr('stroke-dasharray', '8,4').attr('opacity', 0.4);
    
    books.forEach(b => {
        const grp = g.append('g').attr('class', 'node')
            .attr('transform', `translate(${b.x - bw/2}, ${b.y - bh/2})`)
            .style('opacity', b.active ? 1 : 0.5)
            .on('click', () => b.active && zoomTo(b.id));
        grp.append('rect').attr('width', bw).attr('height', bh).attr('fill', b.color).attr('rx', 8).attr('stroke', '#fff').attr('stroke-width', 2);
        grp.append('text').attr('x', bw/2).attr('y', bh/2 - 5).attr('fill', '#fff').attr('text-anchor', 'middle').attr('font-size', '16px').attr('font-weight', '600').text(b.name);
        grp.append('text').attr('x', bw/2).attr('y', bh/2 + 15).attr('fill', 'rgba(255,255,255,0.7)').attr('text-anchor', 'middle').attr('font-size', '12px').text(`${b.units} units`);
    });
    
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
}

function renderGenesis() {
    g.selectAll('*').remove();
    currentView = 'genesis';
    document.getElementById('breadcrumb').innerHTML = '<span onclick="zoomTo(\'torah\')">Torah</span> → <span>Genesis</span>';
    
    const uw = 110, uh = 70, pad = 8, startX = 80, startY = 100;
    
    // Column headers
    COL_HEADERS.forEach((h, i) => {
        const lines = h.split('\n');
        g.append('text').attr('class', 'col-header').attr('x', startX + i * (uw + pad) + uw/2).attr('y', startY - 30).text(lines[0]);
        if (lines[1]) g.append('text').attr('class', 'section-label').attr('x', startX + i * (uw + pad) + uw/2).attr('y', startY - 15).text(lines[1]);
    });
    
    // Row labels
    [1, 2, 3].forEach((r, i) => {
        g.append('text').attr('class', 'row-label').attr('x', startX - 25).attr('y', startY + i * (uh + pad) + uh/2 + 5).text(r);
    });
    
    // Units
    GENESIS_LAYOUT.forEach(pos => {
        const unit = torahData.units.find(u => u.unit_number === pos.unit);
        if (!unit) return;
        
        const x = startX + pos.col * (uw + pad);
        const y = startY + pos.row * (uh + pad);
        
        const grp = g.append('g').attr('class', 'node').attr('transform', `translate(${x}, ${y})`).on('click', () => showUnitDetail(unit));
        grp.append('rect').attr('width', uw).attr('height', uh).attr('fill', '#' + pos.color).attr('rx', 6).attr('stroke', '#999').attr('stroke-width', 1);
        grp.append('text').attr('class', 'node-text').attr('x', uw/2).attr('y', 22).attr('font-size', '13px').text(`Unit ${unit.unit_number}`);
        grp.append('text').attr('class', 'node-ref').attr('x', uw/2).attr('y', uh - 12).text(unit.verses?.replace('Genesis ', '') || '');
    });
    
    // Empty cells indicator
    [[0,1], [2,1]].forEach(([r, c]) => {
        const x = startX + c * (uw + pad), y = startY + r * (uh + pad);
        g.append('rect').attr('x', x).attr('y', y).attr('width', uw).attr('height', uh).attr('fill', 'none').attr('stroke', '#444').attr('stroke-dasharray', '4,4').attr('rx', 6);
    });
    
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width/2 - 450, height/2 - 200).scale(1));
}

function showUnitDetail(unit) {
    document.getElementById('detail-title').textContent = `Unit ${unit.unit_number}: ${unit.name}`;
    document.getElementById('detail-verses').textContent = unit.verses;
    
    // Build matrix table
    const rows = {};
    unit.cells.forEach(c => { if (!rows[c.row]) rows[c.row] = {}; rows[c.row][c.col] = c; });
    
    let html = '<table><thead><tr><th></th>';
    for (let c = 0; c < unit.structure.cols; c++) html += `<th>Column ${String.fromCharCode(65 + c)}</th>`;
    html += '</tr></thead><tbody>';
    
    for (let r = 0; r < unit.structure.rows; r++) {
        html += `<tr><th>${r + 1}</th>`;
        for (let c = 0; c < unit.structure.cols; c++) {
            const cell = rows[r]?.[c];
            html += `<td class="col-${c === 0 ? 'a' : 'b'}">${cell ? cell.html : ''}</td>`;
        }
        html += '</tr>';
    }
    html += '</tbody></table>';
    
    document.getElementById('detail-matrix').innerHTML = html;
    document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }
function zoomTo(t) { closeDetail(); t === 'torah' ? renderTorah() : t === 'genesis' ? renderGenesis() : null; }

window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; svg.attr('width', width).attr('height', height); });
renderTorah();
</script>
