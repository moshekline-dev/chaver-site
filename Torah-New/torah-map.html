          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>38:1</b></span> And it came to pass at that time, that <span class=\"horizontal1\"><b>Judah went down</b></span> from his brethren, and turned\n  in to a certain Adullamite, whose name was Hirah. <span class=\"VerseNumber\"><b>38:2</b></span>\n  And Judah saw there a daughter of a certain Canaanite whose name was Shua;\n  and he took her, and went in unto her. <span class=\"VerseNumber\"><b>38:3</b></span>\n  And she conceived, and <span class=\"vertical1\"><b>bore</b></span> a son; and he\n  called his name Er. <span class=\"VerseNumber\"><b>38:4</b></span> And she\n  conceived again, and <span class=\"vertical1\"><b>bore</b></span> a son; and she\n  called his name Onan. <span class=\"VerseNumber\"><b>38:5</b></span> And she yet\n  again <span class=\"vertical1\"><b>bore</b></span> a son, and called his name\n  Shelah; and he was at Chezib, when she bore him. <span class=\"VerseNumber\"><b>38:6</b></span>\n  And Judah took a wife for Er his first-born, and her name was Tamar. <span class=\"VerseNumber\"><b>38:7</b></span> And Er, Judah's first-born, was wicked\n  in the sight of the <span class=\"horizontal1\"><b>LORD</b></span>; and the <span class=\"horizontal1\"><b>LORD</b></span> slew him. <span class=\"VerseNumber\"><b>38:8</b></span>\n  And Judah said unto Onan: 'Go in unto thy brother's wife, and perform the\n  duty of a husband's brother unto her, and raise up seed to thy brother.' <span class=\"VerseNumber\"><b>38:9</b></span> And Onan knew that the seed would not be\n  his; and it came to pass when he went in unto his brother's wife, that he\n  spilled it on the ground, lest he should give seed to his brother. <span class=\"VerseNumber\"><b>38:10</b></span> And the thing which he did was evil in\n  the sight of the <span class=\"horizontal1\"><b>LORD</b></span>; and He slew him\n  also. <span class=\"VerseNumber\"><b>38:11</b></span> Then said Judah to Tamar\n  his daughter-in-law: 'Remain a widow in thy father's house, till Shelah my\n  son be grown up'; for he said: 'Lest he also die, like his brethren.' And\n  Tamar went and dwelt in her father's house.",
          "text": "a 38:1 And it came to pass at that time, that Judah went down from his brethren, and turned\n  in to a certain Adullamite, whose name was Hirah. 38:2 And Judah saw there a daughter of a certain Canaanite whose name was Shua;\n  and he took her, and went in unto her. 38:3 And she conceived, and bore a son; and he\n  called his name Er. 38:4 And she\n  conceived again, and bore a son; and she\n  called his name Onan. 38:5 And she yet\n  again bore a son, and called his name\n  Shelah; and he was at Chezib, when she bore him. 38:6 And Judah took a wife for Er his first-born, and her name was Tamar. 38:7 And Er, Judah's first-born, was wicked\n  in the sight of the LORD ; and the LORD slew him. 38:8 And Judah said unto Onan: 'Go in unto thy brother's wife, and perform the\n  duty of a husband's brother unto her, and raise up seed to thy brother.' 38:9 And Onan knew that the seed would not be\n  his; and it came to pass when he went in unto his brother's wife, that he\n  spilled it on the ground, lest he should give seed to his brother. 38:10 And the thing which he did was evil in\n  the sight of the LORD ; and He slew him\n  also. 38:11 Then said Judah to Tamar\n  his daughter-in-law: 'Remain a widow in thy father's house, till Shelah my\n  son be grown up'; for he said: 'Lest he also die, like his brethren.' And\n  Tamar went and dwelt in her father's house.",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>39:1</b></span> <span class=\"horizontal1\"><b>And Joseph\n  was brought down</b></span> to Egypt; <span class=\"vertical1\"><b>and Potiphar,\n  an officer of Pharaoh's, the captain of the guard, an Egyptian, bought him of\n  the hand of the Ishmaelites, that had brought him down thither</b></span>. <span class=\"VerseNumber\"><b>39:2</b></span> And the <span class=\"horizontal1\"><b>LORD</b></span>\n  was with Joseph, and he was a prosperous man; and he was in the house of his\n  master the Egyptian. <span class=\"VerseNumber\"><b>39:3</b></span> And his\n  master saw that the <span class=\"horizontal1\"><b>LORD</b></span> was with him,\n  and that the <span class=\"horizontal1\"><b>LORD</b></span> made all that he did\n  to prosper in his hand. <span class=\"VerseNumber\"><b>39:4</b></span> And Joseph\n  found favour in his sight, and he ministered unto him. And he appointed him\n  overseer over his house, and all that he had he put into his hand. <span class=\"VerseNumber\"><b>39:5</b></span> And it came to pass from the time that\n  he appointed him overseer in his house, and over all that he had, that the <span class=\"horizontal1\"><b>LORD </b></span>blessed the Egyptian's house for\n  Joseph's sake; and the blessing of the <span class=\"horizontal1\"><b>LORD </b></span>was\n  upon all that he had, in the house and in the field. <span class=\"VerseNumber\"><b>39:6</b></span>\n  And he left all that he had in Joseph's hand; and, having him, he knew not\n  aught save the bread which he did eat. And Joseph was of beautiful form, and\n  fair to look upon.",
          "text": "a 39:1 And Joseph\n  was brought down to Egypt; and Potiphar,\n  an officer of Pharaoh's, the captain of the guard, an Egyptian, bought him of\n  the hand of the Ishmaelites, that had brought him down thither . 39:2 And the LORD was with Joseph, and he was a prosperous man; and he was in the house of his\n  master the Egyptian. 39:3 And his\n  master saw that the LORD was with him,\n  and that the LORD made all that he did\n  to prosper in his hand. 39:4 And Joseph\n  found favour in his sight, and he ministered unto him. And he appointed him\n  overseer over his house, and all that he had he put into his hand. 39:5 And it came to pass from the time that\n  he appointed him overseer in his house, and over all that he had, that the LORD blessed the Egyptian's house for\n  Joseph's sake; and the blessing of the LORD was\n  upon all that he had, in the house and in the field. 39:6 And he left all that he had in Joseph's hand; and, having him, he knew not\n  aught save the bread which he did eat. And Joseph was of beautiful form, and\n  fair to look upon.",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>38:12</b></span> And in process of time Shua's daughter,\n  <span class=\"horizontal1\"><b>the wife of</b></span> Judah, died; and Judah was\n  comforted, and went up unto his sheep-shearers to Timnah, he and his friend\n  Hirah the Adullamite. <span class=\"VerseNumber\"><b>38:13</b></span> And it was\n  told Tamar, saying: 'Behold, thy father-in-law goeth up to Timnah to shear\n  his sheep.' <span class=\"VerseNumber\"><b>38:14</b></span> And she put off from\n  her the garments of her widowhood, and covered herself with her veil, and\n  wrapped herself, and sat in the entrance of Enaim, which is by the way to\n  Timnah; for she saw that Shelah was grown up, and she was not given unto him\n  to wife. <span class=\"VerseNumber\"><b>38:15</b></span> When Judah saw her, he\n  thought her to be a harlot; for she had covered her face. <span class=\"VerseNumber\"><b>38:16</b></span> And he turned unto her by the way, and\n  said: 'Come, I pray thee, let me come in unto thee'; for he knew not that she\n  was his daughter-in-law. And she said: 'What wilt thou give me, that thou\n  mayest come in unto me?' <span class=\"VerseNumber\"><b>38:17</b></span> And he\n  said: 'I will send thee a kid of the goats from the flock.' And she said:\n  'Wilt thou give me a pledge, till thou send it?' <span class=\"VerseNumber\"><b>38:18</b></span>\n  And he said: <span class=\"horizontal1\"><b>'What pledge shall I give thee?' And\n  she said: 'Thy signet and thy cord, and thy staff that is in thy hand.' And\n  he gave them to her</b></span>, and came in unto her, and she conceived by\n  him. <span class=\"VerseNumber\"><b>38:19</b></span> And she arose, and went\n  away, and put off her veil from her, and put on the garments of her\n  widowhood. <span class=\"VerseNumber\"><b>38:20</b></span> And Judah sent the kid\n  of the goats by the hand of his friend the Adullamite, to receive the pledge\n  from the woman's hand; but he found her not. <span class=\"VerseNumber\"><b>38:21</b></span>\n  Then he asked the men of her place, saying: 'Where is the harlot, that was at\n  Enaim by the wayside?' And they said: 'There hath been no harlot here.' <span class=\"VerseNumber\"><b>38:22</b></span> And he returned to Judah, and said: 'I\n  have not found her; and also the men of the place said: There hath been no\n  harlot here.' <span class=\"VerseNumber\"><b>38:23</b></span> And Judah said:\n  'Let her take it, lest we be put to shame; behold, I sent this kid, and thou\n  hast not found her.' <span class=\"VerseNumber\"><b>38:24</b></span> And it came\n  to pass about three months after, that it was told Judah, saying: 'Tamar thy\n  daughter-in-law hath played the harlot; and moreover, behold, she is with child\n  by harlotry.' And Judah said: 'Bring her forth, and let her be burnt.' <span class=\"VerseNumber\"><b>38:25</b></span> When she was brought forth, she sent to\n  her father-in-law, saying: 'By the man, whose these are, am I with child';\n  and she said: <span class=\"horizontal1\"><b>'Discern, I pray thee, whose are\n  these, the signet, and the cords, and the staff.</b></span>' <span class=\"VerseNumber\"><b>38:26</b></span> And Judah acknowledged them, and said:\n  'She is more righteous than I; forasmuch as I gave her not to Shelah my son.'\n  And he knew her again no more.",
          "text": "b 38:12 And in process of time Shua's daughter, the wife of Judah, died; and Judah was\n  comforted, and went up unto his sheep-shearers to Timnah, he and his friend\n  Hirah the Adullamite. 38:13 And it was\n  told Tamar, saying: 'Behold, thy father-in-law goeth up to Timnah to shear\n  his sheep.' 38:14 And she put off from\n  her the garments of her widowhood, and covered herself with her veil, and\n  wrapped herself, and sat in the entrance of Enaim, which is by the way to\n  Timnah; for she saw that Shelah was grown up, and she was not given unto him\n  to wife. 38:15 When Judah saw her, he\n  thought her to be a harlot; for she had covered her face. 38:16 And he turned unto her by the way, and\n  said: 'Come, I pray thee, let me come in unto thee'; for he knew not that she\n  was his daughter-in-law. And she said: 'What wilt thou give me, that thou\n  mayest come in unto me?' 38:17 And he\n  said: 'I will send thee a kid of the goats from the flock.' And she said:\n  'Wilt thou give me a pledge, till thou send it?' 38:18 And he said: 'What pledge shall I give thee?' And\n  she said: 'Thy signet and thy cord, and thy staff that is in thy hand.' And\n  he gave them to her , and came in unto her, and she conceived by\n  him. 38:19 And she arose, and went\n  away, and put off her veil from her, and put on the garments of her\n  widowhood. 38:20 And Judah sent the kid\n  of the goats by the hand of his friend the Adullamite, to receive the pledge\n  from the woman's hand; but he found her not. 38:21 Then he asked the men of her place, saying: 'Where is the harlot, that was at\n  Enaim by the wayside?' And they said: 'There hath been no harlot here.' 38:22 And he returned to Judah, and said: 'I\n  have not found her; and also the men of the place said: There hath been no\n  harlot here.' 38:23 And Judah said:\n  'Let her take it, lest we be put to shame; behold, I sent this kid, and thou\n  hast not found her.' 38:24 And it came\n  to pass about three months after, that it was told Judah, saying: 'Tamar thy\n  daughter-in-law hath played the harlot; and moreover, behold, she is with child\n  by harlotry.' And Judah said: 'Bring her forth, and let her be burnt.' 38:25 When she was brought forth, she sent to\n  her father-in-law, saying: 'By the man, whose these are, am I with child';\n  and she said: 'Discern, I pray thee, whose are\n  these, the signet, and the cords, and the staff. ' 38:26 And Judah acknowledged them, and said:\n  'She is more righteous than I; forasmuch as I gave her not to Shelah my son.'\n  And he knew her again no more.",

          "label": "2B",
          "row": 6,
          "col": 1,
          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>39:7</b></span> And it came to pass after these things,\n  that <span class=\"horizontal1\"><b>his master's wife</b></span> cast her eyes\n  upon Joseph; and she said: 'Lie with me.' <span class=\"VerseNumber\"><b>39:8</b></span>\n  But he refused, and said unto his master's wife: 'Behold, my master, having\n  me, knoweth not what is in the house, and he hath put all that he hath into\n  my hand; <span class=\"VerseNumber\"><b>39:9</b></span> he is not greater in this\n  house than I; neither hath he kept back any thing from me but thee, because\n  thou art his wife. How then can I do this great wickedness, and sin against\n  God?' <span class=\"VerseNumber\"><b>39:10</b></span> And it came to pass, as she\n  spoke to Joseph day by day, that he hearkened not unto her, to lie by her, or\n  to be with her. <span class=\"VerseNumber\"><b>39:11</b></span> And it came to\n  pass on a certain day, when he went into the house to do his work, and there\n  was none of the men of the house there within, <span class=\"VerseNumber\"><b>39:12</b></span>\n  that <span class=\"horizontal1\"><b>she caught him by his garment</b></span>,\n  saying: 'Lie with me.' And he left his garment in her hand, and fled, and got\n  him out. <span class=\"VerseNumber\"><b>39:13</b></span> And it came to pass,\n  when she saw that he had left his garment in her hand, and was fled forth, <span class=\"VerseNumber\"><b>39:14</b></span> that she called unto the men of her\n  house, and spoke unto them, saying: 'See, he hath brought in a Hebrew unto us\n  to mock us; he came in unto me to lie with me, and I cried with a loud voice.\n  <span class=\"VerseNumber\"><b>39:15</b></span> And it came to pass, when he\n  heard that I lifted up my voice and cried, that <span class=\"horizontal1\"><b>he\n  left his garment by me</b></span>, and fled, and got him out.' <span class=\"VerseNumber\"><b>39:16</b></span> <span class=\"horizontal1\"><b>And she laid\n  up his garment by her, until his master came home</b></span>. <span class=\"VerseNumber\"><b>39:17</b></span> And she spoke unto him according to\n  these words, saying: 'The Hebrew servant, whom thou hast brought unto us,\n  came in unto me to mock me. <span class=\"VerseNumber\"><b>39:18</b></span> And\n  it came to pass, as I lifted up my voice and cried, <span class=\"horizontal1\"><b>that\n  he left </b></span><span class=\"vertical1\"><b>his garment</b></span><span class=\"horizontal1\"><b> by me</b></span>, and fled out.' <span class=\"VerseNumber\"><b>39:19</b></span> And it came to pass, when his master\n  heard the words of his wife, which she spoke unto him, saying: 'After this\n  manner did thy servant to me'; that his wrath was kindled. <span class=\"VerseNumber\"><b>39:20</b></span> And Joseph's master took him, and put\n  him into the prison, the place where the king's prisoners were bound; and he\n  was there in the prison.",
          "text": "b 39:7 And it came to pass after these things,\n  that his master's wife cast her eyes\n  upon Joseph; and she said: 'Lie with me.' 39:8 But he refused, and said unto his master's wife: 'Behold, my master, having\n  me, knoweth not what is in the house, and he hath put all that he hath into\n  my hand; 39:9 he is not greater in this\n  house than I; neither hath he kept back any thing from me but thee, because\n  thou art his wife. How then can I do this great wickedness, and sin against\n  God?' 39:10 And it came to pass, as she\n  spoke to Joseph day by day, that he hearkened not unto her, to lie by her, or\n  to be with her. 39:11 And it came to\n  pass on a certain day, when he went into the house to do his work, and there\n  was none of the men of the house there within, 39:12 that she caught him by his garment ,\n  saying: 'Lie with me.' And he left his garment in her hand, and fled, and got\n  him out. 39:13 And it came to pass,\n  when she saw that he had left his garment in her hand, and was fled forth, 39:14 that she called unto the men of her\n  house, and spoke unto them, saying: 'See, he hath brought in a Hebrew unto us\n  to mock us; he came in unto me to lie with me, and I cried with a loud voice. 39:15 And it came to pass, when he\n  heard that I lifted up my voice and cried, that he\n  left his garment by me , and fled, and got him out.' 39:16 And she laid\n  up his garment by her, until his master came home . 39:17 And she spoke unto him according to\n  these words, saying: 'The Hebrew servant, whom thou hast brought unto us,\n  came in unto me to mock me. 39:18 And\n  it came to pass, as I lifted up my voice and cried, that\n  he left his garment by me , and fled out.' 39:19 And it came to pass, when his master\n  heard the words of his wife, which she spoke unto him, saying: 'After this\n  manner did thy servant to me'; that his wrath was kindled. 39:20 And Joseph's master took him, and put\n  him into the prison, the place where the king's prisoners were bound; and he\n  was there in the prison.",

          "html": "<span class=\"CellSubdivision\"><b>c</b></span> <span class=\"VerseNumber\"><b>38:27</b></span> And it came to pass in the time of her <span class=\"vertical1\"><b>travail</b></span>, that, behold, twins were in her womb. <span class=\"VerseNumber\"><b>38:28</b></span> And it came to pass, when she <span class=\"vertical1\"><b>travailed</b></span>, that one <span class=\"horizontal1\"><b>put\n  out a hand</b></span>; and the midwife took and bound upon <span class=\"horizontal1\"><b>his hand</b></span> a scarlet thread, saying: 'This came\n  out first.' <span class=\"VerseNumber\"><b>38:29</b></span> And it came to pass,\n  as he drew back <span class=\"horizontal1\"><b>his hand</b></span>, that, behold\n  his brother came out; and she said: 'Wherefore hast thou made a breach for\n  thyself?' Therefore his name was called Perez. <span class=\"VerseNumber\"><b>38:30</b></span>\n  And afterward came out his brother, that had the scarlet thread upon <span class=\"horizontal1\"><b>his hand</b></span>; and his name was called Zerah. <span class=\"HebrewParagraph\"><span>{S}</span></span>",
          "text": "c 38:27 And it came to pass in the time of her travail , that, behold, twins were in her womb. 38:28 And it came to pass, when she travailed , that one put\n  out a hand ; and the midwife took and bound upon his hand a scarlet thread, saying: 'This came\n  out first.' 38:29 And it came to pass,\n  as he drew back his hand , that, behold\n  his brother came out; and she said: 'Wherefore hast thou made a breach for\n  thyself?' Therefore his name was called Perez. 38:30 And afterward came out his brother, that had the scarlet thread upon his hand ; and his name was called Zerah. {S}",

          "html": "<span class=\"CellSubdivision\"><b>c</b></span> <span class=\"VerseNumber\"><b>39:21</b></span> But the LORD was with Joseph, and showed\n  kindness unto him, and gave him favour in the sight of the keeper of the\n  prison. <span class=\"VerseNumber\"><b>39:22</b></span> And the keeper of the\n  prison <span class=\"horizontal1\"><b>committed to</b></span> Joseph's <span class=\"horizontal1\"><b>hand </b></span>all the prisoners that were in the\n  prison; and whatsoever they did there, he was the doer of it. <span class=\"VerseNumber\"><b>39:23</b></span> The keeper of the prison looked not to\n  any thing that was under <span class=\"horizontal1\"><b>his hand</b></span>,\n  because the LORD was with him; and that which he did, the LORD made it to\n  prosper. <span class=\"HebrewParagraph\"><span>{P}</span></span>",

        {
          "label": "3A",
          "row": 8,
          "col": 0,
          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>40:1</b></span> And it came to pass after these things, that the butler of the king of Egypt and his baker offended their lord the king of Egypt. <span class=\"VerseNumber\"><b>40:2</b></span> And Pharaoh was wroth against his two officers, against the chief of the butlers, and against the chief of the bakers. <span class=\"VerseNumber\"><b>40:3</b></span> And he put them in ward in the house of the captain of the guard, into the prison, the place where Joseph was bound. <span class=\"VerseNumber\"><b>40:4</b></span> And the captain of the guard charged Joseph to be with them, and he ministered unto them; and they continued a season in ward. <span class=\"VerseNumber\"><b>40:5</b></span> And they <span class=\"ciasm2\"><b>dreamed a dream</b></span> both of them, each man his dream, in one night, each man according to the interpretation of his dream, the butler and the baker of the king of Egypt, who were bound in the prison. <span class=\"VerseNumber\"><b>40:6</b></span> And Joseph came in unto them in the morning, and saw them, and, behold, they were sad. <span class=\"VerseNumber\"><b>40:7</b></span> And he asked Pharaoh's officers that were with him in the ward of his master's house, saying: 'Wherefore look ye so sad to-day?' <span class=\"VerseNumber\"><b>40:8</b></span> And they said unto him: <span class=\"ciasm2\"><b>'We have dreamed a dream</b></span>, and there is none that can interpret it.' And Joseph said unto them: 'Do not interpretations belong to God? tell it me, I pray you.' <span class=\"VerseNumber\"><b>40:9</b></span> And the chief butler told his dream to Joseph, and said to him: 'In my dream, behold, a vine was before me; <span class=\"VerseNumber\"><b>40:10</b></span> and in the vine were three branches; and as it was budding, its blossoms shot forth, and the clusters thereof brought forth ripe grapes, <span class=\"VerseNumber\"><b>40:11</b></span> and Pharaoh's cup was in my hand; and I took the grapes, and pressed them into Pharaoh's cup, and I gave the cup into Pharaoh's hand.' <span class=\"VerseNumber\"><b>40:12</b></span> And Joseph said unto him: 'This is the interpretation of it: the three branches are three days; <span class=\"VerseNumber\"><b>40:13</b></span> within yet three days shall Pharaoh lift up thy head, and restore thee unto thine office; and thou shalt give Pharaoh's cup into his hand, after the former manner when thou wast his butler. <span class=\"VerseNumber\"><b>40:14</b></span> But have me in thy remembrance when it shall be well with thee, and show kindness, I pray thee, unto me, and make mention of me unto Pharaoh, and bring me out of this house. <span class=\"VerseNumber\"><b>40:15</b></span> <span class=\"ciasm2\"><b>For indeed I was stolen away out of the land of the Hebrews</b></span>; and here also have I done nothing that they should put me into the dungeon.' <span class=\"VerseNumber\"><b>40:16</b></span> When the chief baker saw that the interpretation was good, he said unto Joseph: 'I also saw in my dream, and, behold, three baskets of white bread were on my head; <span class=\"VerseNumber\"><b>40:17</b></span> and in the uppermost basket there was of all manner of baked food for Pharaoh; and the birds did eat them out of the basket upon my head.' <span class=\"VerseNumber\"><b>40:18</b></span> And Joseph answered and said: 'This is the interpretation thereof: the three baskets are three days; <span class=\"VerseNumber\"><b>40:19</b></span> within yet three days shall Pharaoh lift up thy head from off thee, and shall hang thee on a tree; and the birds shall eat thy flesh from off thee.' <span class=\"VerseNumber\"><b>40:20</b></span> And it came to pass the third day, which was Pharaoh's <span class=\"vertical1\"><b>birthday</b></span>, that he made a feast unto all his servants; and he lifted up the head of the chief butler and the head of the chief baker among his servants. <span class=\"VerseNumber\"><b>40:21</b></span> And he restored the chief butler back unto his butlership; and he gave the cup into Pharaoh's hand. <span class=\"VerseNumber\"><b>40:22</b></span> But he hanged the chief baker, as Joseph had interpreted to them. <span class=\"VerseNumber\"><b>40:23</b></span> Yet did not the chief butler remember Joseph, but forgot him. <span class=\"HebrewParagraph\"><span>{P}</span></span>",
          "text": "a 40:1 And it came to pass after these things, that the butler of the king of Egypt and his baker offended their lord the king of Egypt. 40:2 And Pharaoh was wroth against his two officers, against the chief of the butlers, and against the chief of the bakers. 40:3 And he put them in ward in the house of the captain of the guard, into the prison, the place where Joseph was bound. 40:4 And the captain of the guard charged Joseph to be with them, and he ministered unto them; and they continued a season in ward. 40:5 And they dreamed a dream both of them, each man his dream, in one night, each man according to the interpretation of his dream, the butler and the baker of the king of Egypt, who were bound in the prison. 40:6 And Joseph came in unto them in the morning, and saw them, and, behold, they were sad. 40:7 And he asked Pharaoh's officers that were with him in the ward of his master's house, saying: 'Wherefore look ye so sad to-day?' 40:8 And they said unto him: 'We have dreamed a dream , and there is none that can interpret it.' And Joseph said unto them: 'Do not interpretations belong to God? tell it me, I pray you.' 40:9 And the chief butler told his dream to Joseph, and said to him: 'In my dream, behold, a vine was before me; 40:10 and in the vine were three branches; and as it was budding, its blossoms shot forth, and the clusters thereof brought forth ripe grapes, 40:11 and Pharaoh's cup was in my hand; and I took the grapes, and pressed them into Pharaoh's cup, and I gave the cup into Pharaoh's hand.' 40:12 And Joseph said unto him: 'This is the interpretation of it: the three branches are three days; 40:13 within yet three days shall Pharaoh lift up thy head, and restore thee unto thine office; and thou shalt give Pharaoh's cup into his hand, after the former manner when thou wast his butler. 40:14 But have me in thy remembrance when it shall be well with thee, and show kindness, I pray thee, unto me, and make mention of me unto Pharaoh, and bring me out of this house. 40:15 For indeed I was stolen away out of the land of the Hebrews ; and here also have I done nothing that they should put me into the dungeon.' 40:16 When the chief baker saw that the interpretation was good, he said unto Joseph: 'I also saw in my dream, and, behold, three baskets of white bread were on my head; 40:17 and in the uppermost basket there was of all manner of baked food for Pharaoh; and the birds did eat them out of the basket upon my head.' 40:18 And Joseph answered and said: 'This is the interpretation thereof: the three baskets are three days; 40:19 within yet three days shall Pharaoh lift up thy head from off thee, and shall hang thee on a tree; and the birds shall eat thy flesh from off thee.' 40:20 And it came to pass the third day, which was Pharaoh's birthday , that he made a feast unto all his servants; and he lifted up the head of the chief butler and the head of the chief baker among his servants. 40:21 And he restored the chief butler back unto his butlership; and he gave the cup into Pharaoh's hand. 40:22 But he hanged the chief baker, as Joseph had interpreted to them. 40:23 Yet did not the chief butler remember Joseph, but forgot him. {P}",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>41:14</b></span> Then Pharaoh sent and called Joseph, and they brought him hastily out of the dungeon. And he shaved himself, <span class=\"vertical1\"><b>and changed his raiment</b></span>, and came in unto Pharaoh. <span class=\"VerseNumber\"><b>41:15</b></span> And Pharaoh said unto Joseph: 'I have dreamed a dream, and there is none that can interpret it; and I have heard say of thee, that when thou hearest a dream thou canst interpret it.' <span class=\"VerseNumber\"><b>41:16</b></span> And Joseph answered Pharaoh, saying: 'It is not in me; God will give Pharaoh an answer of peace.' <span class=\"VerseNumber\"><b>41:17</b></span> And Pharaoh spoke unto Joseph: 'In my dream, behold, I stood upon the brink of the river. <span class=\"VerseNumber\"><b>41:18</b></span> And, behold, there came up out of the river seven kine, fat-fleshed and well-favoured; and they fed in the reed-grass. <span class=\"VerseNumber\"><b>41:19</b></span> And, behold, seven other kine came up after them, poor and very ill-favoured and lean-fleshed, such as I never saw in all the land of Egypt for badness. <span class=\"VerseNumber\"><b>41:20</b></span> And the lean and ill-favoured kine did eat up the first seven fat kine. <span class=\"VerseNumber\"><b>41:21</b></span> And when they had eaten them up, it could not be known that they had eaten them; but they were still ill-favoured as at the beginning. So I awoke. <span class=\"VerseNumber\"><b>41:22</b></span> And I saw in my dream, and, behold, seven ears came up upon one stalk, full and good. <span class=\"VerseNumber\"><b>41:23</b></span> And, behold, seven ears, withered, thin, and blasted with the east wind, sprung up after them. <span class=\"VerseNumber\"><b>41:24</b></span> And the thin ears swallowed up the seven good ears. And I told it unto the magicians; but there was none that could declare it to me.' <span class=\"VerseNumber\"><b>41:25</b></span> And Joseph said unto Pharaoh: 'The dream of Pharaoh is one; what God is about to do He hath declared unto Pharaoh. <span class=\"VerseNumber\"><b>41:26</b></span> The seven good kine are seven years; and the seven good ears are seven years: the dream is one. <span class=\"VerseNumber\"><b>41:27</b></span> And the seven lean and ill-favoured kine that came up after them are seven years, and also the seven empty ears blasted with the east wind; they shall be seven years of famine. <span class=\"VerseNumber\"><b>41:28</b></span> That is the thing which I spoke unto Pharaoh: what God is about to do He hath shown unto Pharaoh. <span class=\"VerseNumber\"><b>41:29</b></span> Behold, there come seven years of great plenty throughout all the land of Egypt. <span class=\"VerseNumber\"><b>41:30</b></span> And there shall arise after them seven years of famine; and all the plenty shall be forgotten in the land of Egypt; and the famine shall consume the land; <span class=\"VerseNumber\"><b>41:31</b></span> and the plenty shall not be known in the land by reason of that famine which followeth; for it shall be very grievous. <span class=\"VerseNumber\"><b>41:32</b></span> And for that the dream was doubled unto Pharaoh twice, it is because the thing is established by God, and God will shortly bring it to pass. <span class=\"VerseNumber\"><b>41:33</b></span> Now therefore let Pharaoh look out a man discreet and wise, and set him over the land of Egypt. <span class=\"VerseNumber\"><b>41:34</b></span> Let Pharaoh do this, and let him appoint overseers over the land, and take up the fifth part of the land of Egypt in the seven years of plenty. <span class=\"VerseNumber\"><b>41:35</b></span> And let them gather all the food of these good years that come, and lay up corn under the hand of Pharaoh for food in the cities, and let them keep it. <span class=\"VerseNumber\"><b>41:36</b></span> And the food shall be for a store to the land against the seven years of famine, which shall be in the land of Egypt; that the land perish not through the famine.' <span class=\"VerseNumber\"><b>41:37</b></span> And the thing was good in the eyes of Pharaoh, and in the eyes of all his servants.",
          "text": "a 41:14 Then Pharaoh sent and called Joseph, and they brought him hastily out of the dungeon. And he shaved himself, and changed his raiment , and came in unto Pharaoh. 41:15 And Pharaoh said unto Joseph: 'I have dreamed a dream, and there is none that can interpret it; and I have heard say of thee, that when thou hearest a dream thou canst interpret it.' 41:16 And Joseph answered Pharaoh, saying: 'It is not in me; God will give Pharaoh an answer of peace.' 41:17 And Pharaoh spoke unto Joseph: 'In my dream, behold, I stood upon the brink of the river. 41:18 And, behold, there came up out of the river seven kine, fat-fleshed and well-favoured; and they fed in the reed-grass. 41:19 And, behold, seven other kine came up after them, poor and very ill-favoured and lean-fleshed, such as I never saw in all the land of Egypt for badness. 41:20 And the lean and ill-favoured kine did eat up the first seven fat kine. 41:21 And when they had eaten them up, it could not be known that they had eaten them; but they were still ill-favoured as at the beginning. So I awoke. 41:22 And I saw in my dream, and, behold, seven ears came up upon one stalk, full and good. 41:23 And, behold, seven ears, withered, thin, and blasted with the east wind, sprung up after them. 41:24 And the thin ears swallowed up the seven good ears. And I told it unto the magicians; but there was none that could declare it to me.' 41:25 And Joseph said unto Pharaoh: 'The dream of Pharaoh is one; what God is about to do He hath declared unto Pharaoh. 41:26 The seven good kine are seven years; and the seven good ears are seven years: the dream is one. 41:27 And the seven lean and ill-favoured kine that came up after them are seven years, and also the seven empty ears blasted with the east wind; they shall be seven years of famine. 41:28 That is the thing which I spoke unto Pharaoh: what God is about to do He hath shown unto Pharaoh. 41:29 Behold, there come seven years of great plenty throughout all the land of Egypt. 41:30 And there shall arise after them seven years of famine; and all the plenty shall be forgotten in the land of Egypt; and the famine shall consume the land; 41:31 and the plenty shall not be known in the land by reason of that famine which followeth; for it shall be very grievous. 41:32 And for that the dream was doubled unto Pharaoh twice, it is because the thing is established by God, and God will shortly bring it to pass. 41:33 Now therefore let Pharaoh look out a man discreet and wise, and set him over the land of Egypt. 41:34 Let Pharaoh do this, and let him appoint overseers over the land, and take up the fifth part of the land of Egypt in the seven years of plenty. 41:35 And let them gather all the food of these good years that come, and lay up corn under the hand of Pharaoh for food in the cities, and let them keep it. 41:36 And the food shall be for a store to the land against the seven years of famine, which shall be in the land of Egypt; that the land perish not through the famine.' 41:37 And the thing was good in the eyes of Pharaoh, and in the eyes of all his servants.",

erpretation of his dream. <span class=\"VerseNumber\"><b>41:12</b></span> And there was with us there a young man, a Hebrew, servant to the captain of the guard; and we told him, and he interpreted to us our dreams; to each man according to his dream he did interpret. <span class=\"VerseNumber\"><b>41:13</b></span> And it came to pass, as he interpreted to us, so it was: I was restored unto mine office, and he was hanged.'",
          "text": "b 41:1 And it came to pass at the end of two full years, that Pharaoh dreamed : and, behold, he stood by the river. 41:2 And, behold, there came up out of the river seven kine, well-favoured and fat-fleshed; and they fed in the reed-grass. 41:3 And, behold, seven other kine came up after them out of the river, ill favoured and lean-fleshed; and stood by the other kine upon the brink of the river. 41:4 And the ill-favoured and lean-fleshed kine did eat up the seven well-favoured and fat kine. So Pharaoh awoke. 41:5 And he slept and dreamed a second time : and, behold, seven ears of corn came up upon one stalk, rank and good. 41:6 And, behold, seven ears, thin and blasted with the east wind, sprung up after them. 41:7 And the thin ears swallowed up the seven rank and full ears. And Pharaoh awoke, and, behold, it was a dream. 41:8 And it came to pass in the morning that his spirit was troubled; and he sent and called for all the magicians of Egypt, and all the wise men thereof; and Pharaoh told them his dream; but there was none that could interpret them unto Pharaoh. 41:9 Then spoke the chief butler unto Pharaoh, saying: 'I make mention of my faults this day: 41:10 Pharaoh was wroth with his servants, and put me in the ward of the house of the captain of the guard, me and the chief baker. 41:11 And we dreamed a dream in one night, I and he; we dreamed each man according to the interpretation of his dream. 41:12 And there was with us there a young man, a Hebrew, servant to the captain of the guard; and we told him, and he interpreted to us our dreams; to each man according to his dream he did interpret. 41:13 And it came to pass, as he interpreted to us, so it was: I was restored unto mine office, and he was hanged.'",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>42:29</b></span> And they\n  came unto Jacob their father unto the land of Canaan, and told him all that\n  had befallen them, saying: <span class=\"VerseNumber\"><b>42:30</b></span> <span class=\"vertical1\"><b>'The man, the lord of the land, spoke roughly with us, and\n  took us for spies of the country</b></span>. <span class=\"VerseNumber\"><b>42:31</b></span>\n<span class=\"vertical1\"><b>And we said unto him: We are upright men; we are no\n  spies</b></span>. <span class=\"VerseNumber\"><b>42:32</b></span> <span class=\"vertical1\"><b>We are twelve brethren, sons of our father; one is not,\n  and the youngest is this day with our father in the land of Canaan</b></span>.\n  <span class=\"VerseNumber\"><b>42:33</b></span> <span class=\"vertical1\"><b>And the\n  man, the lord of the land, said unto us: Hereby shall I know that ye are\n  upright men: leave one of your brethren with me, and take corn for the famine\n  of your houses, and go your way</b></span>. <span class=\"VerseNumber\"><b>42:34</b></span>\n<span class=\"vertical1\"><b>And bring your youngest brother unto me; then shall\n  I know that ye are no spies, but that ye are upright men; so will I deliver\n  you your brother, and ye shall traffic in the land</b></span>.' <span class=\"VerseNumber\"><b>42:35</b></span> And it came to pass as they emptied\n  their sacks, that, behold, every man's bundle of money was in his sack; and\n  when they and their father saw their bundles of money, they were afraid. <span class=\"VerseNumber\"><b>42:36</b></span> And Jacob their father said unto them:\n  'Me have ye bereaved of my children: Joseph is not, and Simeon is not, and ye\n  will take Benjamin away; upon me are all these things come.' <span class=\"VerseNumber\"><b>42:37</b></span> And Reuben spoke unto his father,\n  saying: 'Thou shalt slay my two sons, if I bring him not to thee; deliver him\n  into my hand, and I will bring him back to thee.' <span class=\"VerseNumber\"><b>42:38</b></span>\n  And he said: 'My son shall not go down with you; for his brother is dead, and\n  he only is left; if harm befall him by the way in which ye go, <span class=\"vertical1\"><b>then will ye bring down my gray hairs with sorrow to the\n  grave</b></span>.",
          "text": "a 42:29 And they\n  came unto Jacob their father unto the land of Canaan, and told him all that\n  had befallen them, saying: 42:30 'The man, the lord of the land, spoke roughly with us, and\n  took us for spies of the country . 42:31 And we said unto him: We are upright men; we are no\n  spies . 42:32 We are twelve brethren, sons of our father; one is not,\n  and the youngest is this day with our father in the land of Canaan . 42:33 And the\n  man, the lord of the land, said unto us: Hereby shall I know that ye are\n  upright men: leave one of your brethren with me, and take corn for the famine\n  of your houses, and go your way . 42:34 And bring your youngest brother unto me; then shall\n  I know that ye are no spies, but that ye are upright men; so will I deliver\n  you your brother, and ye shall traffic in the land .' 42:35 And it came to pass as they emptied\n  their sacks, that, behold, every man's bundle of money was in his sack; and\n  when they and their father saw their bundles of money, they were afraid. 42:36 And Jacob their father said unto them:\n  'Me have ye bereaved of my children: Joseph is not, and Simeon is not, and ye\n  will take Benjamin away; upon me are all these things come.' 42:37 And Reuben spoke unto his father,\n  saying: 'Thou shalt slay my two sons, if I bring him not to thee; deliver him\n  into my hand, and I will bring him back to thee.' 42:38 And he said: 'My son shall not go down with you; for his brother is dead, and\n  he only is left; if harm befall him by the way in which ye go, then will ye bring down my gray hairs with sorrow to the\n  grave .",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>43:16</b></span> And when\n  Joseph saw Benjamin with them, he said to the steward of his house: 'Bring\n  the men into the house, and kill the beasts, and prepare the meat; for the\n  men shall dine with me at noon.' <span class=\"VerseNumber\"><b>43:17</b></span>\n  And the man did as Joseph bade; and the man brought the men into Joseph's\n  house. <span class=\"VerseNumber\"><b>43:18</b></span> And the men were afraid,\n  because they were brought into Joseph's house; and they said: 'Because of the\n  money that was returned in our sacks at the first time are we brought in;\n  that he may seek occasion against us, and fall upon us, and take us for\n  bondmen, and our asses.' <span class=\"VerseNumber\"><b>43:19</b></span> And they\n  came near to the steward of Joseph's house, and they spoke unto him at the\n  door of the house, <span class=\"VerseNumber\"><b>43:20</b></span> and said: 'Oh\n  my lord, we came indeed down at the first time to buy food. <span class=\"VerseNumber\"><b>43:21</b></span> And it came to pass, when we came to\n  the lodging-place, that we opened our sacks, and, behold, every man's money\n  was in the mouth of his sack, our money in full weight; and we have brought\n  it back in our hand. <span class=\"VerseNumber\"><b>43:22</b></span> And other\n  money have we brought down in our hand to buy food. We know not who put our\n  money in our sacks.' <span class=\"VerseNumber\"><b>43:23</b></span> And he said:\n  'Peace be to you, <span class=\"vertical1\"><b>fear not; your God, and the God of\n  your father, hath given you</b></span> treasure in your sacks; I had your\n  money.' And he brought Simeon out unto them. <span class=\"VerseNumber\"><b>43:24</b></span>\n  And the man brought the men into Joseph's house, and gave them water, and\n  they washed their feet; and he gave their asses provender. <span class=\"VerseNumber\"><b>43:25</b></span> And they made ready the present against\n  Joseph's coming at noon; for they heard that they should eat bread there.",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>44:1</b></span> <span class=\"vertical1\"><b>And he commanded the steward of his house, saying: 'Fill the\n  men's sacks with food, as much as they can carry, and put every man's money\n  in his sack's mouth</b></span>. <span class=\"VerseNumber\"><b>44:2</b></span> <span class=\"vertical1\"><b>And put my goblet, the silver goblet, in the sack's mouth\n  of the youngest, and his corn money.' And he did according to the word that\n  Joseph had spoken</b></span>. <span class=\"VerseNumber\"><b>44:3</b></span> As\n  soon as the morning was light, the men were sent away, they and their asses. <span class=\"VerseNumber\"><b>44:4</b></span> And when they were gone out of the city,\n  and were not yet far off, Joseph said unto his steward: 'Up, follow after the\n  men; and when thou dost overtake them, say unto them: Wherefore have ye\n  rewarded evil for good? <span class=\"VerseNumber\"><b>44:5</b></span> Is not\n  this it in which my lord drinketh, and whereby he indeed divineth? ye have\n  done evil in so doing.' <span class=\"VerseNumber\"><b>44:6</b></span> And he\n  overtook them, and he spoke unto them these words. <span class=\"VerseNumber\"><b>44:7</b></span>\n  And they said unto him: 'Wherefore speaketh my lord such words as these? Far\n  be it from thy servants that they should do such a thing. <span class=\"VerseNumber\"><b>44:8</b></span> Behold, the money, which we found in our\n  sacks' mouths, we brought back unto thee out of the land of Canaan; how then\n  should we steal out of thy lord's house silver or gold? <span class=\"VerseNumber\"><b>44:9</b></span> With whomsoever of thy servants it be\n  found, let him die, and we also will be my lord's bondmen.' <span class=\"VerseNumber\"><b>44:10</b></span> And he said: 'Now also let it be\n  according unto your words: he with whom it is found shall be my bondman; and\n  ye shall be blameless.' <span class=\"VerseNumber\"><b>44:11</b></span> Then they\n  hastened, and took down every man his sack to the ground, and opened every\n  man his sack. <span class=\"VerseNumber\"><b>44:12</b></span> And he searched,\n  beginning at the eldest, and leaving off at the youngest; and the goblet was\n  found in Benjamin's sack. <span class=\"VerseNumber\"><b>44:13</b></span> And\n  they rent their clothes, and laded every man his ass, and returned to the\n  city.",
          "text": "a 44:1 And he commanded the steward of his house, saying: 'Fill the\n  men's sacks with food, as much as they can carry, and put every man's money\n  in his sack's mouth . 44:2 And put my goblet, the silver goblet, in the sack's mouth\n  of the youngest, and his corn money.' And he did according to the word that\n  Joseph had spoken . 44:3 As\n  soon as the morning was light, the men were sent away, they and their asses. 44:4 And when they were gone out of the city,\n  and were not yet far off, Joseph said unto his steward: 'Up, follow after the\n  men; and when thou dost overtake them, say unto them: Wherefore have ye\n  rewarded evil for good? 44:5 Is not\n  this it in which my lord drinketh, and whereby he indeed divineth? ye have\n  done evil in so doing.' 44:6 And he\n  overtook them, and he spoke unto them these words. 44:7 And they said unto him: 'Wherefore speaketh my lord such words as these? Far\n  be it from thy servants that they should do such a thing. 44:8 Behold, the money, which we found in our\n  sacks' mouths, we brought back unto thee out of the land of Canaan; how then\n  should we steal out of thy lord's house silver or gold? 44:9 With whomsoever of thy servants it be\n  found, let him die, and we also will be my lord's bondmen.' 44:10 And he said: 'Now also let it be\n  according unto your words: he with whom it is found shall be my bondman; and\n  ye shall be blameless.' 44:11 Then they\n  hastened, and took down every man his sack to the ground, and opened every\n  man his sack. 44:12 And he searched,\n  beginning at the eldest, and leaving off at the youngest; and the goblet was\n  found in Benjamin's sack. 44:13 And\n  they rent their clothes, and laded every man his ass, and returned to the\n  city.",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>43:1</b></span> And the\n  famine was sore in the land. <span class=\"VerseNumber\"><b>43:2</b></span> And\n  it came to pass, when they had eaten up the corn which they had brought out\n  of Egypt, that their father said unto them: 'Go again, buy us a little food.'\n  <span class=\"VerseNumber\"><b>43:3</b></span> <span class=\"vertical1\"><b>And Judah\n  spoke unto him, saying: 'The man did earnestly forewarn us, saying: Ye shall\n  not see my face, except your brother be with you</b></span>. <span class=\"VerseNumber\"><b>43:4</b></span> If thou wilt send our brother with us,\n  we will go down and buy thee food; <span class=\"VerseNumber\"><b>43:5</b></span>\n  but if thou wilt not send him, we will not go down, for the man said unto us:\n  Ye shall not see my face, except your brother be with you.' <span class=\"VerseNumber\"><b>43:6</b></span> And Israel said: 'Wherefore dealt ye so\n  ill with me, as to tell the man whether ye had yet a brother?' <span class=\"VerseNumber\"><b>43:7</b></span> <span class=\"vertical1\"><b>And they said:\n  'The man asked straitly concerning ourselves, and concerning our kindred,\n  saying: Is your father yet alive? have ye another brother? and we told him\n  according to the tenor of these words; could we in any wise know that he\n  would say: Bring your brother down</b></span>?' <span class=\"VerseNumber\"><b>43:8</b></span>\n  And Judah said unto Israel his father: 'Send the lad with me, and we will\n  arise and go, that we may live, and not die, both we, and thou, and also our\n  little ones. <span class=\"VerseNumber\"><b>43:9</b></span> I will be surety for\n  him; of my hand shalt thou require him; if I bring him not unto thee, and set\n  him before thee, then let me bear the blame for ever. <span class=\"VerseNumber\"><b>43:10</b></span> For except we had lingered, surely we\n  had now returned a second time.' <span class=\"VerseNumber\"><b>43:11</b></span>\n  And their father Israel said unto them: 'If it be so now, do this: take of\n  the choice fruits of the land in your vessels, and carry down the man a\n  present, a little balm, and a little honey, spicery and ladanum, nuts, and\n  almonds; <span class=\"VerseNumber\"><b>43:12</b></span> and take double money in\n  your hand; and the money that was returned in the mouth of your sacks carry\n  back in your hand; peradventure it was an oversight; <span class=\"VerseNumber\"><b>43:13</b></span>\n  take also your brother, and arise, go again unto the man; <span class=\"VerseNumber\"><b>43:14</b></span> <span class=\"vertical1\"><b>and God\n  Almighty give you mercy before the man, that he may release unto you your\n  other brother and Benjamin. And as for me, if I be bereaved of my children, I\n  am bereaved</b></span>.' <span class=\"VerseNumber\"><b>43:15</b></span> And the\n  men took that present, and they took double money in their hand, and\n  Benjamin; and rose up, and went down to Egypt, and stood before Joseph.",
          "text": "b 43:1 And the\n  famine was sore in the land. 43:2 And\n  it came to pass, when they had eaten up the corn which they had brought out\n  of Egypt, that their father said unto them: 'Go again, buy us a little food.' 43:3 And Judah\n  spoke unto him, saying: 'The man did earnestly forewarn us, saying: Ye shall\n  not see my face, except your brother be with you . 43:4 If thou wilt send our brother with us,\n  we will go down and buy thee food; 43:5 but if thou wilt not send him, we will not go down, for the man said unto us:\n  Ye shall not see my face, except your brother be with you.' 43:6 And Israel said: 'Wherefore dealt ye so\n  ill with me, as to tell the man whether ye had yet a brother?' 43:7 And they said:\n  'The man asked straitly concerning ourselves, and concerning our kindred,\n  saying: Is your father yet alive? have ye another brother? and we told him\n  according to the tenor of these words; could we in any wise know that he\n  would say: Bring your brother down ?' 43:8 And Judah said unto Israel his father: 'Send the lad with me, and we will\n  arise and go, that we may live, and not die, both we, and thou, and also our\n  little ones. 43:9 I will be surety for\n  him; of my hand shalt thou require him; if I bring him not unto thee, and set\n  him before thee, then let me bear the blame for ever. 43:10 For except we had lingered, surely we\n  had now returned a second time.' 43:11 And their father Israel said unto them: 'If it be so now, do this: take of\n  the choice fruits of the land in your vessels, and carry down the man a\n  present, a little balm, and a little honey, spicery and ladanum, nuts, and\n  almonds; 43:12 and take double money in\n  your hand; and the money that was returned in the mouth of your sacks carry\n  back in your hand; peradventure it was an oversight; 43:13 take also your brother, and arise, go again unto the man; 43:14 and God\n  Almighty give you mercy before the man, that he may release unto you your\n  other brother and Benjamin. And as for me, if I be bereaved of my children, I\n  am bereaved .' 43:15 And the\n  men took that present, and they took double money in their hand, and\n  Benjamin; and rose up, and went down to Egypt, and stood before Joseph.",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>43:26</b></span> And when\n  Joseph came home, they brought him the present which was in their hand into\n  the house, and bowed down to him to the earth. <span class=\"VerseNumber\"><b>43:27</b></span>\n  And he asked them of their welfare, and said: 'Is your father well, the old\n  man of whom ye spoke? Is he yet alive?' <span class=\"VerseNumber\"><b>43:28</b></span>\n  And they said: 'Thy servant our father is well, he is yet alive.' And they\n  bowed the head, and made obeisance. <span class=\"VerseNumber\"><b>43:29</b></span>\n  And he lifted up his eyes, and saw Benjamin his brother, his mother's son,\n  and said: 'Is this your youngest brother of whom ye spoke unto me?' And he\n  said: <span class=\"vertical1\"><b>'God be gracious unto thee, my son</b></span>.'\n  <span class=\"VerseNumber\"><b>43:30</b></span> <span class=\"vertical1\"><b>And\n  Joseph made haste; for his heart yearned toward his brother; and he sought\n  where to weep; and he entered into his chamber, and wept there</b></span>. <span class=\"VerseNumber\"><b>43:31</b></span> And he washed his face, and came out;\n  and he refrained himself, and said: 'Set on bread.' <span class=\"VerseNumber\"><b>43:32</b></span>\n  And they set on for him by himself, and for them by themselves, and for the\n  Egyptians, that did eat with him, by themselves; because the Egyptians might\n  not eat bread with the Hebrews; for that is an abomination unto the Egyptians.\n  <span class=\"VerseNumber\"><b>43:33</b></span> And they sat before him, the\n  firstborn according to his birthright, and the youngest according to his\n  youth; and the men marvelled one with another. <span class=\"VerseNumber\"><b>43:34</b></span>\n  And portions were taken unto them from before him; but Benjamin's portion was\n  five times so much as any of theirs. And they drank, and were merry with him.",
          "text": "b 43:26 And when\n  Joseph came home, they brought him the present which was in their hand into\n  the house, and bowed down to him to the earth. 43:27 And he asked them of their welfare, and said: 'Is your father well, the old\n  man of whom ye spoke? Is he yet alive?' 43:28 And they said: 'Thy servant our father is well, he is yet alive.' And they\n  bowed the head, and made obeisance. 43:29 And he lifted up his eyes, and saw Benjamin his brother, his mother's son,\n  and said: 'Is this your youngest brother of whom ye spoke unto me?' And he\n  said: 'God be gracious unto thee, my son .' 43:30 And\n  Joseph made haste; for his heart yearned toward his brother; and he sought\n  where to weep; and he entered into his chamber, and wept there . 43:31 And he washed his face, and came out;\n  and he refrained himself, and said: 'Set on bread.' 43:32 And they set on for him by himself, and for them by themselves, and for the\n  Egyptians, that did eat with him, by themselves; because the Egyptians might\n  not eat bread with the Hebrews; for that is an abomination unto the Egyptians. 43:33 And they sat before him, the\n  firstborn according to his birthright, and the youngest according to his\n  youth; and the men marvelled one with another. 43:34 And portions were taken unto them from before him; but Benjamin's portion was\n  five times so much as any of theirs. And they drank, and were merry with him.",

          "html": "<span class=\"VerseNumber\"><b>44:18</b></span> Then Judah came\n  near unto him, and said: 'Oh my lord, let thy servant, I pray thee, speak a\n  word in my lord's ears, and let not thine anger burn against thy servant; <span class=\"vertical1\"><b>for thou art even as Pharaoh</b></span>. <span class=\"VerseNumber\"><b>44:19</b></span> <span class=\"vertical1\"><b>My lord asked\n  his servants, saying: Have ye a father, or a brother</b></span>? <span class=\"VerseNumber\"><b>44:20</b></span> <span class=\"vertical1\"><b>And we said\n  unto my lord: We have a father, an old man, and a child of his old age, a\n  little one; and his brother is dead, and he alone is left of his mother, and\n  his father loveth him</b></span>. <span class=\"VerseNumber\"><b>44:21</b></span>\n<span class=\"vertical1\"><b>And thou saidst unto thy servants: Bring him down\n  unto me, that I may set mine eyes upon him</b></span>. <span class=\"VerseNumber\"><b>44:22</b></span> <span class=\"vertical1\"><b>And we said\n  unto my lord: The lad cannot leave his father; for if he should leave his\n  father, his father would die</b></span>. <span class=\"VerseNumber\"><b>44:23</b></span>\n<span class=\"vertical1\"><b>And thou saidst unto thy servants: Except your\n  youngest brother come down with you, ye shall see my face no more</b></span>.\n  <span class=\"VerseNumber\"><b>44:24</b></span> <span class=\"vertical1\"><b>And it\n  came to pass when we came up unto thy servant my father, we told him the\n  words of my lord</b></span>. <span class=\"VerseNumber\"><b>44:25</b></span> <span class=\"vertical1\"><b>And our father said: Go again, buy us a little food</b></span>.\n  <span class=\"VerseNumber\"><b>44:26</b></span> <span class=\"vertical1\"><b>And we\n  said: We cannot go down; if our youngest brother be with us, then will we go\n  down; for we may not see the man's face, except our youngest brother be with\n  us</b></span>. <span class=\"VerseNumber\"><b>44:27</b></span> <span class=\"vertical1\"><b>And thy servant my father said unto us: Ye know that my\n  wife bore me two sons</b></span>; <span class=\"VerseNumber\"><b>44:28</b></span>\n<span class=\"vertical1\"><b>and the one went out from me, and I said: Surely he\n  is torn in pieces; and I have not seen him since</b></span>; <span class=\"VerseNumber\"><b>44:29</b></span> <span class=\"vertical1\"><b>and if ye take\n  this one also from me, and harm befall him, ye will bring down my gray hairs\n  with sorrow to the grave</b></span>. <span class=\"VerseNumber\"><b>44:30</b></span>\n  Now therefore when I come to thy servant my father, and the lad is not with\n  us; seeing that his soul is bound up with the lad's soul; <span class=\"VerseNumber\"><b>44:31</b></span> <span class=\"vertical1\"><b>it will come\n  to pass, when he seeth that the lad is not with us, that he will die; and thy\n  servants will bring down the gray hairs of thy servant our father with sorrow\n  to the grave</b></span>. <span class=\"VerseNumber\"><b>44:32</b></span> For thy\n  servant became surety for the lad unto my father, saying: If I bring him not\n  unto thee, then shall I bear the blame to my father for ever. <span class=\"VerseNumber\"><b>44:33</b></span> Now therefore, let thy servant, I pray\n  thee, abide instead of the lad a bondman to my lord; and let the lad go up\n  with his brethren. <span class=\"VerseNumber\"><b>44:34</b></span> For how shall\n  I go up to my father, if the lad be not with me? lest I look upon the evil\n  that shall come on my father.'",
          "text": "44:18 Then Judah came\n  near unto him, and said: 'Oh my lord, let thy servant, I pray thee, speak a\n  word in my lord's ears, and let not thine anger burn against thy servant; for thou art even as Pharaoh . 44:19 My lord asked\n  his servants, saying: Have ye a father, or a brother ? 44:20 And we said\n  unto my lord: We have a father, an old man, and a child of his old age, a\n  little one; and his brother is dead, and he alone is left of his mother, and\n  his father loveth him . 44:21 And thou saidst unto thy servants: Bring him down\n  unto me, that I may set mine eyes upon him . 44:22 And we said\n  unto my lord: The lad cannot leave his father; for if he should leave his\n  father, his father would die . 44:23 And thou saidst unto thy servants: Except your\n  youngest brother come down with you, ye shall see my face no more . 44:24 And it\n  came to pass when we came up unto thy servant my father, we told him the\n  words of my lord . 44:25 And our father said: Go again, buy us a little food . 44:26 And we\n  said: We cannot go down; if our youngest brother be with us, then will we go\n  down; for we may not see the man's face, except our youngest brother be with\n  us . 44:27 And thy servant my father said unto us: Ye know that my\n  wife bore me two sons ; 44:28 and the one went out from me, and I said: Surely he\n  is torn in pieces; and I have not seen him since ; 44:29 and if ye take\n  this one also from me, and harm befall him, ye will bring down my gray hairs\n  with sorrow to the grave . 44:30 Now therefore when I come to thy servant my father, and the lad is not with\n  us; seeing that his soul is bound up with the lad's soul; 44:31 it will come\n  to pass, when he seeth that the lad is not with us, that he will die; and thy\n  servants will bring down the gray hairs of thy servant our father with sorrow\n  to the grave . 44:32 For thy\n  servant became surety for the lad unto my father, saying: If I bring him not\n  unto thee, then shall I bear the blame to my father for ever. 44:33 Now therefore, let thy servant, I pray\n  thee, abide instead of the lad a bondman to my lord; and let the lad go up\n  with his brethren. 44:34 For how shall\n  I go up to my father, if the lad be not with me? lest I look upon the evil\n  that shall come on my father.'",

          "col": 1,
          "html": "<span class=\"VerseNumber\"><b>45:1</b></span> Then Joseph could\n  not refrain himself before all them that stood by him; and he cried: 'Cause\n  every man to go out from me.' And there stood no man with him, while Joseph\n  made himself known unto his brethren. <span class=\"VerseNumber\"><b>45:2</b></span>\n  And he wept aloud; and the Egyptians heard, and the house of Pharaoh heard. <span class=\"VerseNumber\"><b>45:3</b></span> And Joseph said unto his brethren: 'I am\n  Joseph; doth my father yet live?' And his brethren could not answer him; for\n  they were affrighted at his presence. <span class=\"VerseNumber\"><b>45:4</b></span>\n  And Joseph said unto his brethren: 'Come near to me, I pray you.' And they\n  came near. And he said: 'I am Joseph your brother, <span class=\"vertical1\"><b>whom\n  ye sold</b></span> into Egypt. <span class=\"VerseNumber\"><b>45:5</b></span> And\n  now be not grieved, nor angry with yourselves, that ye sold me hither; <span class=\"vertical1\"><b>for God did send me before you to preserve life</b></span>.\n  <span class=\"VerseNumber\"><b>45:6</b></span> For these two years hath the\n  famine been in the land; and there are yet five years, in which there shall\n  be neither plowing nor harvest. <span class=\"VerseNumber\"><b>45:7</b></span> <span class=\"vertical1\"><b>And God sent me before you to give you a remnant on the\n  earth, and to save you alive for a great deliverance</b></span>. <span class=\"VerseNumber\"><b>45:8</b></span> <span class=\"vertical1\"><b>So now it was\n  not you that sent me hither, but God; and He hath made me a father to\n  Pharaoh, and lord of all his house, and ruler over all the land of Egypt</b></span>.\n  <span class=\"VerseNumber\"><b>45:9</b></span> Hasten ye, and go up to my father,\n  and say unto him: Thus saith thy son Joseph: <span class=\"vertical1\"><b>God\n  hath made me lord of all Egypt</b></span>; come down unto me, tarry not. <span class=\"VerseNumber\"><b>45:10</b></span> And thou shalt dwell in the land of\n  Goshen, and thou shalt be near unto me, thou, and thy children, and thy\n  children's children, and thy flocks, and thy herds, and all that thou hast; <span class=\"VerseNumber\"><b>45:11</b></span> and there will I sustain thee; for\n  there are yet five years of famine; lest thou come to poverty, thou, and thy\n  household, and all that thou hast. <span class=\"VerseNumber\"><b>45:12</b></span>\n  And, behold, your eyes see, and the eyes of my brother Benjamin, that it is\n  my mouth that speaketh unto you. <span class=\"VerseNumber\"><b>45:13</b></span>\n  And ye shall tell my father of all my glory in Egypt, and of all that ye have\n  seen; and ye shall hasten and bring down my father hither.' <span class=\"VerseNumber\"><b>45:14</b></span> <span class=\"vertical1\"><b>And he fell\n  upon his brother Benjamin's neck, and wept; and Benjamin wept upon his neck</b></span>.\n  <span class=\"VerseNumber\"><b>45:15</b></span> <span class=\"vertical1\"><b>And he\n  kissed all his brethren, and wept upon them</b></span>; and after that his\n  brethren talked with him.",
          "text": "45:1 Then Joseph could\n  not refrain himself before all them that stood by him; and he cried: 'Cause\n  every man to go out from me.' And there stood no man with him, while Joseph\n  made himself known unto his brethren. 45:2 And he wept aloud; and the Egyptians heard, and the house of Pharaoh heard. 45:3 And Joseph said unto his brethren: 'I am\n  Joseph; doth my father yet live?' And his brethren could not answer him; for\n  they were affrighted at his presence. 45:4 And Joseph said unto his brethren: 'Come near to me, I pray you.' And they\n  came near. And he said: 'I am Joseph your brother, whom\n  ye sold into Egypt. 45:5 And\n  now be not grieved, nor angry with yourselves, that ye sold me hither; for God did send me before you to preserve life . 45:6 For these two years hath the\n  famine been in the land; and there are yet five years, in which there shall\n  be neither plowing nor harvest. 45:7 And God sent me before you to give you a remnant on the\n  earth, and to save you alive for a great deliverance . 45:8 So now it was\n  not you that sent me hither, but God; and He hath made me a father to\n  Pharaoh, and lord of all his house, and ruler over all the land of Egypt . 45:9 Hasten ye, and go up to my father,\n  and say unto him: Thus saith thy son Joseph: God\n  hath made me lord of all Egypt ; come down unto me, tarry not. 45:10 And thou shalt dwell in the land of\n  Goshen, and thou shalt be near unto me, thou, and thy children, and thy\n  children's children, and thy flocks, and thy herds, and all that thou hast; 45:11 and there will I sustain thee; for\n  there are yet five years of famine; lest thou come to poverty, thou, and thy\n  household, and all that thou hast. 45:12 And, behold, your eyes see, and the eyes of my brother Benjamin, that it is\n  my mouth that speaketh unto you. 45:13 And ye shall tell my father of all my glory in Egypt, and of all that ye have\n  seen; and ye shall hasten and bring down my father hither.' 45:14 And he fell\n  upon his brother Benjamin's neck, and wept; and Benjamin wept upon his neck . 45:15 And he\n  kissed all his brethren, and wept upon them ; and after that his\n  brethren talked with him.",

          "html": "<span class=\"VerseNumber\"><b>45:16</b></span> And the report\n  thereof was heard in Pharaoh's house, saying: 'Joseph's brethren are come';\n  and it pleased Pharaoh well, and his servants. <span class=\"VerseNumber\"><b>45:17</b></span>\n  And Pharaoh said unto Joseph: 'Say unto thy brethren: This do ye: lade your\n  beasts, and go, get you unto the land of Canaan; <span class=\"VerseNumber\"><b>45:18</b></span>\n  and take your father and your households, and come unto me; and I will give\n  you the good of the land of Egypt, and ye shall eat the fat of the land. <span class=\"VerseNumber\"><b>45:19</b></span> Now thou art commanded, this do ye:\n  take you wagons out of the land of Egypt for your little ones, and for your\n  wives, and bring your father, and come. <span class=\"VerseNumber\"><b>45:20</b></span>\n  Also regard not your stuff; for the good things of all the land of Egypt are\n  yours.' <span class=\"VerseNumber\"><b>45:21</b></span> And the sons of Israel\n  did so; and Joseph gave them wagons, according to the commandment of Pharaoh,\n  and gave them provision for the way. <span class=\"VerseNumber\"><b>45:22</b></span>\n  To all of them he gave each man changes of raiment; but to Benjamin he gave\n  three hundred shekels of silver, and five changes of raiment. <span class=\"VerseNumber\"><b>45:23</b></span> And to his father he sent in like\n  manner ten asses laden with the good things of Egypt, and ten she-asses laden\n  with corn and bread and victual for his father by the way. <span class=\"VerseNumber\"><b>45:24</b></span> So he sent his brethren away, and they\n  departed; and he said unto them: 'See that ye fall not out by the way.' <span class=\"VerseNumber\"><b>45:25</b></span> And they went up out of Egypt, and came\n  into the land of Canaan unto Jacob their father. <span class=\"VerseNumber\"><b>45:26</b></span>\n  And they told him, saying: 'Joseph is yet alive, and he is ruler over all the\n  land of Egypt.' And his heart fainted, for he believed them not. <span class=\"VerseNumber\"><b>45:27</b></span> And they told him all the words of\n  Joseph, which he had said unto them; and when he saw the wagons which Joseph\n  had sent to carry him, the spirit of Jacob their father revived. <span class=\"VerseNumber\"><b>45:28</b></span> And Israel said: 'It is enough; Joseph\n  my son is yet alive; I will go and see him before I die.'",
          "text": "45:16 And the report\n  thereof was heard in Pharaoh's house, saying: 'Joseph's brethren are come';\n  and it pleased Pharaoh well, and his servants. 45:17 And Pharaoh said unto Joseph: 'Say unto thy brethren: This do ye: lade your\n  beasts, and go, get you unto the land of Canaan; 45:18 and take your father and your households, and come unto me; and I will give\n  you the good of the land of Egypt, and ye shall eat the fat of the land. 45:19 Now thou art commanded, this do ye:\n  take you wagons out of the land of Egypt for your little ones, and for your\n  wives, and bring your father, and come. 45:20 Also regard not your stuff; for the good things of all the land of Egypt are\n  yours.' 45:21 And the sons of Israel\n  did so; and Joseph gave them wagons, according to the commandment of Pharaoh,\n  and gave them provision for the way. 45:22 To all of them he gave each man changes of raiment; but to Benjamin he gave\n  three hundred shekels of silver, and five changes of raiment. 45:23 And to his father he sent in like\n  manner ten asses laden with the good things of Egypt, and ten she-asses laden\n  with corn and bread and victual for his father by the way. 45:24 So he sent his brethren away, and they\n  departed; and he said unto them: 'See that ye fall not out by the way.' 45:25 And they went up out of Egypt, and came\n  into the land of Canaan unto Jacob their father. 45:26 And they told him, saying: 'Joseph is yet alive, and he is ruler over all the\n  land of Egypt.' And his heart fainted, for he believed them not. 45:27 And they told him all the words of\n  Joseph, which he had said unto them; and when he saw the wagons which Joseph\n  had sent to carry him, the spirit of Jacob their father revived. 45:28 And Israel said: 'It is enough; Joseph\n  my son is yet alive; I will go and see him before I die.'",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>47:1</b></span> Then Joseph went in and told Pharaoh,\n  and said: 'My father and my brethren, and their flocks, and their herds, and\n  all that they have, are come out of the land of Canaan; and, behold, they are\n  in the land of Goshen.' <span class=\"VerseNumber\"><b>47:2</b></span> And from\n  among his brethren he took five men, and presented them unto Pharaoh. <span class=\"VerseNumber\"><b>47:3</b></span> And Pharaoh said unto his brethren:\n  'What is your occupation?' And they said unto Pharaoh: 'Thy servants are\n  shepherds, both we, and our fathers.' <span class=\"VerseNumber\"><b>47:4</b></span>\n  And they said unto Pharaoh: 'To sojourn in the land are we come; for there is\n  no pasture for thy servants' flocks; for the famine is sore in the land of\n  Canaan. Now therefore, we pray thee, let thy servants dwell in the land of\n  Goshen.' <span class=\"VerseNumber\"><b>47:5</b></span> And Pharaoh spoke unto\n  Joseph, saying: 'Thy father and thy brethren are come unto thee; <span class=\"VerseNumber\"><b>47:6</b></span> the land of Egypt is before thee; in the\n  best of the land make thy father and thy brethren to dwell; in the land of\n  Goshen let them dwell. And if thou knowest any able men among them, then make\n  them rulers over my cattle.'",
          "text": "a 47:1 Then Joseph went in and told Pharaoh,\n  and said: 'My father and my brethren, and their flocks, and their herds, and\n  all that they have, are come out of the land of Canaan; and, behold, they are\n  in the land of Goshen.' 47:2 And from\n  among his brethren he took five men, and presented them unto Pharaoh. 47:3 And Pharaoh said unto his brethren:\n  'What is your occupation?' And they said unto Pharaoh: 'Thy servants are\n  shepherds, both we, and our fathers.' 47:4 And they said unto Pharaoh: 'To sojourn in the land are we come; for there is\n  no pasture for thy servants' flocks; for the famine is sore in the land of\n  Canaan. Now therefore, we pray thee, let thy servants dwell in the land of\n  Goshen.' 47:5 And Pharaoh spoke unto\n  Joseph, saying: 'Thy father and thy brethren are come unto thee; 47:6 the land of Egypt is before thee; in the\n  best of the land make thy father and thy brethren to dwell; in the land of\n  Goshen let them dwell. And if thou knowest any able men among them, then make\n  them rulers over my cattle.'",

        {

          "row": 7,
          "col": 0,
          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>46:8</b></span> <span class=\"vertical1\"><b>And these are\n  the names of the children of Israel, who came into Egypt</b></span>, Jacob\n  and his sons: Reuben, Jacob's first-born. <span class=\"VerseNumber\"><b>46:9</b></span>\n  And the sons of Reuben: Hanoch, and Pallu, and Hezron, and Carmi. <span class=\"VerseNumber\"><b>46:10</b></span> And the sons of Simeon: Jemuel, and\n  Jamin, and Ohad, and Jachin, and Zohar, and Shaul the son of a Canaanitish\n  woman. <span class=\"VerseNumber\"><b>46:11</b></span> And the sons of Levi:\n  Gershon, Kohath, and Merari. <span class=\"VerseNumber\"><b>46:12</b></span> And\n  the sons of Judah: Er, and Onan, and Shelah, and Perez, and Zerah; but Er and\n  Onan died in the land of Canaan. And the sons of Perez were Hezron and Hamul.\n  <span class=\"VerseNumber\"><b>46:13</b></span> And the sons of Issachar: Tola,\n  and Puvah, and Iob, and Shimron. <span class=\"VerseNumber\"><b>46:14</b></span>\n  And the sons of Zebulun: Sered, and Elon, and Jahleel. <span class=\"VerseNumber\"><b>46:15</b></span> These are the sons of Leah, whom she\n  bore unto Jacob in Paddan-aram, with his daughter Dinah; all the souls of his\n  sons and his daughters were thirty and three. <span class=\"VerseNumber\"><b>46:16</b></span>\n  And the sons of Gad: Ziphion, and Haggi, Shuni, and Ezbon, Eri, and Arodi,\n  and Areli. <span class=\"VerseNumber\"><b>46:17</b></span> And the sons of Asher:\n  Imnah, and Ishvah, and Ishvi, and Beriah, and Serah their sister; and the\n  sons of Beriah: Heber, and Malchiel. <span class=\"VerseNumber\"><b>46:18</b></span>\n  These are the sons of Zilpah, whom Laban gave to Leah his daughter, and these\n  she bore unto Jacob, even sixteen souls. <span class=\"VerseNumber\"><b>46:19</b></span>\n  The sons of Rachel Jacob's wife: Joseph and Benjamin. <span class=\"VerseNumber\"><b>46:20</b></span> And unto Joseph in the land of Egypt\n  were born Manasseh and Ephraim, whom Asenath the daughter of Poti-phera\n  priest of On bore unto him. <span class=\"VerseNumber\"><b>46:21</b></span> And\n  the sons of Benjamin: Bela, and Becher, and Ashbel, Gera, and Naaman, Ehi,\n  and Rosh, Muppim, and Huppim, and Ard. <span class=\"VerseNumber\"><b>46:22</b></span>\n  These are the sons of Rachel, who were born to Jacob; all the souls were\n  fourteen. <span class=\"VerseNumber\"><b>46:23</b></span> And the sons of Dan:\n  Hushim. <span class=\"VerseNumber\"><b>46:24</b></span> And the sons of Naphtali:\n  Jahzeel, and Guni, and Jezer, and Shillem. <span class=\"VerseNumber\"><b>46:25</b></span>\n  These are the sons of Bilhah, whom Laban gave unto Rachel his daughter, and\n  these she bore unto Jacob; all the souls were seven. <span class=\"VerseNumber\"><b>46:26</b></span>\n  All the souls belonging to Jacob that came into Egypt, that came out of his\n  loins, besides Jacob's sons' wives, all the souls were threescore and six. <span class=\"VerseNumber\"><b>46:27</b></span> And the sons of Joseph, who were born\n  to him in Egypt, were two souls; all the souls of the house of Jacob, that\n  came into Egypt, were threescore and ten. <span class=\"HebrewParagraph\"><span>{S}</span></span>",

o Egypt, that came out of his\n  loins, besides Jacob's sons' wives, all the souls were threescore and six. 46:27 And the sons of Joseph, who were born\n  to him in Egypt, were two souls; all the souls of the house of Jacob, that\n  came into Egypt, were threescore and ten. {S}",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>46:31</b></span> And Joseph said unto his brethren, and\n  unto his father's house: 'I will go up, and tell Pharaoh, and will say unto\n  him: My brethren, and my father's house, who were in the land of Canaan, are\n  come unto me; <span class=\"VerseNumber\"><b>46:32</b></span> and the men are\n  shepherds, for they have been keepers of cattle; and they have brought their\n  flocks, and their herds, and all that they have. <span class=\"VerseNumber\"><b>46:33</b></span>\n  And it shall come to pass, when Pharaoh shall call you, and shall say: What\n  is your occupation? <span class=\"VerseNumber\"><b>46:34</b></span> that ye shall\n  say: Thy servants have been keepers of cattle from our youth even until now,\n  both we, and our fathers; that ye may dwell in the land of Goshen; for every\n  shepherd is an abomination unto the Egyptians.'",
