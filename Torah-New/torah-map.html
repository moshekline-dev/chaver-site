          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>2:8</b></span> And the LORD God planted a garden eastward, in Eden; and there He put the man whom He had formed. <span class=\"VerseNumber\"><b>2:9</b></span> <span class=\"vertical1\"><b>And out of the ground made the LORD God to grow every tree that is pleasant to the sight, and good for food</b></span>; the tree of life also in the midst of the garden, and the tree of the knowledge of good and evil. <span class=\"VerseNumber\"><b>2:10</b></span> And a river went out of Eden to water the garden; and from thence it was parted, and became four heads. <span class=\"VerseNumber\"><b>2:11</b></span> The name of the first is Pishon; that is it which compasseth the whole land of Havilah, where there is gold; <span class=\"VerseNumber\"><b>2:12</b></span> and the gold of that land is good; there is bdellium and the onyx stone. <span class=\"VerseNumber\"><b>2:13</b></span> And the name of the second river is Gihon; the same is it that compasseth the whole land of Cush. <span class=\"VerseNumber\"><b>2:14</b></span> And the name of the third river is Tigris; that is it which goeth toward the east of Asshur. And the fourth river is the Euphrates. <span class=\"VerseNumber\"><b>2:15</b></span> And the LORD God took the man, and put him into the garden of Eden <span class=\"internalparallel\"><b>to dress it and to keep it</b></span>. <span class=\"VerseNumber\"><b>2:16</b></span> And the LORD God commanded the man, saying: 'Of every tree of the garden thou mayest freely eat; <span class=\"VerseNumber\"><b>2:17</b></span> <span class=\"vertical1\"><b>but of the tree of the knowledge of good and evil, thou shalt not eat of it; for in the day that thou eatest thereof thou shalt surely die</b></span>.'",
          "text": "b 2:8 And the LORD God planted a garden eastward, in Eden; and there He put the man whom He had formed. 2:9 And out of the ground made the LORD God to grow every tree that is pleasant to the sight, and good for food ; the tree of life also in the midst of the garden, and the tree of the knowledge of good and evil. 2:10 And a river went out of Eden to water the garden; and from thence it was parted, and became four heads. 2:11 The name of the first is Pishon; that is it which compasseth the whole land of Havilah, where there is gold; 2:12 and the gold of that land is good; there is bdellium and the onyx stone. 2:13 And the name of the second river is Gihon; the same is it that compasseth the whole land of Cush. 2:14 And the name of the third river is Tigris; that is it which goeth toward the east of Asshur. And the fourth river is the Euphrates. 2:15 And the LORD God took the man, and put him into the garden of Eden to dress it and to keep it . 2:16 And the LORD God commanded the man, saying: 'Of every tree of the garden thou mayest freely eat; 2:17 but of the tree of the knowledge of good and evil, thou shalt not eat of it; for in the day that thou eatest thereof thou shalt surely die .'",

          "text": "a 3:1 Now the serpent was more subtle than any beast of the field which the LORD God had made. And he said unto the woman: 'Yea, hath God said: Ye shall not eat of any tree of the garden?' 3:2 And the woman said unto the serpent: 'Of the fruit of the trees of the garden we may eat; 3:3 but of the fruit of the tree which is in the midst of the garden, God hath said: Ye shall not eat of it, neither shall ye touch it, lest ye die .' 3:4 And the serpent said unto the woman: 'Ye shall not surely die; 3:5 for God doth know that in the day ye eat thereof, then your eyes shall be opened, and ye shall be as God, knowing good and evil. ' 3:6 And when the woman saw that the tree was good for food, and that it was a delight to the eyes, and that the tree was to be desired to make one wise, she took of the fruit thereof, and did eat; and she gave also unto her husband with her, and he did eat. 3:7 And the eyes of them both were opened, and they knew that they were naked; and they sewed fig-leaves together, and made themselves girdles.",

          "text": "a 4:1 And the man knew Eve his wife ; and she conceived and bore Cain, and said: 'I have gotten a man with the help of the LORD.' 4:2 And again she bore his brother Abel. And Abel was a keeper of sheep, but Cain was a tiller of the ground. 4:3 And in process of time it came to pass, that Cain brought of the fruit of the ground an offering unto the LORD. 4:4 And Abel, he also brought of the firstlings of his flock and of the fat thereof. And the LORD had respect unto Abel and to his offering; 4:5 but unto Cain and to his offering He had not respect. And Cain was very wroth, and his countenance fell. 4:6 And the LORD said unto Cain: 'Why art thou wroth? and why is thy countenance fallen? 4:7 If thou doest well, shall it not be lifted up? and if thou doest not well, sin coucheth at the door; and unto thee is its desire, but thou mayest rule over it .' 4:8 And Cain spoke unto Abel his brother. And it came to pass, when they were in the field, that Cain rose up against Abel his brother, and slew him .",

r thee</b></span>.' <span class=\"HebrewParagraph\"><span>{S}</span></span> <span class=\"VerseNumber\"><b>3:17</b></span> And unto Adam He said: 'Because thou hast hearkened unto the voice of thy wife, and hast eaten of the tree, of which I commanded thee, saying: Thou shalt not eat of it; <span class=\"horizontal1\"><b>cursed is the ground for thy sake</b></span>; in toil shalt thou eat of it all the days of thy life. <span class=\"VerseNumber\"><b>3:18</b></span> Thorns also and thistles shall it bring forth to thee; and thou shalt eat the herb of the field. <span class=\"VerseNumber\"><b>3:19</b></span> In the sweat of thy face shalt thou eat bread, till thou return unto the ground; for out of it wast thou taken; for dust thou art, and unto dust shalt thou return.' <span class=\"VerseNumber\"><b>3:20</b></span> And the man called his wife's name Eve; because she was the mother of all living. <span class=\"VerseNumber\"><b>3:21</b></span> And the LORD God made for Adam and for his wife garments of skins, and clothed them. <span class=\"HebrewParagraph\"><span>{P}</span></span><span class=\"VerseNumber\"><b>3:22</b></span> <span class=\"internalparallel\"><b>And the LORD God said: 'Behold, the man is become as one of us, to know good and evil</b></span>; and now, lest he put forth his hand, and take also of the tree of life, and eat, and live for ever.' <span class=\"VerseNumber\"><b>3:23</b></span> Therefore the LORD God sent him forth from the garden of Eden, to till the ground from whence he was taken. <span class=\"VerseNumber\"><b>3:24</b></span> <span class=\"horizontal1\"><b>So He drove out the man; and He placed at the east of the garden of Eden</b></span> the cherubim, and the flaming sword which turned every way, to keep the way to the tree of life. <span class=\"HebrewParagraph\"><span>{S}</span></span>",
          "text": "b 3:8 And they heard the voice of the LORD God walking in the garden toward the cool of the day; and the man and his wife hid themselves from the presence of the LORD God amongst the trees of the garden. 3:9 And the LORD God called unto the man, and said unto him: 'Where art thou ?' 3:10 And he said: 'I heard Thy voice in the garden, and I was afraid, because I was naked; and I hid myself.' 3:11 And He said: 'Who told thee that thou wast naked? Hast thou eaten of the tree, whereof I commanded thee that thou shouldest not eat?' 3:12 And the man said: 'The woman whom Thou gavest to be with me, she gave me of the tree, and I did eat.' 3:13 And the LORD God said unto the woman: 'What is this thou hast done?' And the woman said: 'The serpent beguiled me, and I did eat.' 3:14 And the LORD God said unto the serpent: 'Because thou hast done this, cursed art thou from among all cattle, and from among all beasts of the field ; upon thy belly shalt thou go, and dust shalt thou eat all the days of thy life. 3:15 And I will put enmity between thee and the woman, and between thy seed and her seed; they shall bruise thy head, and thou shalt bruise their heel.' {S} 3:16 Unto the woman He said: 'I will greatly multiply thy pain and thy travail; in pain thou shalt bring forth children; and thy desire shall be to thy husband, and he shall rule over thee .' {S} 3:17 And unto Adam He said: 'Because thou hast hearkened unto the voice of thy wife, and hast eaten of the tree, of which I commanded thee, saying: Thou shalt not eat of it; cursed is the ground for thy sake ; in toil shalt thou eat of it all the days of thy life. 3:18 Thorns also and thistles shall it bring forth to thee; and thou shalt eat the herb of the field. 3:19 In the sweat of thy face shalt thou eat bread, till thou return unto the ground; for out of it wast thou taken; for dust thou art, and unto dust shalt thou return.' 3:20 And the man called his wife's name Eve; because she was the mother of all living. 3:21 And the LORD God made for Adam and for his wife garments of skins, and clothed them. {P} 3:22 And the LORD God said: 'Behold, the man is become as one of us, to know good and evil ; and now, lest he put forth his hand, and take also of the tree of life, and eat, and live for ever.' 3:23 Therefore the LORD God sent him forth from the garden of Eden, to till the ground from whence he was taken. 3:24 So He drove out the man; and He placed at the east of the garden of Eden the cherubim, and the flaming sword which turned every way, to keep the way to the tree of life. {S}",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>5:1</b></span> This is\n  the book of the generations of Adam. In the day that God created man, <span class=\"horizontal1\"><b>in the likeness of God</b></span> made He him; <span class=\"VerseNumber\"><b>5:2</b></span> male and female created He them, and\n  blessed them, and called their name Adam, in the day when they were created. <span class=\"VerseNumber\"><b>5:3</b></span> And Adam lived a hundred and thirty\n  years, <span class=\"ciasm1\"><b>and begot</b></span> a son <span class=\"vertical1\"><b>in his own likeness</b></span>, after his image; and\n  called his name Seth. <span class=\"VerseNumber\"><b>5:4</b></span> And the days\n  of Adam after he <span class=\"ciasm1\"><b>begot</b></span> Seth were eight\n  hundred years; and he <span class=\"ciasm1\"><b>begot</b></span> sons and\n  daughters. <span class=\"VerseNumber\"><b>5:5</b></span> And all the days that\n  Adam lived were nine hundred and thirty years; and he died. <span class=\"HebrewParagraph\"><span>{S}</span></span>",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>12:1</b></span> Now the LORD said unto Abram: 'Get thee out of thy country, and from thy kindred, and from thy father's house, unto the land that I will show thee. <span class=\"VerseNumber\"><b>12:2</b></span> And I will make of thee a great nation, and I will bless thee, and make thy name great; and be thou a blessing. <span class=\"VerseNumber\"><b>12:3</b></span> And I will bless them that bless thee, and him that curseth thee will I curse; and in thee shall all the families of the earth be blessed.' <span class=\"VerseNumber\"><b>12:4</b></span> So Abram went, as the LORD had spoken unto him; and Lot went with him; and Abram was seventy and five years old when he departed out of Haran. <span class=\"VerseNumber\"><b>12:5</b></span> And Abram took Sarai his wife, and Lot his brother's son, and all their substance that they had gathered, and the souls that they had gotten in Haran; and they went forth to go into the land of Canaan; and into the land of Canaan they came. <span class=\"VerseNumber\"><b>12:6</b></span> And Abram passed through the land unto the place of Shechem, unto the terebinth of Moreh. And the Canaanite was then in the land. <span class=\"VerseNumber\"><b>12:7</b></span> And the LORD appeared unto Abram, and said: 'Unto thy seed will I give this land'; and he builded there an altar unto the LORD, who appeared unto him.",

          "text": "a 12:10 And there was a famine in the land; and Abram went down into Egypt to sojourn there; for the famine was sore in the land. 12:11 And it came to pass, when he was come near to enter into Egypt, that he said unto Sarai his wife: 'Behold now, I know that thou art a fair woman to look upon. 12:12 And it will come to pass, when the Egyptians shall see thee, that they will say: This is his wife; and they will kill me, but thee they will keep alive. 12:13 Say, I pray thee, thou art my sister; that it may be well with me for thy sake, and that my soul may live because of thee.' 12:14 And it came to pass, that, when Abram was come into Egypt, the Egyptians beheld the woman that she was very fair. 12:15 And the princes of Pharaoh saw her, and praised her to Pharaoh; and the woman was taken into Pharaoh's house. 12:16 And he dealt well with Abram for her sake; and he had sheep, and oxen, and he-asses, and men-servants, and maid-servants, and she-asses, and camels. 12:17 And the LORD plagued Pharaoh and his house with great plagues because of Sarai Abram's wife. 12:18 And Pharaoh called Abram, and said: 'What is this that thou hast done unto me? why didst thou not tell me that she was thy wife? 12:19 Why saidst thou: She is my sister? so that I took her to be my wife; now therefore behold thy wife, take her, and go thy way.' 12:20 And Pharaoh gave men charge concerning him; and they brought him on the way, and his wife, and all that he had. 13:1 And Abram went up out of Egypt, he, and his wife, and all that he had, and Lot with him, into the South. 13:2 And Abram was very rich in cattle, in silver, and in gold.",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span>\n<span class=\"VerseNumber\"><b>14:13</b></span> And there came one that had escaped, and told Abram the Hebrew--now he dwelt by <span class=\"vertical1\"><b>the terebinths of Mamre</b></span> the Amorite, brother of Eshcol, and brother of Aner; and these were confederate with Abram. \n                                    <span class=\"VerseNumber\"><b>14:14</b></span> And when Abram heard that his brother was taken captive, he led forth his trained men, born in his house, three hundred and eighteen, and pursued as far as Dan. \n                                    <span class=\"VerseNumber\"><b>14:15</b></span> And he divided himself against them by night, he and his servants, and smote them, and pursued them unto Hobah, which is on the left hand of Damascus. \n                                    <span class=\"VerseNumber\"><b>14:16</b></span> And he brought back all the goods, and also brought back his brother Lot, and his goods, and the women also, and the people. \n                                    <span class=\"VerseNumber\"><b>14:17</b></span> And the king of Sodom went out to meet him, after his return from the slaughter of Chedorlaomer and the kings that were with him, at the vale of Shaveh--the same is the King's Vale. \n                                    <span class=\"VerseNumber\"><b>14:18</b></span> And Melchizedek king of Salem brought forth bread and wine; and he was priest of God the Most High. \n                                    <span class=\"VerseNumber\"><b>14:19</b></span> And he blessed him, and said: 'Blessed be Abram of God Most High, Maker of heaven and earth; \n                                    <span class=\"VerseNumber\"><b>14:20</b></span> and blessed be God the Most High, who hath delivered thine enemies into thy hand.' And he gave him a tenth of all.",

    {
      "id": "gen-7",

      "cells": [
        {
          "label": "1A",
          "row": 0,
          "col": 0,
          "html": "<span class=\"VerseNumber\"><b>15:1</b></span> After these things the word of the LORD came unto Abram in a vision, saying: 'Fear not, Abram, I am thy shield, thy reward shall be exceeding great.' \n                                    <span class=\"VerseNumber\"><b>15:2</b></span> And Abram said: 'O Lord GOD, <span class=\"horizontal1\"><b>what wilt Thou give me</b></span>, seeing I go hence childless, and he that shall be possessor of my house is Eliezer of Damascus?' \n                                    <span class=\"VerseNumber\"><b>15:3</b></span> And Abram said: 'Behold, to me Thou hast given no seed, and, lo, one born in my house is to be mine heir.' \n                                    <span class=\"VerseNumber\"><b>15:4</b></span> And, behold, the word of the LORD came unto him, saying: 'This man shall not be thine heir; but he that shall come forth out of thine own bowels shall be thine heir.' \n                                    <span class=\"VerseNumber\"><b>15:5</b></span> <span class=\"horizontal1\"><b>And He brought him forth abroad, and said: 'Look now toward heaven, and count the stars, if thou be able to count them'; and He said unto him: 'So shall thy seed be</b></span>.' \n                                    <span class=\"VerseNumber\"><b>15:6</b></span> And he believed in the LORD; and He counted it to him for righteousness. \n                                    <span class=\"VerseNumber\"><b>15:7</b></span> And He said unto him: 'I am the LORD that brought thee out of Ur of the Chaldees, to give thee this land to inherit it.' \n                                    <span class=\"VerseNumber\"><b>15:8</b></span> And he said: 'O Lord GOD, whereby shall I know that I shall inherit it?' \n                                    <span class=\"VerseNumber\"><b>15:9</b></span> And He said unto him: 'Take Me a heifer of three years old, and a she-goat of three years old, and a ram of three years old, and a turtle-dove, and a young pigeon.' \n                                    <span class=\"VerseNumber\"><b>15:10</b></span> And he took him all these, and divided them in the midst, and laid each half over against the other; but the birds divided he not. \n                                    <span class=\"VerseNumber\"><b>15:11</b></span> And the birds of prey came down upon the carcasses, and Abram drove them away. \n                                    <span class=\"VerseNumber\"><b>15:12</b></span> And it came to pass, that, when the sun was going down, a deep sleep fell upon Abram; and, lo, a dread, even a great darkness, fell upon him. \n                                    <span class=\"VerseNumber\"><b>15:13</b></span> And He said unto Abram: 'Know of a surety that thy seed shall be a stranger in a land that is not theirs, and shall serve them; and <span class=\"horizontal1\"><b>they shall afflict them</b></span> four hundred years; \n                                    <span class=\"VerseNumber\"><b>15:14</b></span> and also that nation, whom they shall serve, will I judge; and <span class=\"horizontal1\"><b>afterward shall they come out</b></span> with great substance. \n                                    <span class=\"VerseNumber\"><b>15:15</b></span> But thou shalt go to thy fathers in peace; thou shalt be buried in a good old age. \n                                    <span class=\"VerseNumber\"><b>15:16</b></span> And in the fourth generation they shall come back hither; for the iniquity of the Amorite is not yet full.' \n                                    <span class=\"VerseNumber\"><b>15:17</b></span> And it came to pass, that, when the sun went down, and there was thick darkness, behold a smoking furnace, and a flaming torch that passed between these pieces. \n                                    <span class=\"VerseNumber\"><b>15:18</b></span> In that day the LORD made <span class=\"vertical1\"><b>a covenant</b></span> with Abram, saying: 'Unto thy seed have I given this land, from the river of Egypt unto the great river, the river Euphrates; \n                                    <span class=\"VerseNumber\"><b>15:19</b></span> the Kenite, and the Kenizzite, and the Kadmonite, \n                                    <span class=\"VerseNumber\"><b>15:20</b></span> and the Hittite, and the Perizzite, and the Rephaim, \n                                    <span class=\"VerseNumber\"><b>15:21</b></span> and the Amorite, and the Canaanite, and the Girgashite, and the Jebusite.' \n                                    <span class=\"HebrewParagraph\">{S}</span>",
          "text": "15:1 After these things the word of the LORD came unto Abram in a vision, saying: 'Fear not, Abram, I am thy shield, thy reward shall be exceeding great.' 15:2 And Abram said: 'O Lord GOD, what wilt Thou give me , seeing I go hence childless, and he that shall be possessor of my house is Eliezer of Damascus?' 15:3 And Abram said: 'Behold, to me Thou hast given no seed, and, lo, one born in my house is to be mine heir.' 15:4 And, behold, the word of the LORD came unto him, saying: 'This man shall not be thine heir; but he that shall come forth out of thine own bowels shall be thine heir.' 15:5 And He brought him forth abroad, and said: 'Look now toward heaven, and count the stars, if thou be able to count them'; and He said unto him: 'So shall thy seed be .' 15:6 And he believed in the LORD; and He counted it to him for righteousness. 15:7 And He said unto him: 'I am the LORD that brought thee out of Ur of the Chaldees, to give thee this land to inherit it.' 15:8 And he said: 'O Lord GOD, whereby shall I know that I shall inherit it?' 15:9 And He said unto him: 'Take Me a heifer of three years old, and a she-goat of three years old, and a ram of three years old, and a turtle-dove, and a young pigeon.' 15:10 And he took him all these, and divided them in the midst, and laid each half over against the other; but the birds divided he not. 15:11 And the birds of prey came down upon the carcasses, and Abram drove them away. 15:12 And it came to pass, that, when the sun was going down, a deep sleep fell upon Abram; and, lo, a dread, even a great darkness, fell upon him. 15:13 And He said unto Abram: 'Know of a surety that thy seed shall be a stranger in a land that is not theirs, and shall serve them; and they shall afflict them four hundred years; 15:14 and also that nation, whom they shall serve, will I judge; and afterward shall they come out with great substance. 15:15 But thou shalt go to thy fathers in peace; thou shalt be buried in a good old age. 15:16 And in the fourth generation they shall come back hither; for the iniquity of the Amorite is not yet full.' 15:17 And it came to pass, that, when the sun went down, and there was thick darkness, behold a smoking furnace, and a flaming torch that passed between these pieces. 15:18 In that day the LORD made a covenant with Abram, saying: 'Unto thy seed have I given this land, from the river of Egypt unto the great river, the river Euphrates; 15:19 the Kenite, and the Kenizzite, and the Kadmonite, 15:20 and the Hittite, and the Perizzite, and the Rephaim, 15:21 and the Amorite, and the Canaanite, and the Girgashite, and the Jebusite.' {S}",

          "html": "<span class=\"VerseNumber\"><b>16:1</b></span> Now Sarai Abram's wife bore him no children; and she had a handmaid, an Egyptian, whose name was Hagar. \n                                    <span class=\"VerseNumber\"><b>16:2</b></span> And Sarai said unto Abram: 'Behold now, the LORD hath restrained me from bearing; go in, I pray thee, unto my handmaid; it may be that I shall be builded up through her.' And Abram hearkened to the voice of Sarai. \n                                    <span class=\"VerseNumber\"><b>16:3</b></span> And Sarai Abram's wife took Hagar the Egyptian, her handmaid, after Abram had dwelt ten years in the land of Canaan, and <span class=\"horizontal1\"><b>gave her to Abram</b></span> her husband to be his wife. \n                                    <span class=\"VerseNumber\"><b>16:4</b></span> And he went in unto Hagar, and she conceived; and when she saw that she had conceived, her mistress was despised in her eyes. \n                                    <span class=\"VerseNumber\"><b>16:5</b></span> And Sarai said unto Abram: 'My wrong be upon thee: I gave my handmaid into thy bosom; and when she saw that she had conceived, I was despised in her eyes: the LORD judge between me and thee.' \n                                    <span class=\"VerseNumber\"><b>16:6</b></span> But Abram said unto Sarai: 'Behold, thy maid is in thy hand; do to her that which is good in thine eyes.' <span class=\"horizontal1\"><b>And Sarai dealt harshly with her, and she fled from her face</b></span>. \n                                    <span class=\"VerseNumber\"><b>16:7</b></span> And the angel of the LORD found her by a fountain of water in the wilderness, by the fountain in the way to Shur. \n                                    <span class=\"VerseNumber\"><b>16:8</b></span> And he said: 'Hagar, Sarai's handmaid, whence camest thou? and whither goest thou?' And she said: 'I flee from the face of my mistress Sarai.' \n                                    <span class=\"VerseNumber\"><b>16:9</b></span> And the angel of the LORD said unto her: 'Return to thy mistress, and submit thyself under her hands.' \n                                    <span class=\"VerseNumber\"><b>16:10</b></span> <span class=\"horizontal1\"><b>And the angel of the LORD said unto her: 'I will greatly multiply thy seed, that it shall not be numbered for multitude</b></span>. \n                                    <span class=\"VerseNumber\"><b>16:11</b></span> And the angel of the LORD said unto her: 'Behold, thou art with child, and shalt bear a son; and thou shalt call his name Ishmael, because the LORD hath heard thy affliction. \n                                    <span class=\"VerseNumber\"><b>16:12</b></span> And he shall be a wild ass of a man: his hand shall be against every man, and every man's hand against him; and he shall dwell in the face of all his brethren.' \n                                    <span class=\"VerseNumber\"><b>16:13</b></span> And she called the name of the LORD that spoke unto her, Thou art a God of seeing; for she said: 'Have I even here seen Him that seeth Me?' \n                                    <span class=\"VerseNumber\"><b>16:14</b></span> Wherefore the well was called 'Beer-lahai-roi; behold, it is between Kadesh and Bered. \n                                    <span class=\"VerseNumber\"><b>16:15</b></span> And Hagar bore Abram a son; and Abram called the name of his son, whom Hagar bore, Ishmael. \n                                    <span class=\"VerseNumber\"><b>16:16</b></span> <span class=\"vertical1\"><b>And Abram was fourscore and six years old, when Hagar bore Ishmael to Abram</b></span>. \n                                    <span class=\"HebrewParagraph\">{S}</span>",
          "text": "16:1 Now Sarai Abram's wife bore him no children; and she had a handmaid, an Egyptian, whose name was Hagar. 16:2 And Sarai said unto Abram: 'Behold now, the LORD hath restrained me from bearing; go in, I pray thee, unto my handmaid; it may be that I shall be builded up through her.' And Abram hearkened to the voice of Sarai. 16:3 And Sarai Abram's wife took Hagar the Egyptian, her handmaid, after Abram had dwelt ten years in the land of Canaan, and gave her to Abram her husband to be his wife. 16:4 And he went in unto Hagar, and she conceived; and when she saw that she had conceived, her mistress was despised in her eyes. 16:5 And Sarai said unto Abram: 'My wrong be upon thee: I gave my handmaid into thy bosom; and when she saw that she had conceived, I was despised in her eyes: the LORD judge between me and thee.' 16:6 But Abram said unto Sarai: 'Behold, thy maid is in thy hand; do to her that which is good in thine eyes.' And Sarai dealt harshly with her, and she fled from her face . 16:7 And the angel of the LORD found her by a fountain of water in the wilderness, by the fountain in the way to Shur. 16:8 And he said: 'Hagar, Sarai's handmaid, whence camest thou? and whither goest thou?' And she said: 'I flee from the face of my mistress Sarai.' 16:9 And the angel of the LORD said unto her: 'Return to thy mistress, and submit thyself under her hands.' 16:10 And the angel of the LORD said unto her: 'I will greatly multiply thy seed, that it shall not be numbered for multitude . 16:11 And the angel of the LORD said unto her: 'Behold, thou art with child, and shalt bear a son; and thou shalt call his name Ishmael, because the LORD hath heard thy affliction. 16:12 And he shall be a wild ass of a man: his hand shall be against every man, and every man's hand against him; and he shall dwell in the face of all his brethren.' 16:13 And she called the name of the LORD that spoke unto her, Thou art a God of seeing; for she said: 'Have I even here seen Him that seeth Me?' 16:14 Wherefore the well was called 'Beer-lahai-roi; behold, it is between Kadesh and Bered. 16:15 And Hagar bore Abram a son; and Abram called the name of his son, whom Hagar bore, Ishmael. 16:16 And Abram was fourscore and six years old, when Hagar bore Ishmael to Abram . {S}",

t up from Abraham.",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>18:20</b></span> <span class=\"ciasm2\"><b>And the LORD\n  said: 'Verily, the cry of Sodom and Gomorrah is great</b></span>, and,\n  verily, their sin is exceeding grievous. <span class=\"VerseNumber\"><b>18:21</b></span>\n  I will go down now, and see whether they have done altogether according to\n  the cry of it, which is come unto Me; and if not, I will know.' <span class=\"VerseNumber\"><b>18:22</b></span> And the men turned from thence, and\n  went toward Sodom; but Abraham stood yet before the LORD. <span class=\"VerseNumber\"><b>18:23</b></span> And Abraham drew near, and said: 'Wilt\n  Thou indeed sweep away the <span class=\"internalparallel\"><b>righteous</b></span>\n  with the wicked? <span class=\"VerseNumber\"><b>18:24</b></span> Peradventure\n  there are fifty righteous within the city; wilt Thou indeed sweep away and\n  not forgive the place for the fifty righteous that are therein? <span class=\"VerseNumber\"><b>18:25</b></span> That be far from Thee to do after this\n  manner, to slay the righteous with the wicked, that so the righteous should\n  be as the wicked; that be far from Thee; shall not the Judge of all the earth\n  do justly?' <span class=\"VerseNumber\"><b>18:26</b></span> And the LORD said:\n  'If I find in Sodom fifty righteous within the city, then I will forgive all\n  the place for their sake.' <span class=\"VerseNumber\"><b>18:27</b></span> And\n  Abraham answered and said: 'Behold now, I have taken upon me to speak unto\n  the LORD, who am but dust and ashes. <span class=\"VerseNumber\"><b>18:28</b></span>\n  Peradventure there shall lack five of the fifty righteous; wilt Thou destroy\n  all the city for lack of five?' And He said: 'I will not destroy it, if I\n  find there forty and five.' <span class=\"VerseNumber\"><b>18:29</b></span> And\n  he spoke unto Him yet again, and said: 'Peradventure there shall be forty\n  found there.' And He said: 'I will not do it for the forty's sake.' <span class=\"VerseNumber\"><b>18:30</b></span> And he said: 'Oh, let not the LORD be\n  angry, and I will speak. Peradventure there shall thirty be found there.' And\n  He said: 'I will not do it, if I find thirty there.' <span class=\"VerseNumber\"><b>18:31</b></span>\n  And he said: 'Behold now, I have taken upon me to speak unto the LORD.\n  Peradventure there shall be twenty found there.' And He said: 'I will not\n  destroy it for the twenty's sake.' <span class=\"VerseNumber\"><b>18:32</b></span>\n  And he said: 'Oh, let not the LORD be angry, and I will speak yet but this\n  once. Peradventure ten shall be found there.' And He said: 'I will not\n  destroy it for the ten's sake.' <span class=\"VerseNumber\"><b>18:33</b></span>\n  And the LORD went His way, as soon as He had left off speaking to Abraham;\n  and Abraham returned unto his place.",

          "label": "2A",
          "row": 3,
          "col": 0,
          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>19:4</b></span> But before they lay down, the men of the\n  city, even the men of Sodom, compassed the house round, both young and old,\n  all the people from every quarter. <span class=\"VerseNumber\"><b>19:5</b></span>\n  And they called unto Lot, and said unto him: 'Where are the men that came in\n  to thee this night? bring them out unto us, that we may know them.' <span class=\"VerseNumber\"><b>19:6</b></span> And Lot went out unto them <span class=\"vertical1\"><b>to the door</b></span>, and shut the door after him. <span class=\"VerseNumber\"><b>19:7</b></span> And he said: 'I pray you, my brethren,\n  do not so wickedly. <span class=\"VerseNumber\"><b>19:8</b></span> <span class=\"horizontal1\"><b>Behold now, I have two daughters that have not known\n  man; let me, I pray you, bring them out unto you, and do ye to them as is\n  good in your eyes</b></span>; only unto these men do nothing; forasmuch as\n  they are come under the shadow of my roof.' <span class=\"VerseNumber\"><b>19:9</b></span>\n  And they said: 'Stand back.' And they said: 'This one fellow came in to\n  sojourn, and he will needs play the judge; now will we deal worse with thee,\n  than with them.' And they pressed sore upon the man, even Lot, and drew near\n  to break the door. <span class=\"VerseNumber\"><b>19:10</b></span> But the men\n  put forth their hand, and brought Lot into the house to them, and the door\n  they shut. <span class=\"VerseNumber\"><b>19:11</b></span> And they smote the men\n  that were <span class=\"vertical1\"><b>at the door</b></span> of the house with\n  blindness, both small and great; so that they wearied themselves to find <span class=\"vertical1\"><b>the door</b></span>. <span class=\"VerseNumber\"><b>19:12</b></span>\n  And the men said unto Lot: 'Hast thou here any besides? son-in-law, and thy\n  sons, and thy daughters, and whomsoever thou hast in the city; bring them out\n  of the place; <span class=\"VerseNumber\"><b>19:13</b></span> <span class=\"ciasm2\"><b>for\n  we will destroy this place, because the cry of them is waxed great before the\n  LORD</b></span>; and the LORD hath sent us to destroy it.' <span class=\"VerseNumber\"><b>19:14</b></span> And Lot went out, and spoke unto his\n  sons-in-law, who married his daughters, and said: 'Up, get you out of this\n  place; for the LORD will destroy the city.' But he seemed unto his\n  sons-in-law <span class=\"vertical1\"><b>as one that jested</b></span>. <span class=\"VerseNumber\"><b>19:15</b></span> And when the morning arose, then the\n  angels hastened Lot, saying: 'Arise, take thy wife, and thy two daughters\n  that are here; lest thou be swept away in the iniquity of the city.' <span class=\"VerseNumber\"><b>19:16</b></span> But he lingered; and the men laid hold\n  upon his hand, and upon the hand of his wife, and upon the hand of his two\n  daughters; the LORD being merciful unto him. And they brought him forth, and\n  set him without the city. <span class=\"VerseNumber\"><b>19:17</b></span> And it\n  came to pass, when they had brought them forth abroad, that he said: 'Escape\n  for thy life; look not behind thee, neither stay thou in all the Plain;\n  escape to the mountain, lest thou be swept away.' <span class=\"VerseNumber\"><b>19:18</b></span>\n  And Lot said unto them: 'Oh, not so, my lord; <span class=\"VerseNumber\"><b>19:19</b></span>\n  behold now, thy servant hath found grace in thy sight, and thou hast\n  magnified thy mercy, which thou hast shown unto me in saving my life; and I\n  cannot escape to the mountain, lest the evil overtake me, and I die. <span class=\"VerseNumber\"><b>19:20</b></span> Behold now, this city is near to flee\n  unto, and it is a little one; oh, let me escape thither--is it not a little\n  one?--and my soul shall live.' <span class=\"VerseNumber\"><b>19:21</b></span>\n  And he said unto him: 'See, I have accepted thee concerning this thing also,\n  that I will not overthrow the city of which thou hast spoken. <span class=\"VerseNumber\"><b>19:22</b></span> Hasten thou, escape thither; for I\n  cannot do any thing till thou be come thither.'--Therefore the name of the\n  city was called Zoar.-- <span class=\"VerseNumber\"><b>19:23</b></span> The sun\n  was risen upon the earth when Lot came unto Zoar. <span class=\"VerseNumber\"><b>19:24</b></span>\n  Then the LORD caused to rain upon Sodom and upon Gomorrah brimstone and fire\n  from the LORD out of heaven; <span class=\"VerseNumber\"><b>19:25</b></span> and\n  He overthrow those cities, and all the Plain, and all the inhabitants of the\n  cities, and that which grew upon the ground. <span class=\"VerseNumber\"><b>19:26</b></span>\n  But his wife looked back from behind him, and she became a pillar of salt.",
          "text": "b 19:4 But before they lay down, the men of the\n  city, even the men of Sodom, compassed the house round, both young and old,\n  all the people from every quarter. 19:5 And they called unto Lot, and said unto him: 'Where are the men that came in\n  to thee this night? bring them out unto us, that we may know them.' 19:6 And Lot went out unto them to the door , and shut the door after him. 19:7 And he said: 'I pray you, my brethren,\n  do not so wickedly. 19:8 Behold now, I have two daughters that have not known\n  man; let me, I pray you, bring them out unto you, and do ye to them as is\n  good in your eyes ; only unto these men do nothing; forasmuch as\n  they are come under the shadow of my roof.' 19:9 And they said: 'Stand back.' And they said: 'This one fellow came in to\n  sojourn, and he will needs play the judge; now will we deal worse with thee,\n  than with them.' And they pressed sore upon the man, even Lot, and drew near\n  to break the door. 19:10 But the men\n  put forth their hand, and brought Lot into the house to them, and the door\n  they shut. 19:11 And they smote the men\n  that were at the door of the house with\n  blindness, both small and great; so that they wearied themselves to find the door . 19:12 And the men said unto Lot: 'Hast thou here any besides? son-in-law, and thy\n  sons, and thy daughters, and whomsoever thou hast in the city; bring them out\n  of the place; 19:13 for\n  we will destroy this place, because the cry of them is waxed great before the\n  LORD ; and the LORD hath sent us to destroy it.' 19:14 And Lot went out, and spoke unto his\n  sons-in-law, who married his daughters, and said: 'Up, get you out of this\n  place; for the LORD will destroy the city.' But he seemed unto his\n  sons-in-law as one that jested . 19:15 And when the morning arose, then the\n  angels hastened Lot, saying: 'Arise, take thy wife, and thy two daughters\n  that are here; lest thou be swept away in the iniquity of the city.' 19:16 But he lingered; and the men laid hold\n  upon his hand, and upon the hand of his wife, and upon the hand of his two\n  daughters; the LORD being merciful unto him. And they brought him forth, and\n  set him without the city. 19:17 And it\n  came to pass, when they had brought them forth abroad, that he said: 'Escape\n  for thy life; look not behind thee, neither stay thou in all the Plain;\n  escape to the mountain, lest thou be swept away.' 19:18 And Lot said unto them: 'Oh, not so, my lord; 19:19 behold now, thy servant hath found grace in thy sight, and thou hast\n  magnified thy mercy, which thou hast shown unto me in saving my life; and I\n  cannot escape to the mountain, lest the evil overtake me, and I die. 19:20 Behold now, this city is near to flee\n  unto, and it is a little one; oh, let me escape thither--is it not a little\n  one?--and my soul shall live.' 19:21 And he said unto him: 'See, I have accepted thee concerning this thing also,\n  that I will not overthrow the city of which thou hast spoken. 19:22 Hasten thou, escape thither; for I\n  cannot do any thing till thou be come thither.'--Therefore the name of the\n  city was called Zoar.-- 19:23 The sun\n  was risen upon the earth when Lot came unto Zoar. 19:24 Then the LORD caused to rain upon Sodom and upon Gomorrah brimstone and fire\n  from the LORD out of heaven; 19:25 and\n  He overthrow those cities, and all the Plain, and all the inhabitants of the\n  cities, and that which grew upon the ground. 19:26 But his wife looked back from behind him, and she became a pillar of salt.",

          "html": "<span class=\"CellSubdivision\"><b>b</b></span> <span class=\"VerseNumber\"><b>19:30</b></span> And Lot went up out of Zoar, and dwelt\n  in the mountain, <span class=\"horizontal1\"><b>and his two daughters with him</b></span>;\n  for he feared to dwell in Zoar; and he dwelt in a cave, he and his two\n  daughters. <span class=\"VerseNumber\"><b>19:31</b></span> <span class=\"horizontal1\"><b>And the first-born said unto the younger: 'Our father is\n  old, and there is not a man in the earth to come in unto us after the manner\n  of all the earth</b></span>. <span class=\"VerseNumber\"><b>19:32</b></span> Come,\n  let us make our father drink wine, and we will lie with him, that we may\n  preserve seed of our father.' <span class=\"VerseNumber\"><b>19:33</b></span> And\n  they made their father drink wine that night. And the first-born went in, and\n  lay with her father; and he knew not when she lay down, nor when she arose. <span class=\"VerseNumber\"><b>19:34</b></span> And it came to pass on the morrow, that\n  the first-born said unto the younger: 'Behold, I lay yesternight with my\n  father. Let us make him drink wine this night also; and go thou in, and lie\n  with him, that we may preserve seed of our father.' <span class=\"VerseNumber\"><b>19:35</b></span>\n  And they made their father drink wine that night also. And the younger arose,\n  and lay with him; and he knew not when she lay down, nor when she arose. <span class=\"VerseNumber\"><b>19:36</b></span> Thus were both the daughters of Lot\n  with child by their father. <span class=\"VerseNumber\"><b>19:37</b></span> <span class=\"ciasm1\"><b>And the first-born bore a son</b></span>, and called his name\n  Moab--the same is the father of the Moabites unto this day. <span class=\"VerseNumber\"><b>19:38</b></span> And the younger, she also bore a son,\n  and called his name Ben-ammi--the same is the father of the children of Ammon\n  unto this day. <span class=\"HebrewParagraph\"><span>{           "text": "b 19:30 And Lot went up out of Zoar, and dwelt\n  in the mountain, and his two daughters with him ;\n  for he feared to dwell in Zoar; and he dwelt in a cave, he and his two\n  daughters. 19:31 And the first-born said unto the younger: 'Our father is\n  old, and there is not a man in the earth to come in unto us after the manner\n  of all the earth . 19:32 Come,\n  let us make our father drink wine, and we will lie with him, that we may\n  preserve seed of our father.' 19:33 And\n  they made their father drink wine that night. And the first-born went in, and\n  lay with her father; and he knew not when she lay down, nor when she arose. 19:34 And it came to pass on the morrow, that\n  the first-born said unto the younger: 'Behold, I lay yesternight with my\n  father. Let us make him drink wine this night also; and go thou in, and lie\n  with him, that we may preserve seed of our father.' 19:35 And they made their father drink wine that night also. And the younger arose,\n  and lay with him; and he knew not when she lay down, nor when she arose. 19:36 Thus were both the daughters of Lot\n  with child by their father. 19:37 And the first-born bore a son , and called his name\n  Moab--the same is the father of the Moabites unto this day. 19:38 And the younger, she also bore a son,\n  and called his name Ben-ammi--the same is the father of the children of Ammon\n  unto this day. {S}",

      "cells": [

          "label": "1A",
          "row": 0,
          "col": 0,
          "html": "<span class=\"VerseNumber\"><b>20:1</b></span> And Abraham\n  journeyed from thence toward the land of the South, and dwelt between Kadesh\n  and Shur; and he sojourned in Gerar. <span class=\"VerseNumber\"><b>20:2</b></span>\n  And Abraham said of Sarah his wife: 'She is my sister.' And <span class=\"vertical1\"><b>Abimelech</b></span> king of Gerar sent, and took Sarah. <span class=\"VerseNumber\"><b>20:3</b></span> But God came to Abimelech in a dream of\n  the night, and said to him: 'Behold, thou shalt die, because of the woman\n  whom thou hast taken; for she is a man's wife.' <span class=\"VerseNumber\"><b>20:4</b></span>\n  Now Abimelech had not come near her; and he said: 'my Lord, wilt Thou slay\n  even a righteous nation? <span class=\"VerseNumber\"><b>20:5</b></span> Said he\n  not himself unto me: She is my sister? and she, even she herself said: He is\n  my brother. In the simplicity of my heart and the innocency of my hands have\n  I done this.' <span class=\"VerseNumber\"><b>20:6</b></span> And God said unto\n  him in the dream: 'Yea, I know that in the simplicity of thy heart thou hast\n  done this, and I also withheld thee from sinning against Me. Therefore\n  suffered I thee not to touch her. <span class=\"VerseNumber\"><b>20:7</b></span>\n  Now therefore restore the man's wife; for he is a prophet, and he shall pray\n  for thee, and thou shalt live; and if thou restore her not, know thou that\n  thou shalt surely die, thou, and all that are thine.' <span class=\"VerseNumber\"><b>20:8</b></span> And Abimelech rose early in the morning,\n  and called all his servants, and told all these things in their ears; and the\n  men were sore afraid. <span class=\"VerseNumber\"><b>20:9</b></span> Then\n  Abimelech called Abraham, and said unto him: 'What hast thou done unto us?\n  and wherein have I sinned against thee, that thou hast brought on me and on\n  my kingdom a great sin? thou hast done deeds unto me that ought not to be\n  done.' <span class=\"VerseNumber\"><b>20:10</b></span> And Abimelech said unto\n  Abraham: 'What sawest thou, that thou hast done this thing?' <span class=\"VerseNumber\"><b>20:11</b></span> And Abraham said: 'Because I thought:\n  Surely <span class=\"ciasm1\"><b>the fear of God is not in this place</b></span>;\n  and they will slay me for my wife's sake. <span class=\"VerseNumber\"><b>20:12</b></span>\n  And moreover she is indeed my sister, the daughter of my father, but not the\n  daughter of my mother; and so she became my wife. <span class=\"VerseNumber\"><b>20:13</b></span>\n  And it came to pass, when God <span class=\"horizontal1\"><b>caused me to wander\n  from my father's house</b></span>, that I said unto her: This is thy kindness\n  which thou shalt show unto me; at every place whither we shall come, say of\n  me: He is my brother.' <span class=\"VerseNumber\"><b>20:14</b></span> And\n  Abimelech took sheep and oxen, and men-servants and women-servants, and gave\n  them unto Abraham, and restored him Sarah his wife. <span class=\"VerseNumber\"><b>20:15</b></span>\n  And Abimelech said: 'Behold, my land is before thee: dwell where it pleaseth\n  thee.' <span class=\"VerseNumber\"><b>20:16</b></span> And unto Sarah he said:\n  'Behold, I have given thy brother a thousand pieces of silver; behold, it is\n  for thee a covering of the eyes to all that are with thee; and before all men\n  thou art righted.' <span class=\"VerseNumber\"><b>20:17</b></span> And Abraham\n  prayed unto God; and God healed Abimelech, and his wife, <span class=\"horizontal1\"><b>and his maid-servants; and they bore children</b></span>.\n  <span class=\"VerseNumber\"><b>20:18</b></span> For the LORD had fast closed up\n  all the wombs of the house of Abimelech, because of Sarah Abraham's wife. <span class=\"HebrewParagraph\">{S}</span>",
          "text": "20:1 And Abraham\n  journeyed from thence toward the land of the South, and dwelt between Kadesh\n  and Shur; and he sojourned in Gerar. 20:2 And Abraham said of Sarah his wife: 'She is my sister.' And Abimelech king of Gerar sent, and took Sarah. 20:3 But God came to Abimelech in a dream of\n  the night, and said to him: 'Behold, thou shalt die, because of the woman\n  whom thou hast taken; for she is a man's wife.' 20:4 Now Abimelech had not come near her; and he said: 'my Lord, wilt Thou slay\n  even a righteous nation? 20:5 Said he\n  not himself unto me: She is my sister? and she, even she herself said: He is\n  my brother. In the simplicity of my heart and the innocency of my hands have\n  I done this.' 20:6 And God said unto\n  him in the dream: 'Yea, I know that in the simplicity of thy heart thou hast\n  done this, and I also withheld thee from sinning against Me. Therefore\n  suffered I thee not to touch her. 20:7 Now therefore restore the man's wife; for he is a prophet, and he shall pray\n  for thee, and thou shalt live; and if thou restore her not, know thou that\n  thou shalt surely die, thou, and all that are thine.' 20:8 And Abimelech rose early in the morning,\n  and called all his servants, and told all these things in their ears; and the\n  men were sore afraid. 20:9 Then\n  Abimelech called Abraham, and said unto him: 'What hast thou done unto us?\n  and wherein have I sinned against thee, that thou hast brought on me and on\n  my kingdom a great sin? thou hast done deeds unto me that ought not to be\n  done.' 20:10 And Abimelech said unto\n  Abraham: 'What sawest thou, that thou hast done this thing?' 20:11 And Abraham said: 'Because I thought:\n  Surely the fear of God is not in this place ;\n  and they will slay me for my wife's sake. 20:12 And moreover she is indeed my sister, the daughter of my father, but not the\n  daughter of my mother; and so she became my wife. 20:13 And it came to pass, when God caused me to wander\n  from my father's house , that I said unto her: This is thy kindness\n  which thou shalt show unto me; at every place whither we shall come, say of\n  me: He is my brother.' 20:14 And\n  Abimelech took sheep and oxen, and men-servants and women-servants, and gave\n  them unto Abraham, and restored him Sarah his wife. 20:15 And Abimelech said: 'Behold, my land is before thee: dwell where it pleaseth\n  thee.' 20:16 And unto Sarah he said:\n  'Behold, I have given thy brother a thousand pieces of silver; behold, it is\n  for thee a covering of the eyes to all that are with thee; and before all men\n  thou art righted.' 20:17 And Abraham\n  prayed unto God; and God healed Abimelech, and his wife, and his maid-servants; and they bore children . 20:18 For the LORD had fast closed up\n  all the wombs of the house of Abimelech, because of Sarah Abraham's wife. {S}",

          "html": "<span class=\"VerseNumber\"><b>21:1</b></span> And the LORD\n  remembered Sarah as He had said, and the LORD did unto Sarah as He had\n  spoken. <span class=\"VerseNumber\"><b>21:2</b></span> And Sarah conceived, and\n  bore Abraham a son in his old age, at the set time of which God had spoken to\n  him. <span class=\"VerseNumber\"><b>21:3</b></span> And Abraham called the name\n  of his son that was born unto him, whom Sarah bore to him, Isaac. <span class=\"VerseNumber\"><b>21:4</b></span> And Abraham circumcised his son Isaac\n  when he was eight days old, as God had commanded him. <span class=\"VerseNumber\"><b>21:5</b></span> And Abraham was a hundred years old,\n  when his son Isaac was born unto him. <span class=\"VerseNumber\"><b>21:6</b></span>\n  And Sarah said: 'God hath made laughter for me; every one that heareth will\n  laugh on account of me.' <span class=\"VerseNumber\"><b>21:7</b></span> And she\n  said: 'Who would have said unto Abraham, that Sarah should give children\n  suck? for I have borne him a son in his old age.' <span class=\"VerseNumber\"><b>21:8</b></span>\n  And the child grew, and was weaned. And Abraham made a great feast on the day\n  that Isaac was weaned. <span class=\"VerseNumber\"><b>21:9</b></span> And Sarah\n  saw the son of Hagar the Egyptian, whom she had borne unto Abraham, making\n  sport. <span class=\"VerseNumber\"><b>21:10</b></span> Wherefore she said unto\n  Abraham: <span class=\"horizontal1\"><b>'Cast out this bondwoman and her son</b></span>;\n  for the son of this bondwoman shall not be heir with my son, even with\n  Isaac.' <span class=\"VerseNumber\"><b>21:11</b></span> And the thing was very\n  grievous in Abraham's sight on account of his son. <span class=\"VerseNumber\"><b>21:12</b></span>\n  And God said unto Abraham: 'Let it not be grievous in thy sight because of\n  the lad, and because of thy bondwoman; in all that Sarah saith unto thee,\n  hearken unto her voice; for in Isaac shall seed be called to thee. <span class=\"VerseNumber\"><b>21:13</b></span> And also of the son of the bondwoman\n  will I make a nation, because he is thy seed.' <span class=\"VerseNumber\"><b>21:14</b></span>\n<span class=\"vertical1\"><b>And Abraham arose up early in the morning</b></span>,\n  and took bread and a bottle of water, and gave it unto Hagar, putting it on\n  her shoulder, <span class=\"horizontal1\"><b>and the child, and sent her away;\n  and she departed, and strayed</b></span> in the wilderness of Beer-sheba. <span class=\"VerseNumber\"><b>21:15</b></span> And the water in the bottle was spent,\n  and she cast the child under one of the shrubs. <span class=\"VerseNumber\"><b>21:16</b></span>\n  And she went, and sat her down over against him a good way off, as it were a\n  bow-shot; for she said: 'Let me not look upon the death of the child.' And\n  she sat over against him, and lifted up her voice, and wept. <span class=\"VerseNumber\"><b>21:17</b></span> And God heard the voice of the lad; <span class=\"vertical1\"><b>and the angel of God called to Hagar out of heaven</b></span>,\n  and said unto her: 'What aileth thee, Hagar? fear not; for God hath heard the\n  voice of the lad where he is. <span class=\"VerseNumber\"><b>21:18</b></span>\n  Arise, lift up the lad, and hold him fast by thy hand; for I will make him a\n  great nation.' <span class=\"VerseNumber\"><b>21:19</b></span> And God opened her\n  eyes, and she saw a <span class=\"ciasm2\"><b>well of water</b></span>; and she\n  went, and filled the bottle with water, and gave the lad drink. <span class=\"VerseNumber\"><b>21:20</b></span> And God was with the lad, and he grew;\n  and he dwelt in the wilderness, and became an archer. <span class=\"VerseNumber\"><b>21:21</b></span> And he dwelt in the wilderness of\n  Paran; and his mother took him a wife out of the land of Egypt. <span class=\"HebrewParagraph\">{P}</span>",
          "text": "21:1 And the LORD\n  remembered Sarah as He had said, and the LORD did unto Sarah as He had\n  spoken. 21:2 And Sarah conceived, and\n  bore Abraham a son in his old age, at the set time of which God had spoken to\n  him. 21:3 And Abraham called the name\n  of his son that was born unto him, whom Sarah bore to him, Isaac. 21:4 And Abraham circumcised his son Isaac\n  when he was eight days old, as God had commanded him. 21:5 And Abraham was a hundred years old,\n  when his son Isaac was born unto him. 21:6 And Sarah said: 'God hath made laughter for me; every one that heareth will\n  laugh on account of me.' 21:7 And she\n  said: 'Who would have said unto Abraham, that Sarah should give children\n  suck? for I have borne him a son in his old age.' 21:8 And the child grew, and was weaned. And Abraham made a great feast on the day\n  that Isaac was weaned. 21:9 And Sarah\n  saw the son of Hagar the Egyptian, whom she had borne unto Abraham, making\n  sport. 21:10 Wherefore she said unto\n  Abraham: 'Cast out this bondwoman and her son ;\n  for the son of this bondwoman shall not be heir with my son, even with\n  Isaac.' 21:11 And the thing was very\n  grievous in Abraham's sight on account of his son. 21:12 And God said unto Abraham: 'Let it not be grievous in thy sight because of\n  the lad, and because of thy bondwoman; in all that Sarah saith unto thee,\n  hearken unto her voice; for in Isaac shall seed be called to thee. 21:13 And also of the son of the bondwoman\n  will I make a nation, because he is thy seed.' 21:14 And Abraham arose up early in the morning ,\n  and took bread and a bottle of water, and gave it unto Hagar, putting it on\n  her shoulder, and the child, and sent her away;\n  and she departed, and strayed in the wilderness of Beer-sheba. 21:15 And the water in the bottle was spent,\n  and she cast the child under one of the shrubs. 21:16 And she went, and sat her down over against him a good way off, as it were a\n  bow-shot; for she said: 'Let me not look upon the death of the child.' And\n  she sat over against him, and lifted up her voice, and wept. 21:17 And God heard the voice of the lad; and the angel of God called to Hagar out of heaven ,\n  and said unto her: 'What aileth thee, Hagar? fear not; for God hath heard the\n  voice of the lad where he is. 21:18 Arise, lift up the lad, and hold him fast by thy hand; for I will make him a\n  great nation.' 21:19 And God opened her\n  eyes, and she saw a well of water ; and she\n  went, and filled the bottle with water, and gave the lad drink. 21:20 And God was with the lad, and he grew;\n  and he dwelt in the wilderness, and became an archer. 21:21 And he dwelt in the wilderness of\n  Paran; and his mother took him a wife out of the land of Egypt. {P}",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>22:1</b></span> And it came to pass after these things,\n  that God did prove Abraham, and said unto him: 'Abraham'; and he said: 'Here\n  am I.' <span class=\"VerseNumber\"><b>22:2</b></span> And He said: 'Take now thy\n  son, thine only son, whom thou lovest, even Isaac, and get thee into the land\n  of Moriah; and offer him there for a burnt-offering upon one of the mountains\n  which I will tell thee of.' <span class=\"VerseNumber\"><b>22:3</b></span> <span class=\"vertical1\"><b>And Abraham rose early in the morning</b></span>, and\n  saddled his ass, and took two of his young men with him, and Isaac his son;\n  and he cleaved the wood for the burnt-offering, and rose up, and went unto\n  the place of which God had told him. <span class=\"VerseNumber\"><b>22:4</b></span>\n  On the third day Abraham lifted up his eyes, and saw the place afar off. <span class=\"VerseNumber\"><b>22:5</b></span> And Abraham said unto his young men:\n  'Abide ye here with the ass, and I and the lad will go yonder; and we will\n  worship, and come back to you.' <span class=\"VerseNumber\"><b>22:6</b></span>\n  And Abraham took the wood of the burnt-offering, and laid it upon Isaac his\n  son; and he took in his hand the fire and the knife; and they went both of\n  them together. <span class=\"VerseNumber\"><b>22:7</b></span> And Isaac spoke\n  unto Abraham his father, and said: 'My father.' And he said: 'Here am I, my\n  son.' And he said: 'Behold the fire and the wood; but where is the lamb for a\n  burnt-offering?' <span class=\"VerseNumber\"><b>22:8</b></span> And Abraham said:\n  'God will provide Himself the lamb for a burnt-offering, my son.' So they\n  went both of them together. <span class=\"VerseNumber\"><b>22:9</b></span> And\n  they came to the place which God had told him of; and Abraham built the altar\n  there, and laid the wood in order, and bound Isaac his son, and laid           "text": "a 22:1 And it came to pass after these things,\n  that God did prove Abraham, and said unto him: 'Abraham'; and he said: 'Here\n  am I.' 22:2 And He said: 'Take now thy\n  son, thine only son, whom thou lovest, even Isaac, and get thee into the land\n  of Moriah; and offer him there for a burnt-offering upon one of the mountains\n  which I will tell thee of.' 22:3 And Abraham rose early in the morning , and\n  saddled his ass, and took two of his young men with him, and Isaac his son;\n  and he cleaved the wood for the burnt-offering, and rose up, and went unto\n  the place of which God had told him. 22:4 On the third day Abraham lifted up his eyes, and saw the place afar off. 22:5 And Abraham said unto his young men:\n  'Abide ye here with the ass, and I and the lad will go yonder; and we will\n  worship, and come back to you.' 22:6 And Abraham took the wood of the burnt-offering, and laid it upon Isaac his\n  son; and he took in his hand the fire and the knife; and they went both of\n  them together. 22:7 And Isaac spoke\n  unto Abraham his father, and said: 'My father.' And he said: 'Here am I, my\n  son.' And he said: 'Behold the fire and the wood; but where is the lamb for a\n  burnt-offering?' 22:8 And Abraham said:\n  'God will provide Himself the lamb for a burnt-offering, my son.' So they\n  went both of them together. 22:9 And\n  they came to the place which God had told him of; and Abraham built the altar\n  there, and laid the wood in order, and bound Isaac his son, and laid him on\n  the altar, upon the wood. 22:10 And\n  Abraham stretched forth his hand, and took the knife to slay his son.",

          "row": 0,
          "col": 1,
          "html": "<span class=\"VerseNumber\"><b>23:1</b></span> <span class=\"closure\"><b>And the life of Sarah was a hundred and seven and twenty\n  years; these were the years of the life of Sarah</b></span>. <span class=\"VerseNumber\"><b>23:2</b></span> And Sarah died in Kiriatharba--the same\n  is Hebron--in the land of Canaan; and Abraham came to mourn for Sarah, and to\n  weep for her. <span class=\"VerseNumber\"><b>23:3</b></span> And Abraham rose up\n  from before his dead, and spoke unto the children of Heth, saying: <span class=\"VerseNumber\"><b>23:4</b></span> 'I am a stranger and a sojourner with\n  you: give me a possession of a burying-place with you, that I may bury my\n  dead out of my sight.' <span class=\"VerseNumber\"><b>23:5</b></span> And the\n  children of Heth answered Abraham, saying unto him: <span class=\"VerseNumber\"><b>23:6</b></span>\n  'Hear us, my lord: thou art a mighty prince among us; in the choice of our\n  sepulchres bury thy dead; none of us shall withhold from thee his sepulchre,\n  but that thou mayest bury thy dead.' <span class=\"VerseNumber\"><b>23:7</b></span>\n  And Abraham rose up, and bowed down to the people of the land, even to the\n  children of Heth. <span class=\"VerseNumber\"><b>23:8</b></span> And he spoke\n  with them, saying: 'If it be your mind that I should bury my dead out of my\n  sight, hear me, and entreat for me to Ephron the son of Zohar, <span class=\"VerseNumber\"><b>23:9</b></span> that he may give me the cave of\n  Machpelah, which he hath, which is in the end of his field; for the full\n  price let him give it to me in the midst of you for a possession of a\n  burying-place.' <span class=\"VerseNumber\"><b>23:10</b></span> Now Ephron was\n  sitting in the midst of the children of Heth; and Ephron the Hittite answered\n  Abraham in the hearing of the children of Heth, even of all that went in at\n  the gate of his city, saying: <span class=\"VerseNumber\"><b>23:11</b></span>\n  'Nay, my lord, hear me: the field give I thee, and the cave that is therein,\n  I give it thee; in the presence of the sons of my people give I it thee; bury\n  thy dead.' <span class=\"VerseNumber\"><b>23:12</b></span> And Abraham bowed down\n  before the people of the land. <span class=\"VerseNumber\"><b>23:13</b></span>\n  And he spoke unto Ephron in the hearing of the people of the land, saying:\n  'But if thou wilt, I pray thee, hear me: I will give the price of the field;\n  take it of me, and I will bury my dead there.' <span class=\"VerseNumber\"><b>23:14</b></span>\n  And Ephron answered Abraham, saying unto him: <span class=\"VerseNumber\"><b>23:15</b></span>\n  'My lord, hearken unto me: a piece of land worth four hundred shekels of\n  silver, what is that betwixt me and thee? bury therefore thy dead.' <span class=\"VerseNumber\"><b>23:16</b></span> And Abraham hearkened unto Ephron; and\n  Abraham weighed to Ephron the silver, which he had named in the hearing of\n  the children of Heth, four hundred shekels of silver, current money with the\n  merchant. <span class=\"VerseNumber\"><b>23:17</b></span> So the field of Ephron,\n  which was in Machpelah, which was before Mamre, the field, and the cave which\n  was therein, and all the trees that were in the field, that were in all the\n  border thereof round about, were made sure <span class=\"VerseNumber\"><b>23:18</b></span>\n  unto Abraham for a possession in the presence of the children of Heth, before\n  all that went in at the gate of his city. <span class=\"VerseNumber\"><b>23:19</b></span>\n  And after this, Abraham buried Sarah his wife in the cave of the field of\n  Machpelah before Mamre--the same is Hebron--in the land of Canaan. <span class=\"VerseNumber\"><b>23:20</b></span> And the field, and the cave that is\n  therein, were made sure unto Abraham for a possession of a burying-place by\n  the children of Heth. <span class=\"HebrewParagraph\"><span>{S}</span></span>",
          "text": "23:1 And the life of Sarah was a hundred and seven and twenty\n  years; these were the years of the life of Sarah . 23:2 And Sarah died in Kiriatharba--the same\n  is Hebron--in the land of Canaan; and Abraham came to mourn for Sarah, and to\n  weep for her. 23:3 And Abraham rose up\n  from before his dead, and spoke unto the children of Heth, saying: 23:4 'I am a stranger and a sojourner with\n  you: give me a possession of a burying-place with you, that I may bury my\n  dead out of my sight.' 23:5 And the\n  children of Heth answered Abraham, saying unto him: 23:6 'Hear us, my lord: thou art a mighty prince among us; in the choice of our\n  sepulchres bury thy dead; none of us shall withhold from thee his sepulchre,\n  but that thou mayest bury thy dead.' 23:7 And Abraham rose up, and bowed down to the people of the land, even to the\n  children of Heth. 23:8 And he spoke\n  with them, saying: 'If it be your mind that I should bury my dead out of my\n  sight, hear me, and entreat for me to Ephron the son of Zohar, 23:9 that he may give me the cave of\n  Machpelah, which he hath, which is in the end of his field; for the full\n  price let him give it to me in the midst of you for a possession of a\n  burying-place.' 23:10 Now Ephron was\n  sitting in the midst of the children of Heth; and Ephron the Hittite answered\n  Abraham in the hearing of the children of Heth, even of all that went in at\n  the gate of his city, saying: 23:11 'Nay, my lord, hear me: the field give I thee, and the cave that is therein,\n  I give it thee; in the presence of the sons of my people give I it thee; bury\n  thy dead.' 23:12 And Abraham bowed down\n  before the people of the land. 23:13 And he spoke unto Ephron in the hearing of the people of the land, saying:\n  'But if thou wilt, I pray thee, hear me: I will give the price of the field;\n  take it of me, and I will bury my dead there.' 23:14 And Ephron answered Abraham, saying unto him: 23:15 'My lord, hearken unto me: a piece of land worth four hundred shekels of\n  silver, what is that betwixt me and thee? bury therefore thy dead.' 23:16 And Abraham hearkened unto Ephron; and\n  Abraham weighed to Ephron the silver, which he had named in the hearing of\n  the children of Heth, four hundred shekels of silver, current money with the\n  merchant. 23:17 So the field of Ephron,\n  which was in Machpelah, which was before Mamre, the field, and the cave which\n  was therein, and all the trees that were in the field, that were in all the\n  border thereof round about, were made sure 23:18 unto Abraham for a possession in the presence of the children of Heth, before\n  all that went in at the gate of his city. 23:19 And after this, Abraham buried Sarah his wife in the cave of the field of\n  Machpelah before Mamre--the same is Hebron--in the land of Canaan. 23:20 And the field, and the cave that is\n  therein, were made sure unto Abraham for a possession of a burying-place by\n  the children of Heth. {S}",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>24:1</b></span> And\n  Abraham was old, well stricken in age; <span class=\"internalparallel\"><b>and\n  the LORD had blessed Abraham in all things</b></span>. <span class=\"VerseNumber\"><b>24:2</b></span> <span class=\"horizontal1\"><b>And Abraham\n  said unto his servant</b></span>, the elder of his house, that ruled over all\n  that he had: 'Put, I pray thee, thy hand under my thigh. <span class=\"VerseNumber\"><b>24:3</b></span> <span class=\"horizontal1\"><b>And I will\n  make thee swear by the LORD, the God of heaven and the God of the earth, that\n  thou shalt not take a wife for my son of the daughters of the Canaanites,\n  among whom I dwell</b></span>. <span class=\"VerseNumber\"><b>24:4</b></span> <span class=\"horizontal1\"><b>But thou shalt go unto my country, and to my kindred,\n  and take a wife for my son, even for Isaac</b></span>.' <span class=\"VerseNumber\"><b>24:5</b></span> <span class=\"horizontal1\"><b>And the\n  servant said unto him: 'Peradventure the woman will not be willing to follow\n  me unto this land; must I needs bring thy son back unto the land from whence\n  thou camest</b></span>?' <span class=\"VerseNumber\"><b>24:6</b></span> And\n  Abraham said unto him: 'Beware thou that thou bring not my son back thither. <span class=\"VerseNumber\"><b>24:7</b></span> <span class=\"horizontal1\"><b>The LORD, the\n  God of heaven, who took me from my father's house, and from the land of my\n  nativity, and who spoke unto me, and who swore unto me, saying: Unto thy seed\n  will I give this land; He will send His angel before thee, and thou shalt\n  take a wife for my son from thence</b></span>. <span class=\"VerseNumber\"><b>24:8</b></span>\n<span class=\"horizontal1\"><b>And if the woman be not willing to follow thee,\n  then thou shalt be clear from this my oath; only thou shalt not bring my son\n  back thither</b></span>.' <span class=\"VerseNumber\"><b>24:9</b></span> And the\n  servant put his hand under the thigh of Abraham his master, and swore to him\n  concerning this matter.",
          "text": "a 24:1 And\n  Abraham was old, well stricken in age; and\n  the LORD had blessed Abraham in all things . 24:2 And Abraham\n  said unto his servant , the elder of his house, that ruled over all\n  that he had: 'Put, I pray thee, thy hand under my thigh. 24:3 And I will\n  make thee swear by the LORD, the God of heaven and the God of the earth, that\n  thou shalt not take a wife for my son of the daughters of the Canaanites,\n  among whom I dwell . 24:4 But thou shalt go unto my country, and to my kindred,\n  and take a wife for my son, even for Isaac .' 24:5 And the\n  servant said unto him: 'Peradventure the woman will not be willing to follow\n  me unto this land; must I needs bring thy son back unto the land from whence\n  thou camest ?' 24:6 And\n  Abraham said unto him: 'Beware thou that thou bring not my son back thither. 24:7 The LORD, the\n  God of heaven, who took me from my father's house, and from the land of my\n  nativity, and who spoke unto me, and who swore unto me, saying: Unto thy seed\n  will I give this land; He will send His angel before thee, and thou shalt\n  take a wife for my son from thence . 24:8 And if the woman be not willing to follow thee,\n  then thou shalt be clear from this my oath; only thou shalt not bring my son\n  back thither .' 24:9 And the\n  servant put his hand under the thigh of Abraham his master, and swore to him\n  concerning this matter.",

          "html": "<span class=\"CellSubdivision\"><b>a</b></span> <span class=\"VerseNumber\"><b>24:28</b></span> And the\n  damsel ran, and told her mother's house according to these words. <span class=\"VerseNumber\"><b>24:29</b></span> And Rebekah had a brother, and his name\n  was Laban; and Laban ran out unto the man, unto the fountain. <span class=\"VerseNumber\"><b>24:30</b></span> And it came to pass, when he saw the\n  ring, and the bracelets upon his sister's hands, and when he heard the words\n  of Rebekah his sister, saying: 'Thus spoke the man unto me,' that he came\n  unto the man; and, behold, he stood by the camels at the fountain. <span class=\"VerseNumber\"><b>24:31</b></span> And he said: 'Come in, thou blessed of\n  the LORD; wherefore standest thou without? for I have cleared the house, and\n  made room for the camels.' <span class=\"VerseNumber\"><b>24:32</b></span> And\n  the man came into the house, and he ungirded the camels; and he gave straw\n  and provender for the camels, and water to wash his feet and the feet of the\n  men that were with him. <span class=\"VerseNumber\"><b>24:33</b></span> And there\n  was set food before him to eat; but he said: 'I will not eat, until I have\n  told mine errand.' And he said: 'Speak on.' <span class=\"VerseNumber\"><b>24:34</b></span>\n<span class=\"horizontal1\"><b>And he said: 'I am Abraham's servant</b></span>. <span class=\"VerseNumber\"><b>24:35</b></span> And the LORD hath blessed my master\n  greatly; and he is become great; and He hath given him flocks and herds, and\n  silver and gold, and men-servants and maid-servants, and camels and asses. <span class=\"VerseNumber\"><b>24:36</b></span> And Sarah my master's wife bore a son\n  to my master when she was old; and unto him hath he given all that he hath. <span class=\"VerseNumber\"><b>24:37</b></span> <span class=\"horizontal1\"><b>And my\n  master made me swear, saying: Thou shalt not take a wife for my son of the\n  daughters of the Canaanites, in whose land I dwell</b></span>. <span class=\"VerseNumber\"><b>24:38</b></span> <span class=\"horizontal1\"><b>But thou\n  shalt go unto my father's house, and to my kindred, and take a wife for my\n  son</b></span>. <span class=\"VerseNumber\"><b>24:39</b></span> <span class=\"horizontal1\"><b>And I said unto my master: Peradventure the woman will\n  not follow me</b></span>. <span class=\"VerseNumber\"><b>24:40</b></span> <span class=\"horizontal1\"><b>And he said unto me: The LORD, before whom I walk, will\n  send His angel with thee, and prosper thy way; and thou shalt take a wife for\n  my son of my kindred, and of my father's house;</b></span> <span class=\"VerseNumber\"><b>24:41</b></span> <span class=\"horizontal1\"><b>then shalt\n  thou be clear from my oath, when thou comest to my kindred; and if they give\n  her not to thee, thou shalt be clear from my oath</b></span>.",
          "text": "a 24:28 And the\n  damsel ran, and told her mother's house according to these words. 24:29 And Rebekah had a brother, and his name\n  was Laban; and Laban ran out unto the man, unto the fountain. 24:30 And it came to pass, when he saw the\n  ring, and the bracelets upon his sister's hands, and when he heard the words\n  of Rebekah his sister, saying: 'Thus spoke the man unto me,' that he came\n  unto the man; and, behold, he stood by the camels at the fountain. 24:31 And he said: 'Come in, thou blessed of\n  the LORD; wherefore standest thou without? for I have cleared the house, and\n  made room for the camels.' 24:32 And\n  the man came into the house, and he ungirded the camels; and he gave straw\n  and provender for the camels, and water to wash his feet and the feet of the\n  men that were with him. 24:33 And there\n  was set food before him to eat; but he said: 'I will not eat, until I have\n  told mine errand.' And he said: 'Speak on.' 24:34 And he said: 'I am Abraham's servant . 24:35 And the LORD hath blessed my master\n  greatly; and he is become great; and He hath given him flocks and herds, and\n  silver and gold, and men-servants and maid-servants, and camels and asses. 24:36 And Sarah my master's wife bore a son\n  to my master when she was old; and unto him hath he given all that he hath. 24:37 And my\n  master made me swear, saying: Thou shalt not take a wife for my son of the\n  daughters of the Canaanites, in whose land I dwell . 24:38 But thou\n  shalt go unto my father's house, and to my kindred, and take a wife for my\n  son . 24:39 And I said unto my master: Peradventure the woman will\n  not follow me . 24:40 And he said unto me: The LORD, before whom I walk, will\n  send His angel with thee, and prosper thy way; and thou shalt take a wife for\n  my son of my kindred, and of my father's house; 24:41 then shalt\n  thou be clear from my oath, when thou comest to my kindred; and if they give\n  her not to thee, thou shalt be clear from my oath .",

        {
