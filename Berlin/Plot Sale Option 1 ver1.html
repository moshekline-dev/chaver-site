<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
<title>Untitled 1</title>
</head>

<body>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlin Builder's Pro-Forma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #373B44 0%, #4286f4 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; font-weight: 300; }
        
        .main-content { display: grid; grid-template-columns: 400px 1fr; min-height: 600px; }
        .controls-panel { background: #f8f9fa; padding: 30px; border-right: 1px solid #e0e0e0; overflow-y: auto; }
        .results-panel { padding: 30px; overflow-y: auto; }
        .control-group { margin-bottom: 25px; }
        .control-group h3 { color: #373B44; margin-bottom: 15px; font-size: 1.2em; border-bottom: 2px solid #373B44; padding-bottom: 5px; }
        .slider-container, .fixed-value-container { margin-bottom: 20px; }
        .slider-container label, .fixed-value-container label { display: block; margin-bottom: 5px; font-weight: 500; color: #333; }
        .slider-container input[type=range] { width: 100%; cursor: pointer; }
        .slider-value, .fixed-value { font-size: 1em; color: #666; text-align: right; font-weight: bold; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        .metric-card { background: #ffffff; color: #333; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .metric-value { font-size: 2.2em; font-weight: bold; margin-bottom: 5px; color: #4286f4; }
        .metric-label { font-size: 1em; opacity: 0.9; }
        .profit { color: #27ae60; }
        .loss { color: #e74c3c; }

        .pro-forma-table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .pro-forma-table h3 { background: #373B44; color: white; padding: 20px; margin: 0; font-size: 1.2em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #e0e0e0; font-size: 1.1em; }
        td:first-child, th:first-child { text-align: left; font-weight: 600; }
        .total-row { background-color: #f8f9fa; font-weight: bold; }
        .profit-row { background-color: #e8f5e9; font-weight: bold; }
        .loss-row { background-color: #ffebee; font-weight: bold; }

        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Builder's Pro-Forma</h1>
            <p>Schlesische Straße 21, Kreuzberg</p>
        </div>

        <div class="main-content">
            <div class="controls-panel">
                <div class="control-group">
                    <h3>Core Inputs</h3>
                    <div class="fixed-value-container" style="background: #f0f0f0; padding: 10px; border-radius: 8px;">
                        <label>Land Price (Fixed)</label>
                        <div class="fixed-value">€1,500,000</div>
                    </div>
                    <div class="slider-container">
                        <label>Hard Construction Cost (€/m²)</label>
                        <input type="range" id="hardCost" min="2500" max="4500" step="50" value="3200">
                        <div class="slider-value" id="hardCostValue">€3,200 / m²</div>
                    </div>
                    <div class="slider-container">
                        <label>Target Sale Price (€/m²)</label>
                        <input type="range" id="salePrice" min="7000" max="12000" step="100" value="9000">
                        <div class="slider-value" id="salePriceValue">€9,000 / m²</div>
                    </div>
                </div>

                <div class="control-group">
                    <h3>Unit Mix</h3>
                    <div class="slider-container">
                        <label>Number of Units</label>
                        <input type="range" id="numUnits" min="8" max="16" step="1" value="12">
                        <div class="slider-value" id="numUnitsValue">12 Units</div>
                    </div>
                    <div class="slider-container">
                        <label>Average Unit Size (m²)</label>
                        <input type="range" id="unitSize" min="40" max="80" step="1" value="53">
                        <div class="slider-value" id="unitSizeValue">53 m²</div>
                    </div>
                </div>

                <div class="control-group">
                    <h3>Cost Assumptions</h3>
                     <div class="slider-container">
                        <label>Soft Costs (% of Hard Costs)</label>
                        <input type="range" id="softCosts" min="10" max="35" step="1" value="20">
                        <div class="slider-value" id="softCostsValue">20.0%</div>
                    </div>
                    <div class="slider-container">
                        <label>Financing Costs (% of Total Costs)</label>
                        <input type="range" id="financingCosts" min="3" max="15" step="0.5" value="8">
                        <div class="slider-value" id="financingCostsValue">8.0%</div>
                    </div>
                    <div class="slider-container">
                        <label>Developer's Selling Costs (% of Revenue)</label>
                        <input type="range" id="sellingCosts" min="0" max="5" step="0.5" value="2">
                        <div class="slider-value" id="sellingCostsValue">2.0%</div>
                    </div>
                </div>
            </div>
            <div class="results-panel">
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="netProfit">€0</div>
                        <div class="metric-label">Net Profit</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="profitOnCost">0%</div>
                        <div class="metric-label">Profit on Cost</div>
                    </div>
                </div>
                <div class="pro-forma-table">
                    <h3>Project Pro-Forma</h3>
                    <table>
                        <tbody id="proFormaBody">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const controls = {
            hardCost: document.getElementById('hardCost'),
            salePrice: document.getElementById('salePrice'),
            numUnits: document.getElementById('numUnits'),
            unitSize: document.getElementById('unitSize'),
            softCosts: document.getElementById('softCosts'),
            sellingCosts: document.getElementById('sellingCosts'),
            financingCosts: document.getElementById('financingCosts'),
        };

        const displays = {
            hardCostValue: document.getElementById('hardCostValue'),
            salePriceValue: document.getElementById('salePriceValue'),
            numUnitsValue: document.getElementById('numUnitsValue'),
            unitSizeValue: document.getElementById('unitSizeValue'),
            softCostsValue: document.getElementById('softCostsValue'),
            sellingCostsValue: document.getElementById('sellingCostsValue'),
            financingCostsValue: document.getElementById('financingCostsValue'),
            netProfit: document.getElementById('netProfit'),
            profitOnCost: document.getElementById('profitOnCost'),
            proFormaBody: document.getElementById('proFormaBody'),
        };

        function formatCurrency(value) {
            return `€${Math.round(value).toLocaleString('de-DE')}`;
        }

        function updateCalculations() {
            // 1. GATHER INPUTS
            const landPrice = 1500000; // Fixed Land Price
            const hardCostPerSqm = parseFloat(controls.hardCost.value);
            const salePricePerSqm = parseFloat(controls.salePrice.value);
            const numUnits = parseInt(controls.numUnits.value);
            const avgUnitSize = parseInt(controls.unitSize.value);
            const softCostsPct = parseFloat(controls.softCosts.value) / 100;
            const sellingCostsPct = parseFloat(controls.sellingCosts.value) / 100;
            const financingCostsPct = parseFloat(controls.financingCosts.value) / 100;

            // 2. UPDATE SLIDER DISPLAYS
            displays.hardCostValue.textContent = `${formatCurrency(hardCostPerSqm)} / m²`;
            displays.salePriceValue.textContent = `${formatCurrency(salePricePerSqm)} / m²`;
            displays.numUnitsValue.textContent = `${numUnits} Units`;
            displays.unitSizeValue.textContent = `${avgUnitSize} m²`;
            displays.softCostsValue.textContent = `${(softCostsPct * 100).toFixed(1)}%`;
            displays.sellingCostsValue.textContent = `${(sellingCostsPct * 100).toFixed(1)}%`;
            displays.financingCostsValue.textContent = `${(financingCostsPct * 100).toFixed(1)}%`;

            // 3. CALCULATE PRO-FORMA
            // Revenue
            const totalSellableArea = numUnits * avgUnitSize;
            const grossSellout = totalSellableArea * salePricePerSqm;

            // Costs
            const totalHardCosts = totalSellableArea * hardCostPerSqm;
            const softCosts = totalHardCosts * softCostsPct;
            const preFinancingCosts = landPrice + totalHardCosts + softCosts;
            const financingCosts = preFinancingCosts * financingCostsPct;
            const sellingCosts = grossSellout * sellingCostsPct;
            const totalProjectCost = landPrice + totalHardCosts + softCosts + financingCosts + sellingCosts;
            
            // Profit
            const netProfit = grossSellout - totalProjectCost;
            const profitOnCost = totalProjectCost > 0 ? (netProfit / totalProjectCost) * 100 : 0;

            // 4. UPDATE DOM
            displays.netProfit.textContent = formatCurrency(netProfit);
            displays.profitOnCost.textContent = `${profitOnCost.toFixed(1)}%`;
            
            if (netProfit >= 0) {
                displays.netProfit.className = 'metric-value profit';
                displays.profitOnCost.className = 'metric-value profit';
            } else {
                displays.netProfit.className = 'metric-value loss';
                displays.profitOnCost.className = 'metric-value loss';
            }

            displays.proFormaBody.innerHTML = `
                <tr>
                    <td>Gross Sellout Value</td>
                    <td>${formatCurrency(grossSellout)}</td>
                </tr>
                <tr class="total-row">
                    <td>Total Revenue</td>
                    <td>${formatCurrency(grossSellout)}</td>
                </tr>
                <tr>
                    <td>Land Purchase Price</td>
                    <td>-${formatCurrency(landPrice)}</td>
                </tr>
                <tr>
                    <td>Hard Construction Costs</td>
                    <td>-${formatCurrency(totalHardCosts)}</td>
                </tr>
                <tr>
                    <td>Soft Costs</td>
                    <td>-${formatCurrency(softCosts)}</td>
                </tr>
                 <tr>
                    <td>Financing Costs</td>
                    <td>-${formatCurrency(financingCosts)}</td>
                </tr>
                <tr>
                    <td>Developer's Selling Costs</td>
                    <td>-${formatCurrency(sellingCosts)}</td>
                </tr>
                <tr class="total-row">
                    <td>Total Project Costs</td>
                    <td>-${formatCurrency(totalProjectCost)}</td>
                </tr>
                <tr class="${netProfit >= 0 ? 'profit-row' : 'loss-row'}">
                    <td>Net Profit</td>
                    <td>${formatCurrency(netProfit)}</td>
                </tr>
            `;
        }

        Object.values(controls).forEach(control => {
            control.addEventListener('input', updateCalculations);
        });

        document.addEventListener('DOMContentLoaded', updateCalculations);
    </script>
</body>
</html>

</body>

</html>
